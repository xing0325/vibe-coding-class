<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Git，但是给 Vibe Coder</title>
<style>
/* ============================================================
   CONFIG / TOKENS
   ============================================================ */
:root{
  --bg:#0D1117; --text:#E6EDF3; --dim:#8B949E; --git:#F05133;
  --c-main:#E6EDF3; --c-teal:#2DD4BF; --c-purple:#A78BFA; --c-amber:#FBBF24; --c-pink:#F472B6;
  --info:#58A6FF; --warn:#3B82F6; --ghost:#4B5563;

  --font-sans:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;
  --font-mono:'JetBrains Mono',ui-monospace,'SF Mono',Menlo,Consolas,monospace;

  --pane:#161B22; --pane2:#1C2230; --border:#30363D;
  --ease:cubic-bezier(.22,.61,.36,1);
}

*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;width:100%;overflow:hidden}
body{
  background:var(--bg); color:var(--text);
  font-family:var(--font-sans);
  -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
  line-height:1.5; position:relative;
}

/* ============================================================
   DECORATIVE DRIFTING COMMIT-GRAPH BACKGROUND
   ============================================================ */
#bg-deco{position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.5}
#bg-deco svg{width:100%;height:100%;display:block}
.deco-drift{animation:drift 60s linear infinite}
@keyframes drift{from{transform:translateX(0)}to{transform:translateX(-220px)}}
.deco-dot{fill:var(--text);opacity:.06}
.deco-line{stroke:var(--text);stroke-width:2;opacity:.045;fill:none}

/* ============================================================
   STAGE / SCREEN LAYOUT
   ============================================================ */
#deck{position:fixed;inset:0;z-index:1;display:flex;align-items:center;justify-content:center}
.screen{
  position:absolute;inset:0;
  display:none; flex-direction:column;align-items:center;justify-content:center;
  padding:clamp(28px,5vw,80px); padding-bottom:96px;
  overflow:auto;
}
.screen.is-active{display:flex; animation:screenIn .45s var(--ease)}
@keyframes screenIn{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
.screen-inner{width:100%;max-width:1180px;margin:auto}

/* empty fallback */
#empty-note{
  position:fixed;inset:0;z-index:1;display:flex;align-items:center;justify-content:center;
  flex-direction:column;gap:14px;text-align:center;padding:40px;
}

/* ============================================================
   TYPOGRAPHY / COMMON CLASSES
   ============================================================ */
.sc-h1{font-size:clamp(34px,5.5vw,68px);font-weight:800;letter-spacing:-.02em;line-height:1.05}
.sc-h2{font-size:clamp(24px,3.4vw,40px);font-weight:700;letter-spacing:-.01em;line-height:1.15}
.sc-lead{font-size:clamp(17px,2vw,24px);color:var(--text);font-weight:500;line-height:1.45}
.sc-p{font-size:clamp(15px,1.5vw,19px);color:var(--text);line-height:1.6}
.sc-dim{color:var(--dim)}
.sc-mono{font-family:var(--font-mono);font-feature-settings:"liga" 0}
.sc-center{text-align:center}

.sc-pill{
  display:inline-flex;align-items:center;gap:6px;
  padding:4px 12px;border-radius:999px;
  font-size:13px;font-weight:600;font-family:var(--font-mono);
  background:rgba(240,81,51,.12);color:var(--git);
  border:1px solid rgba(240,81,51,.3);
}
.sc-btn{
  display:inline-flex;align-items:center;gap:8px;
  padding:10px 20px;border-radius:10px;cursor:pointer;
  font-family:var(--font-sans);font-size:15px;font-weight:600;
  background:var(--pane2);color:var(--text);
  border:1px solid var(--border);
  transition:transform .15s var(--ease),background .15s,border-color .15s;
  user-select:none;
}
.sc-btn:hover{background:#272e3d;border-color:#454d5e;transform:translateY(-1px)}
.sc-btn:active{transform:translateY(0)}
.sc-btn.primary{background:var(--git);border-color:var(--git);color:#fff}
.sc-btn.primary:hover{filter:brightness(1.08)}

.sc-card{
  background:var(--pane);border:1px solid var(--border);
  border-radius:16px;padding:clamp(18px,2.4vw,30px);
}
.sc-grid{display:grid;gap:18px}

.sc-warn-banner{
  display:flex;align-items:center;gap:10px;
  padding:10px 18px;border-radius:12px;
  background:rgba(88,166,255,.1);border:1px solid rgba(88,166,255,.4);
  color:var(--info);font-size:14px;font-weight:600;
}
.sc-warn-banner::before{content:"⚠";font-size:18px}

/* ============================================================
   AI COMMAND CARD
   ============================================================ */
.aicard{
  display:flex;flex-direction:column;gap:14px;
  background:var(--pane);border:1px solid var(--border);
  border-radius:18px;padding:22px;max-width:560px;
}
.aicard-effect{font-size:clamp(19px,2.4vw,28px);font-weight:800;letter-spacing:-.01em}
.aicard-effect b{color:var(--c-teal)}
.aicard-bubble{
  align-self:flex-start;max-width:100%;
  background:var(--pane2);border:1px solid var(--border);
  border-radius:16px 16px 16px 4px;
  padding:12px 16px;font-size:15px;line-height:1.5;
}
.aicard-bubble .say{color:var(--c-purple);font-weight:600}
.aicard-cmd{display:flex;flex-direction:column;gap:8px}
.aicard-toggle{
  display:inline-flex;align-items:center;gap:6px;cursor:pointer;
  color:var(--dim);font-family:var(--font-mono);font-size:13px;
  user-select:none;width:fit-content;
}
.aicard-toggle .chev{transition:transform .2s var(--ease)}
.aicard.open .aicard-toggle .chev{transform:rotate(180deg)}
.aicard-real{
  font-family:var(--font-mono);font-size:14px;
  background:#010409;border:1px solid var(--border);border-radius:10px;
  padding:0 14px;color:var(--c-teal);
  max-height:0;overflow:hidden;opacity:0;
  transition:max-height .3s var(--ease),opacity .25s,padding .3s var(--ease);
  white-space:pre-wrap;word-break:break-word;
}
.aicard.open .aicard-real{max-height:240px;opacity:1;padding:12px 14px}
.aicard-real::before{content:"$ ";color:var(--dim)}

/* ============================================================
   COMMIT GRAPH
   ============================================================ */
.cg-wrap{position:relative;width:100%}
.cg-svg{width:100%;display:block;overflow:visible}
.cg-svg.detached{filter:saturate(.35) brightness(.9)}
.cg-edge{fill:none;stroke:var(--border);stroke-width:3;
  transition:stroke .4s var(--ease),opacity .4s var(--ease)}
.cg-edge.merge{stroke-dasharray:none}
.cg-node{cursor:default}
.cg-node circle{
  stroke:#010409;stroke-width:2;
  transition:r .35s var(--ease),fill .4s var(--ease),opacity .4s var(--ease),filter .4s;
}
.cg-node.appear{animation:nodePop .45s var(--ease)}
@keyframes nodePop{0%{transform:scale(0);opacity:0}60%{transform:scale(1.25)}100%{transform:scale(1);opacity:1}}
.cg-node .glow{filter:drop-shadow(0 0 6px rgba(255,255,255,.25))}
.cg-node.ghost circle{fill:var(--ghost)!important;opacity:.45;stroke-dasharray:3 3}
.cg-node.ghost text{opacity:.5}
.cg-node.hl circle{stroke:var(--git);stroke-width:3.5;filter:drop-shadow(0 0 9px rgba(240,81,51,.85))}
.cg-node .label{font-family:var(--font-mono);font-size:12px;fill:var(--bg);font-weight:700;text-anchor:middle;dominant-baseline:central;pointer-events:none}
.cg-node.dark-label .label{fill:var(--bg)}
.cg-node.light-label .label{fill:#010409}

.cg-pill{
  font-family:var(--font-mono);font-size:12px;font-weight:700;
}
.cg-pill rect{transition:all .35s var(--ease)}
.cg-pill text{dominant-baseline:central;text-anchor:middle}

.cg-head{transition:transform .4s var(--ease),opacity .4s}
.cg-head rect{fill:var(--git);rx:4}
.cg-head text{fill:#fff;font-family:var(--font-mono);font-size:11px;font-weight:800;text-anchor:middle;dominant-baseline:central}
.cg-head .stem{stroke:var(--git);stroke-width:2.5}
.cg-head.detached rect{fill:var(--warn)}
.cg-head.detached .stem{stroke:var(--warn);stroke-dasharray:3 3}

.cg-detach-banner{
  position:absolute;top:-4px;left:50%;transform:translateX(-50%) translateY(-100%);
  white-space:nowrap;
  padding:6px 14px;border-radius:0 0 10px 10px;
  background:rgba(59,130,246,.18);border:1px solid rgba(88,166,255,.5);
  color:var(--info);font-size:12.5px;font-weight:700;font-family:var(--font-mono);
  opacity:0;transition:opacity .35s var(--ease),transform .35s var(--ease);
}
.cg-detach-banner.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ============================================================
   ASTRONAUT
   ============================================================ */
.astronaut{
  position:fixed;z-index:60;font-size:38px;pointer-events:none;
  filter:drop-shadow(0 4px 12px rgba(0,0,0,.5));
  will-change:transform,opacity;
}
@keyframes astroFloat{
  0%{opacity:0;transform:translate(-50%,-50%) scale(.4) rotate(0deg)}
  15%{opacity:1;transform:translate(-50%,-50%) scale(1.1) rotate(-8deg)}
  100%{opacity:0;transform:translate(calc(-50% + var(--ax,260px)),calc(-50% - var(--ay,320px))) scale(.7) rotate(40deg)}
}
.astronaut.go{animation:astroFloat 2.8s var(--ease) forwards}

/* ============================================================
   FRAGMENTS (step reveal)
   ============================================================ */
.frag-hidden{opacity:0;transform:translateY(10px);transition:opacity .4s var(--ease),transform .4s var(--ease)}
.frag-show{opacity:1;transform:none}

/* ============================================================
   NAVIGATION / CHROME
   ============================================================ */
#progress{position:fixed;left:0;bottom:0;height:3px;background:var(--git);z-index:40;
  width:0;transition:width .4s var(--ease);box-shadow:0 0 10px rgba(240,81,51,.6)}
#footer{
  position:fixed;left:0;right:0;bottom:0;height:46px;z-index:30;
  display:flex;align-items:center;gap:14px;
  padding:0 18px;font-size:13px;color:var(--dim);
  background:linear-gradient(to top,rgba(13,17,23,.92),rgba(13,17,23,0));
  pointer-events:none;
}
#footer .chap{font-weight:600;color:var(--text)}
#footer .spacer{flex:1}
#footer .keys{font-family:var(--font-mono);font-size:11px;opacity:.7}

#menu-btn{
  position:fixed;top:16px;left:16px;z-index:50;
  width:42px;height:42px;border-radius:11px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  background:var(--pane);border:1px solid var(--border);color:var(--text);
  transition:background .15s,transform .15s;
}
#menu-btn:hover{background:var(--pane2);transform:translateY(-1px)}
#menu-btn svg{width:20px;height:20px}

#topright{position:fixed;top:16px;right:16px;z-index:50;display:flex;gap:8px}
.icon-btn{
  width:42px;height:42px;border-radius:11px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  background:var(--pane);border:1px solid var(--border);color:var(--dim);
  font-size:12px;font-weight:700;font-family:var(--font-mono);
  transition:background .15s,color .15s,transform .15s;
}
.icon-btn:hover{background:var(--pane2);color:var(--text);transform:translateY(-1px)}

/* OVERVIEW */
#overview{
  position:fixed;inset:0;z-index:80;display:none;
  background:rgba(13,17,23,.97);backdrop-filter:blur(8px);
  overflow:auto;padding:clamp(40px,7vh,90px) clamp(24px,6vw,90px);
}
#overview.open{display:block;animation:screenIn .3s var(--ease)}
#overview h2{font-size:28px;font-weight:800;margin-bottom:6px}
#overview .ov-sub{color:var(--dim);margin-bottom:34px;font-size:14px}
.ov-chapter{margin-bottom:30px}
.ov-chapter-h{
  display:flex;align-items:baseline;gap:10px;margin-bottom:12px;
  border-bottom:1px solid var(--border);padding-bottom:8px;
}
.ov-chapter-h .num{
  font-family:var(--font-mono);font-size:13px;font-weight:800;color:var(--git);
  background:rgba(240,81,51,.12);border-radius:6px;padding:2px 8px;
}
.ov-chapter-h .nm{font-size:18px;font-weight:700}
.ov-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:10px}
.ov-item{
  text-align:left;cursor:pointer;border-radius:12px;padding:14px 16px;
  background:var(--pane);border:1px solid var(--border);
  transition:background .15s,border-color .15s,transform .15s;
}
.ov-item:hover{background:var(--pane2);border-color:#454d5e;transform:translateY(-2px)}
.ov-item.current{border-color:var(--git);box-shadow:0 0 0 1px var(--git) inset}
.ov-item .t{font-weight:700;font-size:15px;margin-bottom:3px}
.ov-item .s{color:var(--dim);font-size:12.5px}
.ov-item .idx{font-family:var(--font-mono);font-size:11px;color:var(--dim);float:right}
#ov-close{position:absolute;top:22px;right:26px;}

::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-thumb{background:#30363d;border-radius:8px}
::-webkit-scrollbar-track{background:transparent}
</style>
</head>
<body>

<!-- decorative drifting commit graph -->
<div id="bg-deco" aria-hidden="true">
  <svg viewBox="0 0 1200 800" preserveAspectRatio="xMidYMid slice">
    <g class="deco-drift" id="deco-g"></g>
  </svg>
</div>

<!-- empty fallback -->
<div id="empty-note">
  <div class="sc-pill">git, but for vibe coders</div>
  <div class="sc-h2">还没有任何幻灯片</div>
  <div class="sc-dim">章节脚本会通过 <span class="sc-mono">registerScreen()</span> 注入到这里。</div>
</div>

<!-- deck root -->
<div id="deck" aria-live="polite"></div>

<!-- chrome -->
<div id="progress"></div>
<div id="footer">
  <span class="chap" id="foot-chap"></span>
  <span id="foot-title" class="sc-dim"></span>
  <span class="spacer"></span>
  <span class="keys">空格/→ 下一步 · ← 上一步 · ESC 总览 · F 全屏 · R 重置</span>
</div>

<button id="menu-btn" title="章节总览 (ESC)" aria-label="章节总览">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
    <line x1="4" y1="7" x2="20" y2="7"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="17" x2="20" y2="17"/>
  </svg>
</button>
<div id="topright">
  <button class="icon-btn" id="btn-prev" title="上一步 (←)">‹</button>
  <button class="icon-btn" id="btn-reset" title="重置本屏 (R)">R</button>
  <button class="icon-btn" id="btn-full" title="全屏 (F)">⤢</button>
  <button class="icon-btn" id="btn-next" title="下一步 (空格/→)">›</button>
</div>

<!-- overview -->
<div id="overview">
  <button class="sc-btn" id="ov-close">关闭 ✕</button>
  <h2>章节总览</h2>
  <div class="ov-sub">点任意条目跳转 · 按 chapter 分组</div>
  <div id="ov-body"></div>
</div>

<!-- ===== EARLY REGISTRATION SHIM =====
     Defined BEFORE chapter modules so chapters can call registerScreen()
     even though the engine loads after them. Chapters get queued in
     window.__pendingScreens; the engine drains the queue on boot and then
     swaps in its own (identical-signature) registerScreen for late adds. -->
<script>
(function(){
  if(!window.__pendingScreens) window.__pendingScreens=[];
  if(typeof window.registerScreen!=='function'){
    window.registerScreen=function(def){ window.__pendingScreens.push(def); };
  }
})();
</script>

<!-- ===== SCREEN MODULES (chapters injected at integration) ===== -->
<!-- sc-ch0 -->
<script>
/* ============================================================
 * 第 0 章 · 封面 + 总纲
 * 屏 0.1 cover    · 封面
 * 屏 0.2 legend   · 这门课怎么上（主题词 + 视觉图例 + 三层卡示意）
 * 样式前缀: c-ch0-
 * 仅调用框架契约：window.registerScreen / api.step / api.frag / api.aiCard ...
 * ============================================================ */
(function () {
  'use strict';

  /* 一次性注入本章作用域样式（多屏共用；重复进入屏不会重复注入） */
  function injectStyle() {
    if (document.getElementById('c-ch0-style')) return;
    var s = document.createElement('style');
    s.id = 'c-ch0-style';
    s.textContent = [
      /* ---------- 屏 0.1 封面 ---------- */
      '.c-ch0-cover{position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;min-height:62vh;overflow:hidden;}',
      /* 背景极淡的 commit 图，自左向右缓慢漂移 */
      '.c-ch0-bg{position:absolute;inset:0;z-index:0;pointer-events:none;opacity:0.16;overflow:hidden;}',
      '.c-ch0-bg-track{position:absolute;top:50%;left:0;transform:translateY(-50%);will-change:transform;animation:c-ch0-drift 38s linear infinite;}',
      '@keyframes c-ch0-drift{from{transform:translate(0,-50%);}to{transform:translate(-50%,-50%);}}',
      '.c-ch0-cover-inner{position:relative;z-index:1;}',
      '.c-ch0-title{font-family:var(--font-sans);font-size:clamp(34px,7vw,76px);font-weight:800;letter-spacing:-0.03em;line-height:1.08;margin:0 0 18px;',
      'background:linear-gradient(120deg,var(--text) 0%,var(--c-teal) 55%,var(--git) 100%);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;',
      'opacity:0;animation:c-ch0-rise .9s .05s cubic-bezier(.2,.8,.2,1) forwards;}',
      '.c-ch0-title .c-ch0-mono{font-family:var(--font-mono);}',
      '.c-ch0-sub{font-size:clamp(15px,2.4vw,21px);color:var(--dim);letter-spacing:0.04em;margin:0 0 40px;opacity:0;animation:c-ch0-rise .9s .28s cubic-bezier(.2,.8,.2,1) forwards;}',
      '.c-ch0-start{display:inline-flex;align-items:center;gap:10px;font-family:var(--font-mono);font-size:15px;color:var(--text);padding:11px 22px;border-radius:999px;',
      'background:color-mix(in srgb,var(--git) 14%,transparent);border:1px solid color-mix(in srgb,var(--git) 45%,transparent);opacity:0;animation:c-ch0-rise .9s .52s cubic-bezier(.2,.8,.2,1) forwards,c-ch0-pulse 2.4s 1.4s ease-in-out infinite;}',
      '.c-ch0-start .c-ch0-key{display:inline-block;min-width:60px;text-align:center;padding:2px 8px;border-radius:6px;background:color-mix(in srgb,var(--text) 8%,transparent);border:1px solid color-mix(in srgb,var(--text) 18%,transparent);}',
      '@keyframes c-ch0-rise{from{opacity:0;transform:translateY(22px);}to{opacity:1;transform:translateY(0);}}',
      '@keyframes c-ch0-pulse{0%,100%{box-shadow:0 0 0 0 color-mix(in srgb,var(--git) 30%,transparent);}50%{box-shadow:0 0 0 9px color-mix(in srgb,var(--git) 0%,transparent);}}',

      /* ---------- 屏 0.2 总纲 ---------- */
      '.c-ch0-legend-wrap{display:grid;grid-template-columns:1.15fr 1fr;gap:34px;align-items:start;}',
      '@media (max-width:760px){.c-ch0-legend-wrap{grid-template-columns:1fr;gap:26px;}}',
      '.c-ch0-motto{font-family:var(--font-sans);font-size:clamp(24px,3.6vw,40px);font-weight:800;line-height:1.32;letter-spacing:-0.01em;margin:6px 0 22px;min-height:4.6em;}',
      '.c-ch0-motto .c-ch0-hl{color:var(--c-teal);}',
      '.c-ch0-motto .c-ch0-hl2{color:var(--git);}',
      '.c-ch0-caret{display:inline-block;width:0.55ch;background:var(--c-teal);color:transparent;animation:c-ch0-blink 1s steps(1) infinite;margin-left:1px;border-radius:1px;}',
      '@keyframes c-ch0-blink{0%,49%{opacity:1;}50%,100%{opacity:0;}}',
      '.c-ch0-legend-card{background:color-mix(in srgb,var(--text) 4%,transparent);border:1px solid color-mix(in srgb,var(--text) 12%,transparent);border-radius:16px;padding:22px 22px 18px;}',
      '.c-ch0-legend-card h3{margin:0 0 16px;font-size:13px;font-family:var(--font-mono);letter-spacing:0.14em;text-transform:uppercase;color:var(--dim);}',
      '.c-ch0-legend-row{display:flex;align-items:center;gap:14px;padding:11px 0;border-top:1px dashed color-mix(in srgb,var(--text) 12%,transparent);}',
      '.c-ch0-legend-row:first-of-type{border-top:none;}',
      '.c-ch0-legend-sym{flex:0 0 64px;display:flex;align-items:center;justify-content:center;height:34px;font-size:22px;}',
      '.c-ch0-legend-txt{font-size:15px;line-height:1.5;color:var(--text);}',
      '.c-ch0-legend-txt b{color:var(--c-teal);}',
      '.c-ch0-legend-txt .c-ch0-m{font-family:var(--font-mono);color:var(--dim);font-size:13px;}',
      '.c-ch0-demo-hint{margin:18px 0 8px;font-size:13px;color:var(--dim);text-align:center;}',
      '.c-ch0-demo-hint b{color:var(--git);}',
      /* 图例符号的小 SVG */
      '.c-ch0-sym-commit{width:18px;height:18px;border-radius:50%;background:var(--c-main);box-shadow:0 0 10px color-mix(in srgb,var(--c-main) 70%,transparent);}',
      '.c-ch0-sym-branch{width:46px;height:4px;border-radius:3px;background:var(--c-teal);box-shadow:0 0 10px color-mix(in srgb,var(--c-teal) 60%,transparent);}',
      '.c-ch0-sym-head{font-size:20px;}',
      '.c-ch0-sym-astro{font-size:22px;}'
    ].join('');

  /* 背景漂移用的极淡 commit 图（自绘 SVG，两段拼接以便无缝循环漂移） */
  function bgCommitSVG() {
    var seg = '';
    var n = 14, gap = 84, r = 9, y = 60;
    for (var i = 0; i < n; i++) {
      var x = 30 + i * gap;
      if (i < n - 1) {
        seg += '<line x1="' + x + '" y1="' + y + '" x2="' + (x + gap) + '" y2="' + y + '" stroke="var(--c-main)" stroke-width="3"/>';
      }
      // 偶尔分叉一条淡淡的支线，增加"版本图"质感
      if (i % 4 === 2) {
        seg += '<line x1="' + x + '" y1="' + y + '" x2="' + (x + gap) + '" y2="' + (y - 34) + '" stroke="var(--c-teal)" stroke-width="3"/>' +
               '<circle cx="' + (x + gap) + '" cy="' + (y - 34) + '" r="' + r + '" fill="var(--c-teal)"/>';
      }
    }
    for (var j = 0; j < n; j++) {
      seg += '<circle cx="' + (30 + j * gap) + '" cy="' + y + '" r="' + r + '" fill="var(--c-main)"/>';
    }
    var W = 30 + (n - 1) * gap + 60;
    // 两份并排 → track 宽度 2W，动画位移 -50% 正好滚过一份，无缝
    return '<svg class="c-ch0-bg-track" width="' + (W * 2) + '" height="120" viewBox="0 0 ' + (W * 2) + ' 120" aria-hidden="true">' +
      '<g>' + seg + '</g>' +
      '<g transform="translate(' + W + ',0)">' + seg + '</g>' +
      '</svg>';
  }

  /* git 官方风格三点橙色 logo（纯 SVG，#F05133） */
  function gitLogoSVG(size) {
    var s = size || 110;
    return '<svg width="' + s + '" height="' + s + '" viewBox="0 0 120 120" aria-hidden="true">' +
      '<g stroke="var(--git)" stroke-width="6" stroke-linecap="round" fill="var(--git)">' +
        '<line x1="60" y1="96" x2="60" y2="40"/>' +
        '<line x1="60" y1="58" x2="92" y2="30"/>' +
        '<circle cx="60" cy="96" r="11" stroke="none"/>' +
        '<circle cx="60" cy="40" r="11" stroke="none"/>' +
        '<circle cx="92" cy="30" r="11" stroke="none"/>' +
      '</g></svg>';
  }

  /* ====================================================== */
  /* 屏 0.1 — 封面                                          */
  /* ====================================================== */
  window.registerScreen({
    chapter: 0,
    chapterName: '封面 + 总纲',
    id: 'cover',
    title: 'Git，但是给 Vibe Coder',

    render: function (stage, api) {
      injectStyle();
      stage.innerHTML =
        '<div class="c-ch0-cover">' +
          '<div class="c-ch0-bg">' + bgCommitSVG() + '</div>' +

            '<h1 class="c-ch0-title">Git，<br>但是给 <span class="c-ch0-mono">Vibe&nbsp;Coder</span></h1>' +
            '<p class="c-ch0-sub">—— 你不背命令，你理解效果 ——</p>' +

    }
  });

  /* ====================================================== */
  /* 屏 0.2 — 这门课怎么上（主题词 + 视觉图例 + 三层卡）       */
  /* ====================================================== */
  window.registerScreen({
    chapter: 0,
    chapterName: '封面 + 总纲',
    id: 'legend',
    title: '这门课怎么上',
    subtitle: '记住效果，把命令交给 AI',
    render: function (stage, api) {
      injectStyle();

      // 主题词文本（分段染色：teal 段 / git 段 / 普通段）
      var mottoParts = [
        { t: '你不背命令，你只理解', cls: '' },
        { t: '效果', cls: 'c-ch0-hl' },
        { t: '，然后用人话告诉 ', cls: '' },
        { t: 'AI', cls: 'c-ch0-hl2' },

      ];
      var fullLen = mottoParts.reduce(function (a, p) { return a + p.t.length; }, 0);

      stage.innerHTML =
        '<h2 class="sc-h2">这门课怎么上？</h2>' +
        '<div class="c-ch0-legend-wrap">' +
          '<div>' +
            '<div class="c-ch0-motto" id="c-ch0-motto"></div>' +
          '</div>' +
          '<div class="c-ch0-legend-card">' +
            '<h3>视觉图例 · 全站符号</h3>' +
            '<div class="c-ch0-legend-row" id="c-ch0-lg-0">' +
              '<div class="c-ch0-legend-sym"><span class="c-ch0-sym-commit"></span></div>' +
              '<div class="c-ch0-legend-txt"><b>● = 一次提交</b> <span class="c-ch0-m">commit</span><br>你按一次"存档键"，就多一个圆点。</div>' +
            '</div>' +
            '<div class="c-ch0-legend-row" id="c-ch0-lg-1">' +
              '<div class="c-ch0-legend-sym"><span class="c-ch0-sym-branch"></span></div>' +
              '<div class="c-ch0-legend-txt"><b>─── = 一条分支</b> <span class="c-ch0-m">branch</span><br>一条独立的时间线，可以平行往前走。</div>' +
            '</div>' +
            '<div class="c-ch0-legend-row" id="c-ch0-lg-2">' +
              '<div class="c-ch0-legend-sym"><span class="c-ch0-sym-head">🚩</span></div>' +
              '<div class="c-ch0-legend-txt"><b>🚩 HEAD = 你现在站在哪</b><br>这面小旗指着你当前所处的那个点。</div>' +
            '</div>' +
            '<div class="c-ch0-legend-row" id="c-ch0-lg-3">' +
              '<div class="c-ch0-legend-sym"><span class="c-ch0-sym-astro">👨‍🚀</span></div>' +
              '<div class="c-ch0-legend-txt"><b>👨‍🚀 = 孤儿 commit</b><br>没人牵着、飘走了的提交，最后会被回收。</div>' +
            '</div>' +
          '</div>' +
        '</div>' +
        '<p class="c-ch0-demo-hint" id="c-ch0-demohint">' +
          '后面每个操作都长这样 👇 <b>效果 → 对 AI 说的话 →（折叠的）真命令</b>。点一下卡片底部，展开看真命令。' +
        '</p>' +
        '<div id="c-ch0-aicard-host" style="max-width:560px;margin:0 auto;"></div>';

      var mottoEl = stage.querySelector('#c-ch0-motto');

      // —— 把主题词渲染到指定字符数（打字机 / 一次性）——
      function renderMotto(count, withCaret) {
        var html = '', left = count;
        for (var i = 0; i < mottoParts.length; i++) {
          var p = mottoParts[i];
          if (left <= 0) break;
          var take = Math.min(left, p.t.length);
          var chunk = p.t.slice(0, take);
          html += p.cls ? '<span class="' + p.cls + '">' + chunk + '</span>' : chunk;
          left -= take;
        }
        if (withCaret) html += '<span class="c-ch0-caret">|</span>';
        mottoEl.innerHTML = html;
      }

      // 初始（第 0 步）：主题词留空，等第一步推进
      renderMotto(0, false);

      // 三层 AI 卡：示意"效果 / 🤖对AI说 / 折叠真命令"
      var demoCard = api.aiCard({
        effect: '把项目回退到某个版本',
        say: '帮我回退到 a1b2c3d',
        cmd: 'git reset --hard a1b2c3d'
      });
      var aiHost = stage.querySelector('#c-ch0-aicard-host');
      aiHost.appendChild(demoCard);

      // ---------- 分步 ----------
      // step 1：主题词打字机出现
      var typingTimer = null;
      api.step(function (animated) {
        if (typingTimer) { clearInterval(typingTimer); typingTimer = null; }
        if (!animated) { renderMotto(fullLen, false); return; } // 后退重放：直接全显，不播动画
        var n = 0;
        typingTimer = setInterval(function () {
          n++;
          renderMotto(n, n < fullLen);
          if (n >= fullLen) {
            clearInterval(typingTimer); typingTimer = null;
            renderMotto(fullLen, false);
          }
        }, 55);
      });

      // step 2~5：四个图例符号依次淡入（api.frag 隐藏并注册淡入）
      api.frag(stage.querySelector('#c-ch0-lg-0'));
      api.frag(stage.querySelector('#c-ch0-lg-1'));
      api.frag(stage.querySelector('#c-ch0-lg-2'));
      api.frag(stage.querySelector('#c-ch0-lg-3'));

      // step 6：示意卡 + 提示出现，并轻轻提示"点开真命令"
      api.frag(stage.querySelector('#c-ch0-demohint'));
      api.frag(aiHost);
    }
  });

})();

</script>

  /* ====================================================== */

  window.registerScreen({

        '</div>' +
        '<div class="c-ch1-slider-wrap">' +
          '<span>协作人数</span>' +
          '<span style="font-family:var(--font-mono)">1</span>' +
          '<input type="range" id="c-ch1-slider" min="1" max="' + PEOPLE_MAX + '" step="1" value="1" />' +
          '<span style="font-family:var(--font-mono)">10</span>' +
          '<span class="c-ch1-count" id="c-ch1-count"><b>1</b> 人</span>' +
        '</div>' +
        '<p class="c-ch1-collab-foot" id="c-ch1-foot">🎮 拖动滑块，看版本与连线怎么爆炸。</p>';

      var svg = stage.querySelector('#c-ch1-collab-svg');
      var linesG = stage.querySelector('#c-ch1-lines');
      var peopleG = stage.querySelector('#c-ch1-people');
      var hubG = stage.querySelector('#c-ch1-hub');
      var slider = stage.querySelector('#c-ch1-slider');
      var countEl = stage.querySelector('#c-ch1-count');
      var footEl = stage.querySelector('#c-ch1-foot');

      var SVGNS = 'http://www.w3.org/2000/svg';
      function mk(tag, attrs) {
        var e = document.createElementNS(SVGNS, tag);
        for (var k in attrs) e.setAttribute(k, attrs[k]);
        return e;
      }

      // 中央"文件堆" hub —— 几张叠放的文档色块
      (function drawHub() {
        for (var i = 0; i < 4; i++) {
          hubG.appendChild(mk('rect', {
            x: CX - 24 + i * 4, y: CY - 30 + i * 4, width: 48, height: 60, rx: 5,
            fill: i === 3 ? '#3B82F6' : '#1D4ED8', opacity: 0.92 - i * 0.12,
            stroke: 'rgba(255,255,255,0.25)', 'stroke-width': 1
          }));
        }
        var t = mk('text', { x: CX, y: CY + 56, 'text-anchor': 'middle', fill: 'var(--dim)', 'font-size': 12, 'font-family': 'var(--font-mono)' });
        t.textContent = '共享文件夹';
        hubG.appendChild(t);
      })();

      // 人物在中心上方半圆排开
      function personXY(idx, total) {
        if (total === 1) return { x: CX, y: 64 };
        var spread = Math.min(W - 120, 90 * total);
        var x = CX - spread / 2 + (spread) * (idx / (total - 1));
        var y = 54 + (idx % 2) * 30; // 交错两排，密集时更"挤"
        return { x: x, y: y };
      }

      // 一个人贡献的"版本数" = 随人数指数式增长（n 人 → 每人 n 个版本分支线）
      function render(n) {
        // 清空
        while (linesG.firstChild) linesG.removeChild(linesG.firstChild);
        while (peopleG.firstChild) peopleG.removeChild(peopleG.firstChild);

        var palette = ['#F472B6', '#2DD4BF', '#A78BFA', '#F0B429', '#4493F8', '#34D399', '#FB7185', '#C084FC', '#22D3EE', '#FBBF24'];

        // 连线：第 i 个人拉出 (i 越多每人线越多) 条线到中心 → 总线数 ~ n*n
        for (var i = 0; i < n; i++) {
          var p = personXY(i, n);
          var col = palette[i % palette.length];
          var linesPer = n; // 每人 n 条 → n 人时 n*n 条，指数式爆炸
          for (var j = 0; j < linesPer; j++) {
            // 让多条线轻微发散，糊成乱麻
            var jitterX = (j - linesPer / 2) * 7;
            var jitterY = (j % 3) * 5;
            var midX = (p.x + CX) / 2 + jitterX * 1.4;
            var midY = (p.y + CY) / 2 - 30 + jitterY;
            linesG.appendChild(mk('path', {
              d: 'M' + p.x + ' ' + (p.y + 16) + ' Q' + midX + ' ' + midY + ' ' + (CX + jitterX) + ' ' + (CY - 20),
              fill: 'none', stroke: col, 'stroke-width': 1.5,
              opacity: Math.max(0.12, 0.5 - n * 0.03)
            }));
          }
        }

        // 头像
        for (var k = 0; k < n; k++) {
          var pp = personXY(k, n);
          var c = palette[k % palette.length];
          var g = mk('g', {});
          g.appendChild(mk('circle', { cx: pp.x, cy: pp.y, r: 13, fill: c, opacity: 0.95 }));
          g.appendChild(mk('circle', { cx: pp.x, cy: pp.y - 4, r: 4.5, fill: '#fff' }));
          g.appendChild(mk('path', { d: 'M' + (pp.x - 7) + ' ' + (pp.y + 9) + ' a7 7 0 0 1 14 0 Z', fill: '#fff' }));
          peopleG.appendChild(g);
        }
      }

      function update(n, animatedFoot) {
        n = Math.max(1, Math.min(PEOPLE_MAX, n | 0));
        slider.value = n;
        countEl.innerHTML = '<b>' + n + '</b> 人';
        render(n);
        if (n >= 9) footEl.innerHTML = '😵 已经糊成一团 —— <b style="color:var(--c-pink,#F472B6)">人脑根本追不上了</b>。';
        else if (n >= 5) footEl.innerHTML = '🔀 连线开始交叉爆炸…再往上拖。';
        else footEl.innerHTML = '🎮 拖动滑块，看版本与连线怎么爆炸。';
      }

      slider.addEventListener('input', function () { update(parseInt(slider.value, 10)); });

      // 初始：1 人
      update(1);

      // R 重置 → 回到 1 人
      api.onReset(function () { update(1); });
    }
  });

  /* ====================================================== */
  /* 屏 1.3 — Git 登场                                      */
  /* ====================================================== */
  window.registerScreen({
    chapter: 1,
    chapterName: '为什么需要 Git',
    id: 'git-arrives',
    title: 'Git 登场',
    subtitle: '乱麻收束成一条干净的时间线',
    render: function (stage, api) {
      injectStyle();

      stage.innerHTML =
        '<div style="text-align:center;margin-bottom:6px;">' + gitLogo() + '</div>' +
        '<h2 class="sc-h2" style="text-align:center;">于是，<span style="color:var(--git)">Git</span> 登场</h2>' +
        '<div class="c-ch1-arrive-graph" id="c-ch1-graph"></div>' +
        '<div class="c-ch1-folder-row">' +
          '<div class="c-ch1-folder" id="c-ch1-folder">' +
            '<span class="c-ch1-folder-halo"></span>' +
            folderSVG(96) +
            '<span class="c-ch1-folder-label">' +
              '<span class="c-ch1-lbl c-ch1-lbl-old">文件夹</span>' +
              '<span class="c-ch1-lbl c-ch1-lbl-new">repository</span>' +
            '</span>' +
          '</div>' +
        '</div>' +
        '<p class="c-ch1-def" id="c-ch1-def">' +
          '<b>Git</b> ＝ 世界上最多人用的<b>版本控制系统</b>；<br>' +
          '被 Git 管起来的文件夹 ＝ 一个<b>仓库</b> <span class="c-ch1-m">(repository)</span>。' +
        '</p>';

      // 用框架 CommitGraph 画"收束后的干净线性时间线"
      var graphHost = stage.querySelector('#c-ch1-graph');
      var folder = stage.querySelector('#c-ch1-folder');
      var def = stage.querySelector('#c-ch1-def');

      var g = api.graph(graphHost, {});
      // 初始（第 0 步）：先呈现一条"还在收束中"的稀疏状态 —— 这里直接给一条 main 雏形，
      // 真正的"乱麻→直线"由 step 推进时补全节点，达到视觉上的归位对齐。
      g.init('main', ['A', 'B']);

      // 定义句与文件夹标签初始为"未点亮"
      var defFrag = api.frag(def);

      // ---------- 分步 ----------
      // step 1：乱麻 → 直线收束（补齐节点，整齐对齐成一排 ●）
      api.step(function (animated) {
        // 幂等：无论 animated 与否，最终都是同一条整齐 main: A B C D E
        g.reset();
        g.init('main', ['A', 'B', 'C', 'D', 'E']);
        // animated=true 时引擎自带的 addCommit/init 动画即视为"归位对齐"；
        // 这里不依赖额外计时器，保证后退重放也得到同样的最终态。
      });

      // step 2：文件夹被光环包住、标签 文件夹 → repository
      api.step(function (animated) {
        folder.classList.add('c-ch1-blessed');
      });

      // step 3：定义句淀入（defFrag 已由 api.frag 注册）—— 由框架推进显示

      // R 重置：收回光环、标签复位、时间线回到雏形
      api.onReset(function () {
        folder.classList.remove('c-ch1-blessed');
        g.reset();
        g.init('main', ['A', 'B']);
      });
    }
  });

  /* git 官方风格三点橙色 logo（纯 SVG，#F05133） */
  function gitLogo() {
    return '<svg width="96" height="96" viewBox="0 0 120 120" aria-hidden="true">' +
      '<g stroke="var(--git)" stroke-width="6" stroke-linecap="round">' +
        '<line x1="60" y1="98" x2="60" y2="40"/>' +
        '<line x1="60" y1="58" x2="92" y2="30"/>' +
      '</g>' +
      '<g fill="var(--git)">' +
        '<circle cx="60" cy="98" r="11"/>' +
        '<circle cx="60" cy="40" r="11"/>' +
        '<circle cx="92" cy="30" r="11"/>' +
      '</g></svg>';
  }

})();

</script>

      wrap.appendChild(svg);
      stage.appendChild(wrap);

      var hint = h("div", "c-ch2-tl-hint", "← / → 让版本依次生长 · 点任一节点看它的身份信息");
      stage.appendChild(hint);

      var edges = [], nodes = [];
      // edges first (under nodes)
      for (var i = 1; i < TL.length; i++) {
        var x1 = pad + (i - 1) * gap, x2 = pad + i * gap;
        var ed = s("path", { "class": "c-ch2-tl-edge", d: "M" + x1 + "," + cy + " L" + x2 + "," + cy });
        svg.appendChild(ed); edges.push(ed);
      }
      for (var j = 0; j < TL.length; j++) {
        var cx = pad + j * gap;
        var g = s("g", { "class": "c-ch2-tl-node", transform: "translate(" + cx + "," + cy + ")" });
        g.appendChild(s("circle", { r: 24, cx: 0, cy: 0 }));
        var num = s("text", { "class": "c-ch2-tl-num", x: 0, y: 0 }); num.textContent = TL[j].num;
        g.appendChild(num);
        var cap = s("text", { "class": "c-ch2-tl-cap", x: 0, y: 52 }); cap.textContent = TL[j].cap;
        g.appendChild(cap);
        svg.appendChild(g); nodes.push(g);
        bindNodeClick(g, j, cx, cy, svg);
      }

      function bindNodeClick(g, idx, ux, uy, svgRoot) {
        g.setAttribute("data-interactive", "1");
        g.addEventListener("click", function (e) {
          e.stopPropagation();
          if (!g.classList.contains("on")) return; // 还没点亮的节点不弹卡
          showCard(idx, ux, uy, svgRoot);
        });
      }

      function showCard(idx, ux, uy, svgRoot) {
        killStray(".c-ch2-pop");
        var pt = svgRoot.createSVGPoint(); pt.x = ux; pt.y = uy;
        var ctm = svgRoot.getScreenCTM();
        var px = window.innerWidth / 2, py = window.innerHeight / 2;
        if (ctm) { var sp = pt.matrixTransform(ctm); px = sp.x; py = sp.y - 26; }
        var m = TL_META[idx];
        var pop = h("div", "c-ch2-pop");
        pop.innerHTML =
          '<div class="msg">' + esc(TL[idx].num) + " " + esc(TL[idx].cap) + "</div>" +
          '<div class="row"><span class="k">message</span><span class="v">' + esc(m.msg) + "</span></div>" +
          '<div class="row"><span class="k">日期</span><span class="v">' + esc(m.date) + "</span></div>" +
          '<div class="row"><span class="k">作者</span><span class="v">' + esc(m.author) + "</span></div>" +
          '<div class="row"><span class="k">hash</span><span class="v blur">' + esc(m.hash) + "</span></div>" +
          '<div class="foot">message / 日期 / 作者 / hash 后面几屏细讲 →</div>';
        pop.style.left = px + "px"; pop.style.top = py + "px";
        document.body.appendChild(pop);
        clearTimeout(showCard._t);
        showCard._t = setTimeout(function () { killStray(".c-ch2-pop"); }, 3600);
      }

      function light(idx, animated) {
        edges.slice(0, idx).forEach(function (e) { e.classList.add("on"); });
        for (var k = 0; k <= idx; k++) {
          nodes[k].classList.add("on");
          if (animated && k === idx) {
            nodes[k].classList.add("pop");
            (function (nn) { setTimeout(function () { nn.classList.remove("pop"); }, 460); })(nodes[k]);
          }
        }
      }

      /* 6 节点从左到右依次点亮（分步） */
      for (var stp = 0; stp < TL.length; stp++) {
        (function (idx) {
          api.step(function (animated) { light(idx, animated); });
        })(stp);
      }

      api.onReset(function () { killStray(".c-ch2-pop"); });
    }
  });

  /* ============================================================
     屏 2.2 — commit message
     ============================================================ */
  window.registerScreen({
    chapter: CH,
    chapterName: CHNAME,
    id: "commit-message",
    title: "commit message",
    subtitle: "每次提交写一句话说明你干了啥",
    render: function (stage, api) {
      injectCSS();

      stage.appendChild(h("div", "sc-pill", "写给未来的你和队友"));
      var hh = h("h2", "sc-h2"); hh.style.marginTop = "12px";
      hh.textContent = "每次提交，写一句话说明你干了啥。";
      stage.appendChild(hh);

      var box = h("div", "c-ch2-msg-stage"); box.style.marginTop = "8px";
      stage.appendChild(box);

      /* 放大的节点 + 上方实时气泡 */
      var nodeWrap = h("div", "c-ch2-msg-node");
      var bubble = h("div", "c-ch2-msg-bubble");
      bubble.innerHTML = '<span class="ph">在下面输入框敲字，这里会实时显示…</span>';
      var dot = h("div", "c-ch2-msg-dot", "✓");
      nodeWrap.appendChild(bubble); nodeWrap.appendChild(dot);
      box.appendChild(nodeWrap);

      var input = h("input", "c-ch2-msg-input");
      input.type = "text";
      input.placeholder = "例如：修复登录按钮点击无反应";
      input.setAttribute("data-interactive", "1");
      input.value = "";
      box.appendChild(input);

      function refresh() {
        var v = input.value;
        bubble.classList.remove("good", "bad");
        if (!v) {
          bubble.innerHTML = '<span class="ph">在下面输入框敲字，这里会实时显示…</span>';
          return;
        }
        bubble.textContent = v;
      }
      input.addEventListener("input", refresh);

      /* 第 1 步：好 / 坏 对比卡 */
      var cmp = h("div", "c-ch2-msg-cmp"); cmp.style.marginTop = "6px";
      var good = h("div", "c-ch2-cmp-card good");
      good.innerHTML = '<div class="tag">✅ 好的 message</div>' +
        '<div class="ex">修复登录按钮点击无反应</div>' +
        '<div class="why">说清了「改了什么、解决了什么问题」，半年后也看得懂。</div>';
      var bad = h("div", "c-ch2-cmp-card bad");
      bad.innerHTML = '<div class="tag">❌ 偷懒的 message</div>' +
        '<div class="ex">update</div>' +
        '<div class="why">等于没写。回头翻历史，根本不知道这一版动了啥。</div>';
      cmp.appendChild(good); cmp.appendChild(bad);
      api.frag(cmp);
      box.appendChild(cmp);

      /* 点卡片 → 把示例灌进输入框 + 气泡，并给气泡上色 */
      good.setAttribute("data-interactive", "1");
      bad.setAttribute("data-interactive", "1");
      good.addEventListener("click", function (e) {
        e.stopPropagation();
        input.value = "修复登录按钮点击无反应";
        bubble.classList.remove("bad"); bubble.classList.add("good");
        bubble.textContent = input.value;
      });
      bad.addEventListener("click", function (e) {
        e.stopPropagation();
        input.value = "update";
        bubble.classList.remove("good"); bubble.classList.add("bad");
        bubble.textContent = input.value;
      });

      /* 第 2 步：把「效果→人话」收口（贴合主题词） */
      var card = h("div", "sc-card"); card.style.marginTop = "4px"; card.style.maxWidth = "720px";
      card.innerHTML =
        '<p class="sc-p"><b>你不用记 <span class="sc-mono">git commit -m</span> 怎么写</b>——' +
        "你只要用人话描述清楚『这一版我干了啥』，AI 就能替你提交得明明白白。</p>";
      api.frag(card);
      box.appendChild(card);

      /* 回退 / 重置时清空输入，保证幂等观感 */
      api.onReset(function () { input.value = ""; refresh(); });
    }
  });

  /* ============================================================
     屏 2.3 — commit id / hash（长短 id）
     ============================================================ */
  var FULL_HASH = "a1b2c3d4e5f6a7b8c9d0e1f2a3b4c5d6e7f8a9b0";
  var SHORT_HASH = "a1b2c3d";

  window.registerScreen({
    chapter: CH,
    chapterName: CHNAME,
    id: "commit-hash",
    title: "commit id / hash",
    subtitle: "每一版的身份证：长 id 前 7 位 ＝ 短 id",
    render: function (stage, api) {
      injectCSS();
      killStray(".c-ch2-toast,.c-ch2-chat");

      stage.appendChild(h("div", "sc-pill", "commit id / hash"));
      var hh = h("h2", "sc-h2"); hh.style.marginTop = "12px";
      hh.textContent = "每次 commit，Git 自动算出一个唯一哈希值。";
      stage.appendChild(hh);

      var box = h("div", "c-ch2-hash-stage"); box.style.marginTop = "10px";
      stage.appendChild(box);

      /* 节点 + 哈希串 */
      var hashBox = h("div", "c-ch2-hashbox");
      var dot = h("div", "c-ch2-hash-dot", "●");
      var hashStr = h("div", "c-ch2-hash-str sc-mono");
      hashStr.setAttribute("data-interactive", "1");
      hashStr.innerHTML =
        '<span class="c-ch2-hash-short">' + SHORT_HASH + "</span>" +
        '<span class="c-ch2-hash-rest">' + FULL_HASH.slice(SHORT_HASH.length) + "</span>";
      hashBox.appendChild(dot); hashBox.appendChild(hashStr);
      box.appendChild(hashBox);

      var tip = h("div", "c-ch2-hash-tip", "↑ 悬停时高亮的前 7 位，就是「短 id」");
      box.appendChild(tip);

      /* 第 1 步：解释长短 id（卡片） */
      var grid = h("div", "sc-grid");
      grid.style.gridTemplateColumns = "repeat(auto-fit,minmax(220px,1fr))";
      grid.style.maxWidth = "820px"; grid.style.width = "100%";
      var c1 = h("div", "sc-card");
      c1.innerHTML = '<p class="sc-p"><b style="color:var(--git)">前 7 位 ＝ 短 id</b><br>' +
        '<span class="sc-dim">长 id 和短 id 功能完全一样，平时报短的就够。</span></p>';
      var c2 = h("div", "sc-card");
      c2.innerHTML = '<p class="sc-p"><b style="color:var(--c-teal)">仓库内唯一</b><br>' +
        '<span class="sc-dim">像版本的身份证 / 代号——可以拿它和 AI 精确指代「某一版」。</span></p>';
      grid.appendChild(c1); grid.appendChild(c2);
      api.frag(grid);
      box.appendChild(grid);

      /* 第 2 步：操作区（复制 / 告诉 AI） */
      var actions = h("div", "c-ch2-hash-actions");
      var copyBtn = h("button", "sc-btn"); copyBtn.innerHTML = "📋 复制短 id";
      copyBtn.setAttribute("data-interactive", "1");
      var aiBtn = h("button", "sc-btn primary"); aiBtn.innerHTML = "💬 告诉 AI";
      aiBtn.setAttribute("data-interactive", "1");
      actions.appendChild(copyBtn); actions.appendChild(aiBtn);
      api.frag(actions);
      box.appendChild(actions);

      function toast(text) {
        killStray(".c-ch2-toast");
        var t = h("div", "c-ch2-toast", text);
        document.body.appendChild(t);
        void t.offsetWidth; t.classList.add("show");
        clearTimeout(toast._t);
        toast._t = setTimeout(function () {
          t.classList.remove("show");
          setTimeout(function () { if (t.parentNode) t.parentNode.removeChild(t); }, 300);
        }, 1800);
      }

      copyBtn.addEventListener("click", function (e) {
        e.stopPropagation();
        var done = function () { toast("已复制短 id：" + SHORT_HASH); };
        var fail = function () {
          // 兜底：选中文本
          try {
            var r = document.createRange(); r.selectNodeContents(hashStr.firstChild);
            var sel = window.getSelection(); sel.removeAllRanges(); sel.addRange(r);
          } catch (_) {}
          toast("已选中短 id：" + SHORT_HASH + "（按 Ctrl+C 复制）");
        };
        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(SHORT_HASH).then(done, fail);
        } else { fail(); }
      });

      aiBtn.addEventListener("click", function (e) {
        e.stopPropagation();
        killStray(".c-ch2-chat");
        var chat = h("div", "c-ch2-chat");
        chat.innerHTML = '<div class="who">🤖 发给 AI</div>' +
          '<div class="txt typing">正在输入…</div>';
        document.body.appendChild(chat);
        void chat.offsetWidth; chat.classList.add("show");
        var line = "帮我回退到 " + SHORT_HASH;
        var i = 0, txtEl = chat.querySelector(".txt");
        clearInterval(aiBtn._iv);
        aiBtn._iv = setInterval(function () {
          i++;
          if (i > line.length) {
            clearInterval(aiBtn._iv);
            txtEl.classList.remove("typing");
            return;
          }
          txtEl.textContent = "「" + line.slice(0, i) + "」";
        }, 45);
        clearTimeout(aiBtn._hide);
        aiBtn._hide = setTimeout(function () {
          chat.classList.remove("show");
          setTimeout(function () { if (chat.parentNode) chat.parentNode.removeChild(chat); }, 320);
        }, 4200);
      });

      /* 第 3 步：AI 命令卡——把效果翻成真命令 */
      var aiCard = api.aiCard({
        effect: "回到某个历史版本",
        say: "帮我回退到 " + SHORT_HASH,
        cmd: "git reset --hard " + SHORT_HASH
      });
      aiCard.style.marginTop = "6px";
      var holder = h("div"); holder.style.display = "flex"; holder.style.justifyContent = "center";
      holder.style.width = "100%";
      holder.appendChild(aiCard);
      api.frag(holder);
      box.appendChild(holder);

      api.onReset(function () { killStray(".c-ch2-toast,.c-ch2-chat"); });
    }
  });

  function esc(str) {
    return String(str).replace(/[&<>"]/g, function (c) {
      return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c];
    });
  }
})();

</script>

<script>
/* ============================================================

      ".c-ch3-commit circle{stroke:#010409;stroke-width:2}",
      ".c-ch3-fly{transition:transform 1s var(--ease)}",
      ".c-ch3-lr-actions{display:flex;gap:12px;justify-content:center;margin-top:18px;flex-wrap:wrap}",
      ".c-ch3-spark{position:fixed;width:7px;height:7px;border-radius:50%;background:var(--git);",
        "z-index:65;pointer-events:none;box-shadow:0 0 8px var(--git);will-change:transform,opacity}",
      /* ---------- github = git + hub (3.2) ---------- */
      ".c-ch3-eq{display:flex;align-items:center;justify-content:center;gap:16px;flex-wrap:wrap;",
        "font-family:var(--font-mono);font-weight:800;letter-spacing:-.02em;margin-top:6px}",
      ".c-ch3-eq .t{font-size:clamp(30px,6vw,64px)}",
      ".c-ch3-eq .git{color:var(--git)}",
      ".c-ch3-eq .hub{color:var(--c-teal)}",
      ".c-ch3-eq .op{color:var(--dim);font-weight:400}",
      ".c-ch3-note{text-align:center;color:var(--dim);font-size:14px;margin-top:6px}",
      ".c-ch3-hub-wrap{width:100%;max-width:880px;margin:10px auto 0}",
      ".c-ch3-hub-svg{width:100%;display:block;overflow:visible}",
      ".c-ch3-dev{transition:opacity .3s}",
      ".c-ch3-dev .face{fill:var(--pane2);stroke:var(--border);stroke-width:2}",
      ".c-ch3-repo-icon{fill:var(--git);opacity:.9}",
      ".c-ch3-hub-core{fill:var(--pane);stroke:var(--c-teal);stroke-width:3;",
        "transition:r .5s var(--ease),filter .5s}",
      ".c-ch3-hub-core.grow{filter:drop-shadow(0 0 14px rgba(45,212,191,.5))}",
      ".c-ch3-hub-label{font-family:var(--font-mono);font-weight:800;fill:var(--c-teal);text-anchor:middle;dominant-baseline:central}",
      ".c-ch3-thrown{opacity:0}",
      ".c-ch3-brands{display:flex;gap:14px;justify-content:center;margin-top:16px;flex-wrap:wrap}",

        "padding:7px 14px;border-radius:10px;background:var(--pane);border:1px solid var(--border);",
        "color:var(--dim);position:relative;transition:border-color .15s,color .15s}",
      ".c-ch3-brand:hover{border-color:var(--c-purple);color:var(--text)}",
      ".c-ch3-brand .bt{position:absolute;left:50%;bottom:calc(100% + 8px);transform:translateX(-50%);",
        "white-space:nowrap;background:var(--pane2);border:1px solid var(--c-purple);color:var(--text);",
        "font-size:12px;font-weight:600;padding:6px 12px;border-radius:9px;opacity:0;pointer-events:none;",
        "transition:opacity .2s}",
      ".c-ch3-brand:hover .bt{opacity:1}",

      ".c-ch3-init-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;width:100%;max-width:920px;margin:10px auto 0}",
      "@media(max-width:640px){.c-ch3-init-grid{grid-template-columns:1fr}}",
      ".c-ch3-folder{position:relative;min-height:210px}",
      ".c-ch3-folder .title{font-weight:700;margin-bottom:10px;font-size:15px}",
      ".c-ch3-filelist{display:flex;flex-direction:column;gap:7px;font-family:var(--font-mono);font-size:14px}",

      ".c-ch3-file.dimmed{opacity:.32;filter:grayscale(1);text-decoration:line-through;color:var(--dim)}",
      ".c-ch3-file .ic{opacity:.85}",
      ".c-ch3-git-dir{display:flex;align-items:center;gap:8px;padding:5px 9px;border-radius:8px;",
        "background:rgba(240,81,51,.1);border:1px dashed var(--git);color:var(--git);",
        "font-family:var(--font-mono);font-size:14px;max-height:0;overflow:hidden;opacity:0;",
        "transition:max-height .45s var(--ease),opacity .35s,margin .45s var(--ease)}",
      ".c-ch3-git-dir.show{max-height:48px;opacity:1;margin-top:7px}",
      ".c-ch3-repo-badge{position:absolute;top:0;right:0;font-family:var(--font-mono);font-size:11px;",
        "font-weight:700;color:var(--git);background:rgba(240,81,51,.12);border:1px solid var(--git);",

        "border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-top:6px}",
      ".c-ch3-ignore-file .fn{color:var(--c-amber);font-weight:700;margin-bottom:8px;display:block}",
      ".c-ch3-ignore-line{color:var(--c-teal);min-height:21px;line-height:1.5}",
      ".c-ch3-ignore-line.pending{opacity:.35}",
      ".c-ch3-init-actions{display:flex;gap:10px;margin-top:12px;flex-wrap:wrap}",
      /* 过桥卡 */
      ".c-ch3-bridge{width:100%;max-width:920px;margin:22px auto 0;",
        "background:linear-gradient(135deg,rgba(45,212,191,.12),rgba(167,139,250,.1));",
        "border:1px solid var(--c-teal);border-radius:18px;padding:20px 24px;",
        "display:flex;align-items:center;gap:18px;flex-wrap:wrap}",
      ".c-ch3-bridge .txt{flex:1;min-width:240px;line-height:1.6}",
      ".c-ch3-bridge .txt .ok{color:var(--c-teal);font-weight:800}",

    document.head.appendChild(st);
  }

  function killStray(sel) {
    var n = document.querySelectorAll(sel);
    for (var i = 0; i < n.length; i++) if (n[i].parentNode) n[i].parentNode.removeChild(n[i]);
  }

  var SVGNS = "http://www.w3.org/2000/svg";
  function s(name, attrs) {
    var e = document.createElementNS(SVGNS, name);
    if (attrs) for (var k in attrs) e.setAttribute(k, attrs[k]);
    return e;
  }
  function h(tag, cls, txt) {
    var e = document.createElement(tag);
    if (cls) e.className = cls;
    if (txt != null) e.textContent = txt;
    return e;
  }

  /* ============================================================
     屏 3.1 — local → remote
     ============================================================ */
  window.registerScreen({
    chapter: CH,
    chapterName: CHNAME,
    id: "local-remote",
    title: "local → remote",
    subtitle: "本地仓库 push 到云端远端仓库",
    render: function (stage, api) {
      injectCSS();

      /* 左：笔记本电脑 local repo */

      rt2.setAttribute("fill", "var(--c-teal)");
      svg.appendChild(cloud); svg.appendChild(rt1); svg.appendChild(rt2);

      /* 中间 push 通道 */
      var pipeY = lcy;
      var pStart = lx + lw, pEnd = rx;
      var pipe = s("path", { "class": "c-ch3-pipe", d: "M" + (pStart + 8) + " " + pipeY + " L" + (pEnd - 30) + " " + pipeY });
      var arrow = s("path", { "class": "c-ch3-arrow", d: "M" + (pEnd - 30) + " " + (pipeY - 11) + " L" + (pEnd - 6) + " " + pipeY + " L" + (pEnd - 30) + " " + (pipeY + 11) + " Z" });

      /* 本地 3 个 commit 节点 */
      var COLORS = ["var(--git)", "var(--c-amber)", "var(--c-purple)"];
      var commits = [];
      var startX = lx + 150, startGap = 56;

      function doPush() {

      wrap.appendChild(svg);
      stage.appendChild(wrap);

      var ccx = W / 2, ccy = H / 2 + 16;

      /* 中央 hub core */
      var coreR0 = 40, growStep = 11;
      var core = s("circle", { "class": "c-ch3-hub-core", cx: ccx, cy: ccy, r: coreR0 });

        svg.appendChild(repo);

      var thrownCount = 0;
      function throwOne(idx, animated) {

        if (animated) {

          r.el.style.opacity = "0";

        thrownCount = Math.max(thrownCount, idx + 1);
        growHub(thrownCount, animated);

      api.frag(card);
      stage.appendChild(card);

      var brands = h("div", "c-ch3-brands");
      ["GitLab", "Bitbucket"].forEach(function (name) {
        var b = h("div", "c-ch3-brand", name);
        var bt = h("span", "bt", "也是远端仓库服务");
        b.appendChild(bt);
        brands.appendChild(b);
      });
      var brandNote = h("div", "c-ch3-note"); brandNote.style.marginTop = "8px";
      brandNote.textContent = "同类的远端仓库服务 · 概念完全一样，换个网站而已";
      api.frag(brands);
      api.frag(brandNote);
      stage.appendChild(brands);
      stage.appendChild(brandNote);
    }
  });

  /* ============================================================

  window.registerScreen({
    chapter: CH,
    chapterName: CHNAME,
    id: "init-bridge",
    title: "git init / .gitignore",
    subtitle: "让文件夹变仓库 · 排除不该提交的文件",
    render: function (stage, api) {
      injectCSS();

      stage.appendChild(h("div", "sc-pill", "本地端的最后两块拼图"));
      var hh = h("h2", "sc-h2"); hh.style.marginTop = "12px";
      hh.innerHTML = '<span style="color:var(--git)">git init</span> 让文件夹变仓库 · ' +

      stage.appendChild(hh);

      var grid = h("div", "c-ch3-init-grid");

      /* ---- 左：普通文件夹 → git init → 长出 .git/ ---- */
      var left = h("div", "sc-card c-ch3-folder");
      var badge = h("div", "c-ch3-repo-badge", "✓ 这是一个仓库了");
      left.appendChild(badge);
      left.appendChild(h("div", "title", "📁 my-project/"));
      var fileList = h("div", "c-ch3-filelist");
      var FILES = [
        { name: "index.html", ic: "📄" },
        { name: "app.js", ic: "📄" },
        { name: "node_modules/", ic: "📦", ignore: true },

      /* ---- 右：.gitignore 写一行 → 对应文件变灰 ---- */
      var right = h("div", "sc-card c-ch3-folder");
      right.appendChild(h("div", "title", "🚫 .gitignore　决定哪些文件不进仓库"));
      var ignoreFile = h("div", "c-ch3-ignore-file");
      ignoreFile.innerHTML = '<span class="fn"># .gitignore</span>';
      var line1 = h("div", "c-ch3-ignore-line pending", "node_modules/");
      var line2 = h("div", "c-ch3-ignore-line pending", ".env");

      var rightActions = h("div", "c-ch3-init-actions");
      var addNode = h("button", "sc-btn"); addNode.innerHTML = "+ 加一行 node_modules/";

      var addEnv = h("button", "sc-btn"); addEnv.innerHTML = "+ 加一行 .env";

      var rightNote = h("p", "sc-p sc-dim"); rightNote.style.marginTop = "10px"; rightNote.style.fontSize = "13px";
      rightNote.textContent = "依赖、密钥、临时产物都不该进仓库——写进 .gitignore，左边对应文件就被排除（变灰）。";
      right.appendChild(rightNote);
      grid.appendChild(right);

      function ignore(name, lineEl, animated) {
        lineEl.classList.remove("pending");
        var fe = fileEls[name];
        if (fe) {
          if (!animated) fe.style.transition = "none";
          fe.classList.add("dimmed");

      addNode.addEventListener("click", function (e) { e.stopPropagation(); ignore("node_modules/", line1, true); });
      addEnv.addEventListener("click", function (e) { e.stopPropagation(); ignore(".env", line2, true); });

      /* steps：键盘流也能依次播放 init → ignore node_modules → ignore .env */
      api.step(function (animated) { doInit(animated); });
      api.step(function (animated) { ignore("node_modules/", line1, animated); });
      api.step(function (animated) { ignore(".env", line2, animated); });

      /* AI 命令卡：init 的人话版 */
      var aiHolder = h("div"); aiHolder.style.display = "flex"; aiHolder.style.justifyContent = "center";
      aiHolder.style.width = "100%"; aiHolder.style.marginTop = "18px";
      var aiCard = api.aiCard({
        effect: "把当前文件夹变成 Git 仓库",
        say: "帮我把这个项目初始化成 git 仓库，并忽略 node_modules 和 .env",
        cmd: "git init\nprintf 'node_modules/\\n.env\\n' > .gitignore"
      });
      aiHolder.appendChild(aiCard);
      api.frag(aiHolder);
      stage.appendChild(aiHolder);

      /* ---- 过桥卡 ---- */
      var bridge = h("div", "c-ch3-bridge");
      var txt = h("div", "txt");
      txt.innerHTML = '<span class="ok">✅ 到这里，Git 的本地端概念就齐了。</span><br>' +
        '<span class="nx">➡️ 接下来在 GitHub 网站上点哪些按钮</span>，去看『GitHub 网站』那一章。';
      var goBtn = h("a", "sc-btn primary", "去 GitHub 章 →");
      goBtn.setAttribute("data-interactive", "1");
      goBtn.setAttribute("data-bridge", "github");          // 框架接管的占位钩子
      goBtn.setAttribute("href", "github-tutorial.html"); // 兜底跳转
      bridge.appendChild(txt); bridge.appendChild(goBtn);
      api.frag(bridge);
      stage.appendChild(bridge);

      api.onReset(function () {
        // render 已重建 DOM，这里无需额外清理；保留钩子以符合契约
      });
    }
  });

  function esc(str) {
    return String(str).replace(/[&<>"]/g, function (c) {
      return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c];
    });
  }
})();

     · 每个 step(fn) 都是"从干净 graph 出发可幂等重建"的状态推进
     · 所有图状态由 step 重放确定，不依赖上一次 render 的残留
   ============================================================ */
(function () {

  var PURPLE = '#A78BFA';   // feature2

    if (typeof window.registerScreen === 'function') { window.registerScreen(def); }
    else { (window.__pendingScreens = window.__pendingScreens || []).push(def); }

            '<span class="c-ch4-hint">想自己玩？随便点上面的按钮 —— 不按顺序也不会崩。</span>' +
          '</div>' +
        '</div>' +
        styleBlock();

      var canvas = stage.querySelector('#c-ch4-canvas');
      var narrate = stage.querySelector('#c-ch4-narrate');
      var stepsBar = stage.querySelector('#c-ch4-steps');

      var STEPS = [
        {
          btn: '🟢 给我开一个 feature 分支',
          narrate: '分支刚建出来时和 main 一模一样 —— 指向同一个 commit，没有任何新东西。',
          ai: { effect: '开一条平行开发线', say: '给我开一个 feature 分支', cmd: 'git checkout -b feature' }
        },
        {
          btn: '✍️ 在 feature 上帮我提交一次',
          narrate: '这些改动只在 feature 上看得到，不影响 main —— 看下面，main 停在 C 一动不动。',
          ai: { effect: '改动只落在 feature 上', say: '把这些改动在 feature 上提交', cmd: 'git add . && git commit -m "wip"' },
          repeatable: true
        },
        {
          btn: '👥 再帮我开一条 feature2',
          narrate: '小 A 开信用分模块，小 B 开必读书模块 —— 两个互不相干的文件夹，可以同时开发。',
          ai: { effect: '两条线并行、互不打扰', say: '再开一条 feature2 给小 B 用', cmd: 'git checkout -b feature2 C' }
        },
        {
          btn: '🔀 把我的 feature 分支合并进 main',
          narrate: '开发完，把分支 merge 回主干 —— main 末端长出一个合并节点，把两条线汇到一起。',
          ai: { effect: '把成果汇回主干', say: '把我的 feature 分支合并进 main', cmd: 'git checkout main && git merge feature' }
        }
      ];
      /* 注意：STEPS 数组只有 4 项，因为"步 4.1 起点"是初始态(done=0)、
         不需要按钮；后面 4 个按钮分别对应 step 1..4(创建/提交/再开一条/合并)。 */

      var INITIAL_NARRATE =
        '默认每个仓库都有一条 <b style="color:' + MAIN + '">main</b>（主干）。' +
        'HEAD 🚩 现在挂在 main 的最新 commit <b>C</b> 上。';

      /* --------------------------------------------------------
         画图状态：把 done(0..5) 重建到 graph 上。幂等。
         done 0: main A B C, HEAD→main
         done 1: + feature off C (teal)
         done 2: + checkout feature, addCommit D (E... bonus)
         done 3: + feature2 off C (purple) + 一个 commit
         done 4: + merge feature into main
         -------------------------------------------------------- */
      function rebuild(level, anim, extraFeat) {
        g.reset();
        g.init('main', ['A', 'B', 'C']);

        if (level >= 1) {
          g.createBranch('feature', 'C', TEAL);
        }
        if (level >= 2) {
          g.checkout('feature');
          g.addCommit('feature', 'D', { anim: anim });
          var n = extraFeat || 0;
          var lbls = ['E', 'F', 'G'];
          for (var i = 0; i < n && i < lbls.length; i++) {
            g.addCommit('feature', lbls[i], { anim: anim });
          }
        }
        if (level >= 3) {
          g.createBranch('feature2', 'C', PURPLE);
          g.checkout('feature2');
          g.addCommit('feature2', 'P', { anim: anim });
        }
        if (level >= 4) {
          g.checkout('main');
          g.merge('feature', 'main');
        }
      }

      /* highlight main 强调它"没动"(步 4.3) —— 在重建后单独加 */
      function emphasizeMainStill(on) {
        try { g.highlight('C', !!on); } catch (e) {}
      }

      /* --------------------------------------------------------
         面板渲染：按钮 + AICommandCard
         -------------------------------------------------------- */
      function renderPanel() {
        // 按钮：i 对应 step (i+1)。只有"下一个该走的 step"高亮可点；
        // 已完成的标 ✓；未轮到的禁用。可重复的步(4.3)在已激活时仍可点(加 bonus commit)。
        stepsBar.innerHTML = '';
        STEPS.forEach(function (s, i) {
          var stepNo = i + 1;            // 1..4
          var isDone = done >= stepNo;
          var isNext = done === i;       // 下一步
          var b = document.createElement('button');
          b.className = 'c-ch4-step sc-btn' +
            (isDone ? ' is-done' : '') +
            (isNext ? ' is-next' : '');
          b.setAttribute('data-interactive', '1');
          b.textContent = (isDone ? '✓ ' : '') + s.btn;
          // 守卫：只有"下一步"可点；可重复步在完成后也允许继续点
          var clickable = isNext || (isDone && s.repeatable && stepNo === 2 && done === 2);
          b.disabled = !clickable;
          b.addEventListener('click', function () {
            if (isNext) {
              api.next();               // 推进到这一步（走 framework 的 step 链）
            } else if (s.repeatable && done === 2 && stepNo === 2) {
              // 4.3 已完成、想在 feature 上再提交一笔 —— 当场长一个 commit
              if (bonus < 3) {
                bonus++;
                g.addCommit('feature', ['E', 'F', 'G'][bonus - 1], { anim: true });
                renderPanel();
              }
            }
          });
          stepsBar.appendChild(b);
        });

        // 当 4.3 已完成，给"继续提交"一点提示
        var hint = document.createElement('div');
        hint.className = 'c-ch4-rephint';
        if (done === 2) {
          hint.innerHTML = '再点一次 ✍️ 就能在 feature 上多长一个 commit（已加 ' + bonus + ' 个）。';
        }
        stepsBar.appendChild(hint);

        // AICommandCard：显示"当前动作"。done=0 时给一张引导卡。
        aiSlot.innerHTML = '';
        var ai;
        if (done === 0) {
          ai = { effect: '起点：一条 main 主干', say: '（先看看现状，再开始动手）', cmd: 'git status   # On branch main' };
        } else {
          ai = STEPS[done - 1].ai;     // 最近完成的那步对应的卡
        }
        aiSlot.appendChild(api.aiCard(ai));
      }

      function setNarrate(html) { narrate.innerHTML = html; }

      /* --------------------------------------------------------
         初始态（步 4.1 起点 main） —— render 一进来就显示
         -------------------------------------------------------- */
      rebuild(0, false, 0);
      done = 0; bonus = 0;
      setNarrate(INITIAL_NARRATE);
      renderPanel();

      /* --------------------------------------------------------
         5 步推进
         step 1 = 4.2 新建分支
         step 2 = 4.3 在分支上提交
         step 3 = 4.4 再开一条 feature2
         step 4 = 4.5 合并回 main
         （步 4.1 是初始态，不占 api.step）
         每个 fn(animated)：animated=false 时是后退/重放，瞬间到位不播动画。
         -------------------------------------------------------- */

      // 步 4.2 · 新建 feature 分支
      api.step(function (animated) {
        done = 1; bonus = 0;
        rebuild(1, animated, 0);
        emphasizeMainStill(false);
        setNarrate('分支刚建出来时和 main <b>一模一样</b> —— ' +
          '<b style="color:' + TEAL + '">feature</b> 和 main 并排贴在同一个 commit <b>C</b> 上。');
        renderPanel();
      });

      // 步 4.3 · 在 feature 上提交（长出 D，HEAD 跟到末端；main 高亮强调没动）
      api.step(function (animated) {
        done = 2; bonus = 0;
        rebuild(2, animated, 0);
        emphasizeMainStill(true);  // 高亮 C，强调 main 没动
        setNarrate('这些改动<b>只在 feature 上看得到，不影响 main</b> —— ' +
          'HEAD 🚩 跟到了 feature 末端，而 main 还停在高亮的 <b>C</b> 上。');
        renderPanel();
      });

      // 步 4.4 · 再开一条 feature2，并在其上提交（两条彩线并行）
      api.step(function (animated) {
        done = 3; bonus = 0;
        rebuild(3, animated, 0);
        emphasizeMainStill(false);
        setNarrate('小 A 开<b style="color:' + TEAL + '">信用分模块</b>，' +
          '小 B 开<b style="color:' + PURPLE + '">必读书模块</b> —— ' +
          '两个互不相干的文件夹，<b>可以同时开发</b>，两条彩线并行。');
        renderPanel();
      });

      // 步 4.5 · 把 feature 合并进 main（main 末端长出合并节点，连线汇入）
      api.step(function (animated) {
        done = 4; bonus = 0;
        rebuild(4, animated, 0);
        emphasizeMainStill(false);
        setNarrate('开发完，把分支 <b style="color:var(--git)">merge</b> 回主干 —— ' +
          'main 末端长出一个<b>合并节点</b>，feature 的成果汇入 main。🎉');
        renderPanel();
      });

      /* --------------------------------------------------------
         R 重置 / 底部🔄重置 —— 复位到步 4.1
         -------------------------------------------------------- */
      function resetToStart() {
        done = 0; bonus = 0;
        rebuild(0, true, 0);
        emphasizeMainStill(false);
        setNarrate(INITIAL_NARRATE);
        renderPanel();
      }
      api.onReset(resetToStart);
      stage.querySelector('#c-ch4-reset').addEventListener('click', function () {
        resetToStart();
        // 也把 framework 的 step 指针拉回 0：等价于按住 R。借 api 没有直接 setStep，
        // 但 onReset 已注册，这里点按钮时我们手动复位视觉，并请框架重置。
        // framework 的 R 会调 resetScreen()(复位 step) —— 这里只复位视觉即可，
        // 若用户接着按空格会从 step1 重新走。
      });
    }
  });

  /* ============================================================
     样式（限定 c-ch4- 前缀，复用 _shell 的 tokens / sc-* class）
     ============================================================ */
  function styleBlock() {
    return '' +
'<style>' +
'.c-ch4-wrap{width:100%;display:flex;flex-direction:column;gap:clamp(12px,2vh,22px)}' +
'.c-ch4-head{display:flex;flex-direction:column;gap:8px}' +
'.c-ch4-head .sc-pill{align-self:flex-start}' +

'.c-ch4-narrate b{color:var(--c-teal)}' +

'.c-ch4-grid{display:grid;grid-template-columns:2fr 1fr;gap:clamp(14px,2vw,26px);align-items:stretch}' +
'@media (max-width:880px){.c-ch4-grid{grid-template-columns:1fr}}' +

'.c-ch4-canvas{display:flex;align-items:center;justify-content:center;min-height:300px;padding:clamp(14px,2vw,28px);overflow:hidden}' +
'.c-ch4-canvas .cg-wrap{width:100%}' +

'.c-ch4-panel{display:flex;flex-direction:column;gap:16px;min-width:0}' +
'.c-ch4-steps{display:flex;flex-direction:column;gap:10px}' +
'.c-ch4-step{justify-content:flex-start;text-align:left;width:100%;white-space:normal;line-height:1.3}' +
'.c-ch4-step.is-next{border-color:var(--c-teal);color:var(--c-teal);' +
  'animation:c-ch4-glow 1.8s ease-in-out infinite}' +
'.c-ch4-step.is-done{background:rgba(45,212,191,.12);border-color:rgba(45,212,191,.5);color:var(--c-teal)}' +
'.c-ch4-step:disabled{opacity:.4;cursor:not-allowed;animation:none}' +
'@keyframes c-ch4-glow{0%,100%{box-shadow:0 0 0 1px rgba(45,212,191,.35)}' +
  '50%{box-shadow:0 0 0 2px rgba(45,212,191,.35),0 0 16px rgba(45,212,191,.4)}}' +
'.c-ch4-rephint{font-size:12.5px;color:var(--dim);min-height:1.2em;padding-left:2px}' +
'.c-ch4-aislot{margin-top:2px}' +
'.c-ch4-aislot .aicard{max-width:none}' +

'.c-ch4-foot{display:flex;align-items:center;gap:14px;flex-wrap:wrap;' +
  'border-top:1px solid var(--border);padding-top:14px}' +
'.c-ch4-hint{font-size:13px;color:var(--dim)}' +
'</style>';
  }

})();

<script>
/* ============================================================
 * 第 5 章 · HEAD 与指针  (chapter:5, play:true)
 * 屏 5.1 head-what     · HEAD 是什么（HEAD🚩 稳插 D，可拖拽提示）

 * 样式前缀: c-ch5-

(function () {

  function injectStyle() {

      'animation:c-ch5-breathe 2.2s ease-in-out infinite;cursor:grab;user-select:none;}',
      '.c-ch5-drag-tip:active{cursor:grabbing;}',
      '@keyframes c-ch5-breathe{0%,100%{transform:translateY(0);box-shadow:0 0 0 0 color-mix(in srgb,var(--git) 30%,transparent);}50%{transform:translateY(-2px);box-shadow:0 0 0 7px color-mix(in srgb,var(--git) 0%,transparent);}}',

      /* HEAD 呼吸高亮覆盖在 svg 上方的发光环（屏 5.1） */
      '.c-ch5-headpulse{position:absolute;pointer-events:none;width:62px;height:30px;border-radius:6px;',
      'border:2px solid var(--git);opacity:0;transform:translate(-50%,-50%);',
      'animation:c-ch5-headring 2s ease-in-out infinite;}',
      '@keyframes c-ch5-headring{0%,100%{opacity:.15;transform:translate(-50%,-50%) scale(.92);}50%{opacity:.8;transform:translate(-50%,-50%) scale(1.12);}}',

      /* 落点按钮组（拖拽不可用时的模拟）—— 做成「把 HEAD 拖/送到这里」的目标格 */
      '.c-ch5-drops{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;}',

      '.c-ch5-drop .tag{opacity:.6;font-weight:400;}',

      /* 状态说明条 */
      '.c-ch5-state{font-size:14px;color:var(--dim);min-height:1.5em;text-align:center;transition:color .3s;}',
      '.c-ch5-state.warn{color:var(--info);font-weight:600;}',
      '.c-ch5-state.ok{color:var(--c-teal);font-weight:600;}',

      /* 5.4 两种姿势的迷你示意 */

      '.c-ch5-mini h4 .way1{color:var(--info);}',

    ].join('');
    document.head.appendChild(s);
  }

  /* 把发光呼吸环对齐到某个 commit 的 HEAD 旗位置（page 坐标 → graphbox 内相对坐标）。
     旗在节点上方约 48px（stem 顶 + 旗中心）。失败时静默忽略（幂等友好）。 */
  function placeHeadPulse(box, g, commitId) {
    var ring = box.querySelector('.c-ch5-headpulse');
    if (!ring) return;
    var xy = g.getNodeXY(commitId);
    var boxRect = box.getBoundingClientRect();
    if (!xy || !boxRect.width) { ring.style.opacity = '0'; return; }
    ring.style.left = (xy.x - boxRect.left) + 'px';
    ring.style.top = (xy.y - boxRect.top - 48) + 'px';
  }

  /* ====================================================== */
  /* 屏 5.1 — HEAD 是什么                                    */

  window.registerScreen({
    chapter: 5,
    chapterName: 'HEAD 与指针',

    render: function (stage, api) {
      injectStyle();
      stage.innerHTML =
        '<div class="c-ch5-wrap">' +
          '<h2 class="sc-h2 sc-center">🚩 HEAD = 你现在站在哪</h2>' +
          '<p class="sc-lead c-ch5-lead">你在<b style="color:var(--c-teal)">哪个分支</b>，就看到这个分支的<b style="color:var(--c-teal)">最新 commit</b>。' +
            '那面 <span class="sc-mono" style="color:var(--git)">HEAD</span> 小旗，现在就稳稳插在 <span class="sc-mono">main</span> 的最新提交 D 上。</p>' +
          '<div class="c-ch5-graphbox" id="c-ch5-1-box">' +

          '</div>' +
          '<div class="c-ch5-controls" id="c-ch5-1-ctrl"></div>' +
        '</div>';

      var box = stage.querySelector('#c-ch5-1-box');
      var g = api.graph(box, {});
      g.init('main', ['A', 'B', 'C', 'D']);

      // 呼吸环对齐到 D（HEAD 当前所在）。需在布局稳定后取坐标。
      function align() { placeHeadPulse(box, g, 'D'); }
      requestAnimationFrame(function () { requestAnimationFrame(align); });

      // step 1：浮出「试试把我拖到别处 →」提示

      ctrl.innerHTML =
        '<span class="c-ch5-drag-tip" data-interactive="1" title="下一屏可以拖动它">' +

  });

  /* ====================================================== */
  /* 屏 5.2 — 分离头指针                                     */
  /* ====================================================== */
  window.registerScreen({
    chapter: 5,
    chapterName: 'HEAD 与指针',
    id: 'detached',
    title: '分离头指针',
    subtitle: 'detached HEAD',
    play: true,
    render: function (stage, api) {
      injectStyle();
      stage.innerHTML =
        '<div class="c-ch5-wrap">' +
          '<h2 class="sc-h2 sc-center">把 HEAD 拖离分支会怎样？</h2>' +
          '<p class="sc-lead c-ch5-lead">把 <span class="sc-mono" style="color:var(--git)">HEAD</span> 旗拖到中间的 <span class="sc-mono">B</span>——' +
            '它会绕开分支，<b style="color:var(--c-teal)">直接钉在某个历史 commit 上</b>。这就是分离头指针。</p>' +
          '<div class="c-ch5-graphbox" id="c-ch5-2-box"></div>' +
          '<div class="c-ch5-state" id="c-ch5-2-state">现在 HEAD 挂在 <span class="sc-mono">main</span> 上，指着最新的 D —— 一切正常（暖色）。</div>' +
          '<div class="c-ch5-controls">' +
            '<div class="c-ch5-drops" id="c-ch5-2-drops">' +
              '<button class="c-ch5-drop" data-target="B">⤵ 把 HEAD 拖到 <b>B</b> <span class="tag">历史 commit</span></button>' +
              '<button class="c-ch5-drop is-on" data-target="main">↩ 拖回 <b>main 头部 D</b> <span class="tag">分支头</span></button>' +
            '</div>' +
          '</div>' +
          '<p class="c-ch5-hint sc-center">落在<b>非分支头</b>→进入分离态（冷色+警告带）；落回<b>分支头</b>→恢复暖色。</p>' +
        '</div>';

      var box = stage.querySelector('#c-ch5-2-box');
      var stateEl = stage.querySelector('#c-ch5-2-state');
      var drops = stage.querySelector('#c-ch5-2-drops');
      var g = api.graph(box, {});
      g.init('main', ['A', 'B', 'C', 'D']);

      // 落点处理：target 'B' = 历史 commit → 分离态；'main' = 分支头 → 恢复
      function landOn(target) {
        if (target === 'B') {
          g.checkout('B'); // ref 为历史 commitId → 框架进入分离态：整图冷色 + 警告带 + HEAD 特殊样式
          stateEl.className = 'c-ch5-state warn';
          stateEl.innerHTML = '⚠️ 现在 HEAD 直接钉在历史 commit <span class="sc-mono">B</span> 上，<b>不挂在任何分支</b>。注意 main 标签仍留在 D 没动。';
        } else {
          g.checkout('main'); // 回到分支头 → 恢复暖色
          stateEl.className = 'c-ch5-state ok';
          stateEl.innerHTML = '✓ HEAD 拖回 <span class="sc-mono">main</span> 头部 D，恢复正常（暖色）。';
        }
        drops.querySelectorAll('.c-ch5-drop').forEach(function (b) {
          b.classList.toggle('is-on', b.getAttribute('data-target') === target);
        });
      }

      // —— 特性探测：框架若已实现拖拽回调就用真拖拽，否则按钮模拟 ——
      if (typeof g.onHeadDrop === 'function') {
        g.onHeadDrop(function (targetId, isBranchHead) {
          landOn(isBranchHead ? 'main' : (targetId === 'B' ? 'B' : 'main'));
        });
      }
      // 按钮始终绑定（也是无障碍 / 触屏后备）
      drops.querySelectorAll('.c-ch5-drop').forEach(function (btn) {
        btn.addEventListener('click', function () { landOn(btn.getAttribute('data-target')); });
      });

      // step 1：观众动手 —— 自动演示一次「拖到 B → 分离态」，让分步播放也能讲清
      api.step(function (animated) {
        landOn('B');
      });
      // step 2：拖回 main 恢复暖色
      api.step(function (animated) {
        landOn('main');
      });

      // 重置回初始暖色态
      api.onReset(function () { landOn('main'); });
    }
  });

  /* ====================================================== */
  /* 屏 5.3 — 孤儿 commit / 宇航员                            */
  /* ====================================================== */
  window.registerScreen({
    chapter: 5,
    chapterName: 'HEAD 与指针',
    id: 'orphan',
    title: '孤儿 commit',
    subtitle: '飘走的宇航员',
    play: true,
    render: function (stage, api) {
      injectStyle();
      stage.innerHTML =
        '<div class="c-ch5-wrap">' +
          '<h2 class="sc-h2 sc-center">在分离态里提交，会发生什么？</h2>' +
          '<p class="sc-lead c-ch5-lead">现在 HEAD 钉在历史 commit <span class="sc-mono">B</span>（分离态）。' +
            '你在这里提交一次，新 commit <b style="color:var(--c-teal)">长出来了，却没有任何分支牵着它</b>。</p>' +
          '<div class="c-ch5-graphbox" id="c-ch5-3-box"></div>' +
          '<div class="c-ch5-state warn" id="c-ch5-3-state">⚠️ 分离态 —— 此处的新 commit 无分支收留。</div>' +
          '<div class="c-ch5-controls" id="c-ch5-3-ctrl">' +
            '<button class="sc-btn" id="c-ch5-3-commit" data-interactive="1">＋ 在这个状态提交一次</button>' +
            '<button class="sc-btn primary" id="c-ch5-3-rescue" data-interactive="1" style="display:none;">🪢 救回来</button>' +
          '</div>' +
          '<p class="sc-p c-ch5-lead sc-dim" id="c-ch5-3-note" style="max-width:760px;"></p>' +
        '</div>';

      var box = stage.querySelector('#c-ch5-3-box');
      var stateEl = stage.querySelector('#c-ch5-3-state');
      var noteEl = stage.querySelector('#c-ch5-3-note');
      var commitBtn = stage.querySelector('#c-ch5-3-commit');
      var rescueBtn = stage.querySelector('#c-ch5-3-rescue');

      var g = api.graph(box, {});
      g.init('main', ['A', 'B', 'C', 'D']);
      g.checkout('B'); // 进屏即处于分离态（承接上一屏）

      var committed = false;
      var rescued = false;

      function doCommit() {
        if (committed) return;
        committed = true;
        // 分离态提交 → 框架自动：建孤儿节点 X(ghost) + 宇航员飘走 (commitDetached 内部已调 api.astronaut)
        g.commitDetached('X');
        stateEl.className = 'c-ch5-state warn';
        stateEl.innerHTML = '👨‍🚀 commit <span class="sc-mono">X</span> 成了孤儿，飘出了主干 —— 没有分支牵着它。';
        noteEl.textContent = '分离态下的新 commit 成了孤儿 commit，飘在数据海里，像飘出空间站、被遗忘的宇航员。' +
          '它不会立刻消失，但你一旦切走，几乎再也找不回它 —— 除非现在就给它一条分支。';
        commitBtn.disabled = true;
        commitBtn.style.opacity = '.5';
        commitBtn.style.cursor = 'default';
        rescueBtn.style.display = '';
      }

      function doRescue() {
        if (!committed || rescued) return;
        rescued = true;
        // 给孤儿建分支收留 → 连回、恢复正常色、HEAD 重新挂分支（rescue 内部已处理）
        g.rescue('X', 'rescue', '#A78BFA');
        g.highlight('X', true);
        stateEl.className = 'c-ch5-state ok';
        stateEl.innerHTML = '✓ 建了一条 <span class="sc-mono" style="color:var(--c-purple)">rescue</span> 分支收留 X —— 它连回了正常时间线，宇航员被接回空间站。';
        noteEl.textContent = '只要在切走之前给孤儿建一条分支，它就从「飘走的宇航员」变回「有人牵着的正常提交」。' +
          '这正是第 5.4 屏要讲的：想保住历史，给它一条分支。';
        rescueBtn.disabled = true;
        rescueBtn.style.opacity = '.5';
        rescueBtn.style.cursor = 'default';
      }

      commitBtn.addEventListener('click', doCommit);
      rescueBtn.addEventListener('click', doRescue);

      // 分步：① 提交成孤儿  ② 救回来
      api.step(function (animated) {
        // 后退重放：保持终态，但 commitDetached 会重复创建 X —— 故重放时只在尚未提交时执行
        if (!committed) doCommit();
      });
      api.step(function (animated) {
        if (!rescued) doRescue();
      });

      api.onReset(function () {
        committed = false; rescued = false;
        g.reset();
        g.init('main', ['A', 'B', 'C', 'D']);
        g.checkout('B');
        stateEl.className = 'c-ch5-state warn';
        stateEl.innerHTML = '⚠️ 分离态 —— 此处的新 commit 无分支收留。';
        noteEl.textContent = '';
        commitBtn.disabled = false; commitBtn.style.opacity = ''; commitBtn.style.cursor = '';
        rescueBtn.style.display = 'none'; rescueBtn.disabled = false; rescueBtn.style.opacity = ''; rescueBtn.style.cursor = '';
      });
    }
  });

  /* ====================================================== */
  /* 屏 5.4 — 洞察小结                                        */
  /* ====================================================== */
  window.registerScreen({

    chapterName: 'HEAD 与指针',

    title: '洞察小结',

    render: function (stage, api) {

      stage.innerHTML =
        '<div class="c-ch5-wrap">' +
