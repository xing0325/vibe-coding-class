            '</svg>' +

            '<div class="deck-grid c-math-2col">' +
              '<div class="deck-card">' +
                '<div class="c-math-bh">🏷️ 分支 = 一行字的小文件</div>' +
                '<p class="deck-p" style="margin:0">本质上就是个<b>几十字节</b>的文件，里面只写着<b>某个 commit 的哈希</b>。' +
                '所谓"切分支"，就是改了这一行字而已。</p>' +
              '</div>' +
              '<div class="deck-card">' +
                '<div class="c-math-bh">📍 HEAD = 指向分支的指针</div>' +
                '<p class="deck-p" style="margin:0">HEAD 记的是"你<b>现在在哪个分支上</b>"。' +
                '它指向 main，main 指向某个 commit——一层套一层的指针。</p>' +
              '</div>' +
            '</div>' +

            '<style>' +
            '.c-math-branch{display:block;margin:16px auto;max-width:620px;}' +
            '.c-math-2col{grid-template-columns:1fr 1fr;max-width:680px;margin:14px auto 0;}' +
            '.c-math-bh{font-weight:700;color:var(--c-fg);margin-bottom:6px;}' +
            '</style>';
        }
      },

      // ========================================================
      // Slide 9 · 回收前面所有"啊哈"（总结页）
      // ========================================================
      {
        title: '所有"啊哈"在这里收束',
        render: function (stage, api) {
          var rows = [
            ['⚡', '为什么"切分支""开 worktree"那么快又便宜？',
              '因为只是动了<b>几十字节的指针</b>，一行代码都没复制。'],
            ['🗑️', '为什么 git"不会真正删东西"？',
              '删分支只是<b>擦掉一张便利贴</b>，commit 对象还好端端躺在仓库里。'],
            ['🆔', '为什么 commit 的 hash 能当"代号"跟 AI 指代某个版本？',
              '因为它是<b>全局唯一、由内容决定</b>的指纹，指哪个版本绝不会认错。'],
            ['🧱', '为什么相同内容不重复占空间？',
              '内容寻址自动去重——<b>哈希一样就只存一份</b>。']
          ];
          stage.innerHTML =
            '<h2 class="deck-h2">现在，前面的"啊哈"全都<span style="color:var(--course-accent)">接上线了</span></h2>' +
            '<p class="deck-lead">用这一章的骨架，回头看那些你曾经觉得"很神奇"的事，全都顺理成章：</p>' +

            '<div class="c-math-recap">' +
              rows.map(function (r, i) {
                return (
                  '<div class="c-math-recap-row" style="animation-delay:' + (i * 110) + 'ms">' +
                    '<div class="c-math-recap-ico">' + r[0] + '</div>' +
                    '<div class="c-math-recap-body">' +
                      '<div class="c-math-recap-q">' + r[1] + '</div>' +
                      '<div class="c-math-recap-a">' + r[2] + '</div>' +
                    '</div>' +
                  '</div>'
                );
              }).join('') +
            '</div>' +

            '<div class="deck-callout c-math-recap-sum">' +
              '<div class="deck-h2" style="margin:0 0 6px;font-size:18px">一句话的美：</div>' +
              'git ＝ 一堆<b style="color:var(--course-accent)">不可变的、用内容哈希命名的对象</b>（历史）' +
              '　＋　一层<b style="color:var(--course-accent)">可以自由移动的轻量指针</b>（分支 / HEAD）。' +
              '<br><span style="color:var(--c-fg-muted)">不可变的<b>骨</b>，可动的<b>皮</b>。</span>' +
            '</div>' +

            '<style>' +
            '.c-math-recap{max-width:680px;margin:18px auto 0;display:flex;flex-direction:column;gap:10px;}' +
            '.c-math-recap-row{display:flex;gap:14px;align-items:flex-start;background:var(--c-bg-card);border:1px solid var(--c-border);border-left:3px solid var(--course-accent);border-radius:10px;padding:13px 16px;animation:c-math-slidein .5s both cubic-bezier(.34,1.56,.64,1);}' +
            '@keyframes c-math-slidein{from{opacity:0;transform:translateX(-14px)}to{opacity:1;transform:none}}' +
            '.c-math-recap-ico{font-size:24px;line-height:1.2;flex-shrink:0;}' +
            '.c-math-recap-q{font-size:14px;color:var(--c-fg);font-weight:600;margin-bottom:4px;}' +
            '.c-math-recap-a{font-size:13px;color:var(--c-fg-muted);line-height:1.5;}' +
            '.c-math-recap-sum{max-width:680px;margin:20px auto 0;text-align:left;}' +
            '</style>';
        }
      },

      // ========================================================
      // Slide 10 · 收尾金句（大字）
      // ========================================================
      {
        title: '一句话记住它',
        render: function (stage, api) {
          stage.innerHTML =
            '<div class="deck-center c-math-final">' +
              '<svg class="c-math-final-svg" viewBox="0 0 320 200" width="280" aria-hidden="true">' +
                // 一座改不动的山
                '<path d="M20,170 L110,60 L170,120 L220,50 L300,170 Z" fill="var(--c-bg-soft)" stroke="var(--course-accent)" stroke-width="2"/>' +
                '<path d="M110,60 L132,84 L150,70 L170,120 L110,60Z" fill="rgba(227,179,65,0.15)"/>' +
                // 山上一面旗（旗杆 + 飘动的旗）
                '<line x1="222" y1="50" x2="222" y2="14" stroke="var(--c-fg)" stroke-width="2.5" stroke-linecap="round"/>' +
                '<path id="c-math-flag" d="M222,18 Q244,12 266,18 Q244,30 222,30 Z" fill="var(--course-accent)"/>' +
                '<circle cx="222" cy="50" r="4" fill="var(--course-accent)"/>' +
              '</svg>' +

              '<h1 class="deck-h1 c-math-final-quote">' +
                '历史是一座<span style="color:var(--course-accent)">改不动的山</span>，<br>' +
                '分支只是山上<span style="color:var(--course-accent)">一面随风的旗</span>。' +
              '</h1>' +

              '<p class="deck-lead c-math-final-sub">' +
                '理解了这一层，你就懂了 git 为什么这么设计、为什么这么美——' +
                '<br>不可变的骨，给你<b>信任</b>；可动的皮，给你<b>自由</b>。' +
              '</p>' +

              '<div class="c-math-final-tags">' +
                '<span class="c-math-final-tag">#哈希</span>' +
                '<span class="c-math-final-tag">#内容寻址</span>' +
                '<span class="c-math-final-tag">#默克尔链</span>' +
                '<span class="c-math-final-tag">#不可篡改</span>' +
              '</div>' +
            '</div>' +

            '<style>' +
            '.c-math-final{padding-top:6px;}' +
            '.c-math-final-svg{display:block;margin:0 auto 14px;filter:drop-shadow(0 0 18px var(--course-accent-soft));}' +
            '#c-math-flag{transform-box:fill-box;transform-origin:left center;animation:c-math-wave 2.2s ease-in-out infinite;}' +
            '@keyframes c-math-wave{0%,100%{transform:skewY(0) scaleX(1)}50%{transform:skewY(-4deg) scaleX(.94)}}' +
            '.c-math-final-quote{font-size:34px;line-height:1.35;margin:6px auto 0;max-width:680px;}' +
            '.c-math-final-sub{margin-top:18px;color:var(--c-fg-muted);max-width:600px;}' +
            '.c-math-final-tags{display:flex;justify-content:center;flex-wrap:wrap;gap:10px;margin-top:24px;}' +
            '.c-math-final-tag{font-family:ui-monospace,monospace;font-size:13px;color:var(--course-accent);background:var(--c-bg-soft);border:1px solid var(--c-border);border-radius:999px;padding:5px 14px;}' +
            '</style>';
        }
      }

    ]
  });
})();

</script>


<script>
(function () {
  'use strict';
  var CHAPTERS = [];
  var registered = window.__pendingChapters || [];

  // registerChapter 可能在本脚本之前或之后被章节模块调用
  window.registerChapter = function (ch) {
    CHAPTERS.push(ch);
    if (window.__courseReady) renderHome();
  };
  // 消费在引擎加载前就注册的章节
  if (Array.isArray(registered)) registered.forEach(function (c) { CHAPTERS.push(c); });

  var state = { chapterIdx: 0, slideIdx: 0, seen: {} };

  var $ = function (s) { return document.querySelector(s); };
  var homeEl = $('#course-home'), deckEl = $('#course-deck');
  var stageEl = $('#deck-stage'), dotsEl = $('#deck-dots');
  var titleEl = $('#deck-title'), emojiEl = $('#deck-emoji'), chipEl = $('#deck-chip'), countEl = $('#deck-count');
  var prevBtn = $('#deck-prev'), nextBtn = $('#deck-next'), backBtn = $('#deck-back');
  var progFill = $('#course-progress').firstElementChild;

  function sortedChapters() {
    return CHAPTERS.slice().sort(function (a, b) { return (a.index || 0) - (b.index || 0); });
  }

  function setTheme(hex) {
    document.documentElement.style.setProperty('--course-accent', hex || '#2f81f7');
    document.documentElement.style.setProperty('--course-accent-soft', hexToSoft(hex || '#2f81f7'));
  }
  function hexToSoft(hex) {
    var h = hex.replace('#', '');
    if (h.length === 3) h = h.split('').map(function (c) { return c + c; }).join('');
    var r = parseInt(h.substr(0, 2), 16), g = parseInt(h.substr(2, 2), 16), b = parseInt(h.substr(4, 2), 16);
    return 'rgba(' + r + ',' + g + ',' + b + ',0.15)';
  }

  function renderHome() {
    var chs = sortedChapters();
    var grid = $('#chapter-grid');
    grid.innerHTML = '';
    chs.forEach(function (ch, i) {
      var card = document.createElement('div');
      card.className = 'chapter-card';
      card.style.setProperty('--cc', ch.theme || '#2f81f7');
      var done = state.seen['ch' + i] ? '<div class="cc-done">✓ 学过了</div>' : '';
      card.innerHTML =
        '<div class="cc-top">' +
          '<span class="cc-emoji">' + (ch.emoji || '📘') + '</span>' +
          '<span class="cc-num">第 ' + (ch.index || (i + 1)) + ' 章</span>' +
        '</div>' +
        '<h3>' + esc(ch.title || '未命名章节') + '</h3>' +
        '<p>' + esc(ch.subtitle || '') + '</p>' + done;
      card.addEventListener('click', function () { enterChapter(i, 0); });
      grid.appendChild(card);
    });
    // 实战演练入口
    var practice = document.createElement('div');
    practice.className = 'chapter-card practice-card';
    practice.innerHTML =
      '<div class="cc-top"><span class="cc-emoji">🎮</span><span class="cc-num" style="--cc:#2ea043;color:#3fb950;background:rgba(46,160,67,0.15)">实战</span></div>' +
      '<h3>实战演练：完整协作流程</h3>' +
      '<p>理论学完，去一个仿真 GitHub 里跟着 spotlight 高亮，亲手走一遍 issue → 分支 → PR → merge。</p>';
    practice.addEventListener('click', function () { location.href = 'github-tutorial.html'; });
    grid.appendChild(practice);
  }

  function enterChapter(ci, si) {
    var chs = sortedChapters();
    if (ci < 0 || ci >= chs.length) return;
    state.chapterIdx = ci; state.slideIdx = si || 0;
    var ch = chs[ci];
    setTheme(ch.theme);
    homeEl.style.display = 'none';
    deckEl.classList.add('active');
    renderSlide();
  }

  function backToHome() {
    deckEl.classList.remove('active');
    homeEl.style.display = '';
    renderHome();
    window.scrollTo(0, 0);
  }

  function renderSlide() {
    var chs = sortedChapters();
    var ch = chs[state.chapterIdx];
    if (!ch) return;
    var slides = ch.slides || [];
    var total = slides.length;
    if (state.slideIdx < 0) state.slideIdx = 0;
    if (state.slideIdx >= total) state.slideIdx = total - 1;
    state.seen['ch' + state.chapterIdx] = true;

    emojiEl.textContent = ch.emoji || '📘';
    titleEl.textContent = ch.title || '';
    chipEl.textContent = '第 ' + (ch.index || (state.chapterIdx + 1)) + ' 章';
    countEl.textContent = (state.slideIdx + 1) + ' / ' + total;

    // 重建 stage（触发淡入动画）
    var fresh = document.createElement('div');
    fresh.className = 'deck-stage';
    fresh.id = 'deck-stage';
    stageEl.parentNode.replaceChild(fresh, stageEl);
    stageEl = fresh;

    var api = {
      next: goNext, prev: goPrev,
      gotoSlide: function (n) { state.slideIdx = n; renderSlide(); },
      index: state.slideIdx, total: total
    };
    try {
      var slide = slides[state.slideIdx];
      if (slide && typeof slide.render === 'function') {
        slide.render(stageEl, api);
      } else {
        stageEl.innerHTML = '<div class="deck-center"><p class="deck-p">（这一页没有内容）</p></div>';
      }
    } catch (e) {
      stageEl.innerHTML = '<div class="deck-callout warn">这一页渲染出错了：' + esc(String(e && e.message || e)) + '</div>';
      if (window.console) console.error(e);
    }

    // dots
    dotsEl.innerHTML = '';
    for (var i = 0; i < total; i++) {
      (function (idx) {
        var d = document.createElement('div');
        d.className = 'deck-dot' + (idx === state.slideIdx ? ' active' : (idx < state.slideIdx ? ' seen' : ''));
        d.addEventListener('click', function () { state.slideIdx = idx; renderSlide(); });
        dotsEl.appendChild(d);
      })(i);
    }

    prevBtn.disabled = false; // 首页 prev 回上一章
    var atLast = state.slideIdx === total - 1;
    var lastChapter = state.chapterIdx === chs.length - 1;
    nextBtn.textContent = atLast ? (lastChapter ? '回到大纲 ✓' : '下一章 →') : '下一页 →';

    // 全课程进度
    updateGlobalProgress(chs);
    window.scrollTo(0, 0);
  }

  function updateGlobalProgress(chs) {
    var totalSlides = 0, doneSlides = 0;
    chs.forEach(function (c, ci) {
      var t = (c.slides || []).length; totalSlides += t;
      if (ci < state.chapterIdx) doneSlides += t;
      else if (ci === state.chapterIdx) doneSlides += (state.slideIdx + 1);
    });
    progFill.style.width = totalSlides ? Math.round(doneSlides / totalSlides * 100) + '%' : '0%';
  }

  function goNext() {
    var chs = sortedChapters();
    var ch = chs[state.chapterIdx];
    var total = (ch.slides || []).length;
    if (state.slideIdx < total - 1) {
      state.slideIdx++; renderSlide();
    } else if (state.chapterIdx < chs.length - 1) {
      enterChapter(state.chapterIdx + 1, 0);
    } else {
      backToHome();
    }
  }
  function goPrev() {
    var chs = sortedChapters();
    if (state.slideIdx > 0) {
      state.slideIdx--; renderSlide();
    } else if (state.chapterIdx > 0) {
      var prevCh = chs[state.chapterIdx - 1];
      enterChapter(state.chapterIdx - 1, (prevCh.slides || []).length - 1);
    } else {
      backToHome();
    }
  }

  nextBtn.addEventListener('click', goNext);
  prevBtn.addEventListener('click', goPrev);
  backBtn.addEventListener('click', backToHome);

  document.addEventListener('keydown', function (e) {
    if (!deckEl.classList.contains('active')) return;
    var tag = (e.target && e.target.tagName || '').toLowerCase();
    var typing = tag === 'input' || tag === 'textarea' || (e.target && e.target.isContentEditable);
    if (typing) return;
    if (e.key === 'Escape') { e.preventDefault(); backToHome(); }
    else if (e.key === 'ArrowRight' || e.key === 'Enter' || e.key === ' ') { e.preventDefault(); goNext(); }
    else if (e.key === 'ArrowLeft') { e.preventDefault(); goPrev(); }
  });

  function esc(s) {
    return String(s).replace(/[&<>"]/g, function (c) {
      return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c];
    });
  }

  // 启动
  window.__courseReady = true;
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', renderHome);
  } else {
    renderHome();
  }
})();
</script>
