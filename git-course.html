      var panels = [p1, p2, p3];

      // 提交线：始终纹丝不动
      var canvas = el('div', 'sc-card c-undo-canvas');
      wrap.appendChild(canvas);
      var g = api.graph(canvas, {});
      var IDS = ['A', 'B', 'C', 'D'];
      g.init('main', IDS, { bare: true, hashes: true, here: true });
      decorateSoon(canvas, g, IDS, 'D', { hereText: '你在这一版' });

      var lineNote = el('div', 'c-undo-fine');
      lineNote.innerHTML = '提交线<b>纹丝不动</b>——丢掉的只是「还没保存」的那团乱改。';
      wrap.appendChild(lineNote);

      var discarded = false;

      // 逐格推进：用 api.step
      function lightPanel(i) {
        panels.forEach(function (p, k) {
          p.classList.toggle('pending', k > i);
          p.classList.toggle('live', k === i);
        });
      }
      function doDiscard(animated) {
        discarded = true;
        if (!animated) { mess3.style.transition = 'none'; mess1.style.transition = 'none'; }
        mess3.classList.add('gone');
        mess1.classList.add('gone');
        var ck3 = p3.querySelector('.c-undo-clean');
        if (ck3) ck3.classList.add('show');
        if (!animated) {
          void mess3.offsetWidth; mess3.style.transition = '';
          void mess1.offsetWidth; mess1.style.transition = '';
        }
        btn.disabled = true; btn.style.opacity = '.5';
        btn.textContent = '✓ 已丢掉，回到上次保存的样子';
      }

      // step1: 点亮格1  step2: 点亮格2  step3: 点亮格3 + 执行 discard
      api.step(function () { lightPanel(0); });
      api.step(function () { lightPanel(1); });
      api.step(function (animated) { lightPanel(2); doDiscard(animated); });

      var actions = el('div', 'c-undo-actions');
      var btn = el('button', 'sc-btn primary', '王琦：丢掉这些没保存的改动');
      btn.setAttribute('data-interactive', '1');
      btn.addEventListener('click', function (e) {
        e.stopPropagation();
        // 一键把三格走完
        lightPanel(2);
        if (!discarded) { doDiscard(true); }
      });
      actions.appendChild(btn);
      wrap.appendChild(actions);

      var aiHolder = el('div', 'c-undo-ai');
      aiHolder.appendChild(api.aiCard({
        effect: '把还没提交的改动全部丢掉，回到上次保存的样子',
        say: '把我没提交的改动都还原了',
        cmd: 'git restore .'
      }));
      api.frag(aiHolder);
      wrap.appendChild(aiHolder);

      var fine = el('div', 'c-undo-fine');
      fine.innerHTML = 'discard = 丢掉「还没 commit」的改动，<b>已提交的历史一点不动</b>。' +
        '（日常：AI 乱改还没提交、一键还原。）';
      api.frag(fine);
      wrap.appendChild(fine);

      api.onReset(function () {
        discarded = false;
        [mess1, mess3].forEach(function (m) {
          m.style.transition = 'none';
          m.classList.remove('gone');
          void m.offsetWidth; m.style.transition = '';
        });
        var ck3 = p3.querySelector('.c-undo-clean');
        if (ck3) ck3.classList.remove('show');
        panels.forEach(function (p) { p.classList.add('pending'); p.classList.remove('live'); });
        btn.disabled = false; btn.style.opacity = '1'; btn.textContent = '王琦：丢掉这些没保存的改动';
        decorateSoon(canvas, g, IDS, 'D', { hereText: '你在这一版' });
      });
    }
  });

  /* ============================================================
     屏 4.3 — undo-reset：漫画（你先存了丑照 → 王琦气炸 → reset 回 C）
     ============================================================ */
  register({
    chapter: CH,
    chapterName: CHNAME,
    id: 'undo-reset',
    title: '后悔药② reset（漫画）',
    subtitle: '已经提交了，把项目整个退回某一版',
    play: true,
    render: function (stage, api) {
      injectCSS();

      var wrap = el('div', 'c-undo-wrap');
      stage.appendChild(wrap);

      var head = el('div', 'c-undo-head');
      head.appendChild(el('span', 'sc-pill', '💊② reset'));
      head.appendChild(el('h2', 'sc-h2',
        '后悔药② <span style="color:var(--git)">reset</span>：已经保存了，整个退回去'));
      head.appendChild(el('p', 'sc-p c-undo-lead',
        '这次<span class="me">你</span>手快，<b class="bad">先存了再说</b>；<span class="wq">王琦</span>看到立刻收拾。'));
      wrap.appendChild(head);

      /* ---- 三格漫画 ---- */
      var comic = el('div', 'c-undo-comic');
      wrap.appendChild(comic);

      // 格1：你手快，已把「上传王琦丑照」commit 了（D）
      var p1 = el('div', 'c-undo-panel pending');
      p1.appendChild(el('div', 'pnum', '格 1'));
      var st1 = el('div', 'stagea');
      st1.appendChild(makePerson('你', { mood: 'smirk' }));
      st1.appendChild(makeLaptop());
      st1.appendChild(el('div', '', '<span style="font-size:30px">📷</span>'));
      p1.appendChild(st1);
      var bb1 = el('div', 'bubbox');
      bb1.appendChild(speech('你', '这次<b>先存了再说</b>！丑照上传搞定～'));
      p1.appendChild(bb1);
      comic.appendChild(p1);

      // 格2：王琦看到 D 气炸
      var p2 = el('div', 'c-undo-panel pending');
      p2.appendChild(el('div', 'pnum', '格 2'));
      var st2 = el('div', 'stagea');
      st2.appendChild(makePerson('王琦', { mood: 'shout' }));
      st2.appendChild(el('div', '', '<span style="font-size:30px">📷</span>'));
      p2.appendChild(st2);
      var bb2 = el('div', 'bubbox');
      bb2.appendChild(speech('王琦', '这张照片<b>给我撤了</b>！'));
      p2.appendChild(bb2);
      comic.appendChild(p2);

      // 格3：王琦 reset 回 C，「你在这一版」落到 C
      var p3 = el('div', 'c-undo-panel pending');
      p3.appendChild(el('div', 'pnum', '格 3'));
      var st3 = el('div', 'stagea');
      st3.appendChild(makePerson('王琦', { mood: 'calm' }));
      p3.appendChild(st3);
      var bb3 = el('div', 'bubbox');
      bb3.appendChild(speech('王琦', '退回到没丑照那版，干净了。'));
      p3.appendChild(bb3);
      comic.appendChild(p3);

      var panels = [p1, p2, p3];

      /* ---- 提交线：A—B—C—D（D 标丑照），reset 后缩回 A—B—C ---- */
      var canvas = el('div', 'sc-card c-undo-canvas');
      wrap.appendChild(canvas);

      var g = api.graph(canvas, {});
      var FULL = ['A', 'B', 'C', 'D']; // D = 丑照那次
      var BACK = ['A', 'B', 'C'];      // reset 后

      function build(after) {
        g.reset();
        var ids = after ? BACK : FULL;
        var here = after ? 'C' : 'D';
        g.init('main', ids, { bare: true, hashes: true, here: true });
        if (!after) { try { g.highlight('D', true); } catch (e) {} }
        decorateSoon(canvas, g, ids, here, { hereText: '你在这一版' });
      }
      build(false);

      // D 旁的「丑照📷」标
      var dTag = el('div', 'c-undo-haslayer');
      dTag.style.zIndex = '4';
      var dCap = el('div', 'c-undo-hcap');
      dCap.style.color = 'var(--git)';
      dCap.style.fontWeight = '800';
      dCap.style.fontFamily = 'var(--font-sans)';
      dCap.textContent = '丑照📷';
      dTag.appendChild(dCap);
      function placeDTag() {
        if (reset) { dCap.style.display = 'none'; return; }
        dCap.style.display = '';
        var rect = canvas.getBoundingClientRect();
        var xy = g.getNodeXY('D');
        if (rect.width && xy) {
          dCap.style.left = (xy.x - rect.left) + 'px';
          dCap.style.top = (xy.y - rect.top - 44) + 'px';
        }
      }
      canvas.appendChild(dTag);
      function placeDTagSoon() {
        requestAnimationFrame(function () { requestAnimationFrame(placeDTag); });
        setTimeout(placeDTag, 100); setTimeout(placeDTag, 280);
      }
      placeDTagSoon();

      var hintBanner = el('div', 'c-undo-fine');
      hintBanner.innerHTML = 'D（丑照那次）之后的东西，reset 之后都<b>没了</b>——线缩回到 C 这一版。';
      hintBanner.style.display = 'none';
      wrap.appendChild(hintBanner);

      var reset = false;
      function lightPanel(i) {
        panels.forEach(function (p, k) {
          p.classList.toggle('pending', k > i);
          p.classList.toggle('live', k === i);
        });
      }
      function doReset() {
        if (reset) return;
        reset = true;
        build(true);
        placeDTagSoon();
        hintBanner.style.display = '';
        btn.disabled = true; btn.style.opacity = '.5';
        btn.textContent = '✓ 已退回到 ' + HASH.C + ' 这一版';
      }

      api.step(function () { lightPanel(0); });
      api.step(function () { lightPanel(1); });
      api.step(function () { lightPanel(2); doReset(); });

      var actions = el('div', 'c-undo-actions');
      var btn = el('button', 'sc-btn primary', '王琦：退回到没丑照的 C 版（' + HASH.C + '）');
      btn.setAttribute('data-interactive', '1');
      btn.addEventListener('click', function (e) {
        e.stopPropagation();
        lightPanel(2); doReset();
      });
      actions.appendChild(btn);
      wrap.appendChild(actions);

      var aiHolder = el('div', 'c-undo-ai');
      aiHolder.appendChild(api.aiCard({
        effect: '项目整个退回到某个历史版本，那之后的提交都丢弃',
        say: '帮我 reset 到 ' + HASH.C + '（没丑照那版）',
        cmd: 'git reset --hard ' + HASH.C
      }));
      api.frag(aiHolder);
      wrap.appendChild(aiHolder);

      var fine = el('div', 'c-undo-fine');
      fine.innerHTML = 'reset = 退回某个历史版本，那之后的提交都被丢弃。' +
        '（日常：最近几步走死了，整个退回能跑的那版。）';
      api.frag(fine);
      wrap.appendChild(fine);

      api.onReset(function () {
        reset = false;
        build(false);
        placeDTagSoon();
        hintBanner.style.display = 'none';
        panels.forEach(function (p) { p.classList.add('pending'); p.classList.remove('live'); });
        btn.disabled = false; btn.style.opacity = '1';
        btn.textContent = '王琦：退回到没丑照的 C 版（' + HASH.C + '）';
      });
    }
  });

  /* ============================================================
     屏 4.4 — undo-revert：降级为一屏，诚实说明日常用不上
     ============================================================ */
  register({
    chapter: CH,
    chapterName: CHNAME,
    id: 'undo-revert',
    title: '第三颗药 revert（了解即可）',
    subtitle: '记住它存在——等项目复杂到要精确拆弹再说',
    render: function (stage, api) {
      injectCSS();

      var wrap = el('div', 'c-undo-wrap');
      stage.appendChild(wrap);

      var head = el('div', 'c-undo-head');
      head.appendChild(el('span', 'sc-pill', '💊③ revert'));
      head.appendChild(el('h2', 'sc-h2',
        '还有第三颗药叫 <span style="color:var(--git)">revert</span>'));
      head.appendChild(el('p', 'sc-p c-undo-lead',
        '它在最新版后面加一次『<b>反向提交</b>』，专门撤掉历史里某一次的改动、<b>其他全留着</b>。' +
        '——但说实话，它不是你日常会主动用的，先看看下面这两栏对比。'));
      wrap.appendChild(head);

      // 切换
      var toggle = el('div', 'c-undo-rv-toggle');
      var tabSimple = el('button', 'c-undo-rv-tab active', '简单项目');
      var tabComplex = el('button', 'c-undo-rv-tab', '复杂项目');
      tabSimple.setAttribute('data-interactive', '1');
      tabComplex.setAttribute('data-interactive', '1');
      toggle.appendChild(tabSimple); toggle.appendChild(tabComplex);
      wrap.appendChild(toggle);

      // 两栏
      var two = el('div', 'c-undo-two');
      var colSimple = el('div', 'c-undo-tcol hot');
      colSimple.innerHTML =
        '<h3>🟢 简单项目 <span class="badge easy">不用 revert</span></h3>' +
        '<p>你<b>根本不用去翻 hash</b> 来 revert——直接把需求说给 AI，在最新版上改就行。' +
        '「把王琦的丑照换成正常照片」，<b>一句话的事</b>。</p>' +
        '<div class="talk">「把王琦的丑照换成正常照片」</div>';
      var colComplex = el('div', 'c-undo-tcol dim');
      colComplex.innerHTML =
        '<h3>🟡 复杂项目 <span class="badge hard">才用 revert</span></h3>' +
        '<p>项目大了、怕 AI 一改<b>动到别处</b>，才需要指哪打哪——精确告诉它' +
        '「只撤 <span class="c-undo-mono">a1b2c3d</span> 这次的改动，别碰其他」，' +
        '这时 revert 才<b>真派上用场</b>。</p>' +
        '<div class="talk">「只撤掉 a1b2c3d 这次的改动，别碰其他」</div>';
      two.appendChild(colSimple); two.appendChild(colComplex);
      wrap.appendChild(two);

      function selectTab(which) {
        var simple = (which === 'simple');
        tabSimple.classList.toggle('active', simple);
        tabComplex.classList.toggle('active', !simple);
        colSimple.classList.toggle('hot', simple);
        colSimple.classList.toggle('dim', !simple);
        colComplex.classList.toggle('hot', !simple);
        colComplex.classList.toggle('dim', simple);
      }
      tabSimple.addEventListener('click', function (e) { e.stopPropagation(); selectTab('simple'); });
      tabComplex.addEventListener('click', function (e) { e.stopPropagation(); selectTab('complex'); });

      var aiHolder = el('div', 'c-undo-ai');
      aiHolder.appendChild(api.aiCard({
        effect: '在最新版后面加一次反向提交，精准撤掉历史某一次改动',
        say: '只撤掉 a1b2c3d 这次的改动，别碰其他',
        cmd: 'git revert a1b2c3d'
      }));
      api.frag(aiHolder);
      wrap.appendChild(aiHolder);

      var fine = el('div', 'c-undo-fine');
      fine.innerHTML = 'revert <b>不是你日常会主动用的</b>——记住它存在，等项目复杂到要精确拆弹时再说。';
      api.frag(fine);
      wrap.appendChild(fine);

      api.onReset(function () { selectTab('simple'); });
    }
  });

  /* ============================================================
     屏 4.5 — undo-compare：小结 + 口诀 + 轻预告（两个小人并排）
     ============================================================ */
  register({
    chapter: CH,
    chapterName: CHNAME,
    id: 'undo-compare',
    title: '三颗药小结 · 口诀',
    subtitle: 'discard / reset / revert · 说清效果，AI 帮你做',
    render: function (stage, api) {
      injectCSS();

      var wrap = el('div', 'c-undo-wrap');
      stage.appendChild(wrap);

      var head = el('div', 'c-undo-head');
      head.appendChild(el('span', 'sc-pill', '🎯 三颗药小结'));
      head.appendChild(el('h2', 'sc-h2',
        '三颗后悔药，<span style="color:var(--git)">一句话记住</span>'));
      wrap.appendChild(head);

      // 两个小人并排
      var duo = el('div', 'c-undo-duo');
      duo.appendChild(makePerson('你', { mood: 'calm' }));
      duo.appendChild(makePerson('王琦', { mood: 'calm', flip: true }));
      wrap.appendChild(duo);

      // 三行口诀
      var three = el('div', 'c-undo-three');
      three.innerHTML =
        '<div class="row"><span class="k">discard</span><span class="v">还没保存的，<b>丢掉</b>。</span></div>' +
        '<div class="row"><span class="k">reset</span><span class="v">已经保存了，<b>整个退回去</b>。</span></div>' +
        '<div class="row"><span class="k">revert</span><span class="v"><b>只撤历史里某一次</b> <span class="soft">（复杂项目才用）</span>。</span></div>';
      api.frag(three);
      wrap.appendChild(three);

      // 文楷金句
      var qw = el('div', 'c-undo-quote-wrap');
      qw.innerHTML =
        '<div class="sc-quote big">你不用记它们底层怎么实现，<br>' +
        '说清你要的<span class="accent">『效果』</span>，AI 就能帮你做。</div>';
      api.frag(qw);
      wrap.appendChild(qw);

      // 轻预告（只签路标、不剧透）
      var tease = el('div', 'c-undo-tease');
      tease.innerHTML =
        '<b>reset</b> 为什么能把提交『退掉』、这些提交是不是真的没了——' +
        '等讲完后面的内容，我们再回来揭晓 👀';
      api.frag(tease);
      wrap.appendChild(tease);

      api.onReset(function () {});
    }
  });

})();

</script>

<script>
/* ============================================================
   sc-branch.js  —  第 5 章 · 分支 Branch   (v3 新章)
   屏 5.1 branch-intro   · 分支 = 仓库的不同开发线
   屏 5.2 branch-create  · 建立一条 feature 分支 ⭐（把图画对）
   屏 5.3 branch-pointer · 分支 = 一个指针
   ------------------------------------------------------------
   只调用框架契约：window.registerScreen / api.step / api.frag
     / api.graph(完整模式) / api.aiCard / api.onReset / api.isReplay
   不实现框架 / 不引外部资源 / 纯 SVG（图由 api.graph 负责画）。

   ⚠ 本章知识锁（到「分支=指针」为止）：
     可见文案 / 按钮 / tooltip 内一律不出现：
       HEAD、分离、孤儿、merge / 合并、checkout、多人 / 协作、快照。
     这些留给后面的章节。

   幂等约定（框架每次进入屏含后退 / resize 都 fresh render，并把
   api.step 以 animated=false 重放）：
     · 每个 step(fn) 都从「干净 graph」出发，做一次确定性的完整重建到某 level；
     · 图状态完全由 level 决定，不依赖上一次 render 残留，所以后退 / 重放都对。
   所有 class 前缀 c-branch-。
   ============================================================ */
(function () {
  "use strict";

  var CH = 5;
  var CHNAME = "分支 Branch";

  /* 配色（与 _shell tokens 对齐）：feature = git 橙；main = 银白 */
  var FEATURE = "#F1502F"; // var(--git)
  var MAIN = "#E6EDF3";    // var(--c-main) 银白

  /* registerScreen 早注册 shim 友好封装 */
  function register(def) {
    if (typeof window.registerScreen === "function") { window.registerScreen(def); }
    else { (window.__pendingScreens = window.__pendingScreens || []).push(def); }
  }

  function h(tag, cls, txt) {
    var e = document.createElement(tag);
    if (cls) e.className = cls;
    if (txt != null) e.textContent = txt;
    return e;
  }

  function injectCSS() {
    if (document.getElementById("c-branch-style")) return;
    var st = document.createElement("style");
    st.id = "c-branch-style";
    st.textContent = [
      /* 通用：上文案 + 下画布的纵向布局 */
      ".c-branch-wrap{width:100%;display:flex;flex-direction:column;align-items:center;gap:clamp(14px,2.4vh,26px)}",
      ".c-branch-head{display:flex;flex-direction:column;align-items:center;gap:10px;text-align:center;max-width:880px}",
      ".c-branch-head .sc-h2{margin-top:4px}",
      ".c-branch-lead{max-width:760px;text-align:center}",
      ".c-branch-lead b.feat{color:var(--git)}",
      ".c-branch-lead b.main{color:var(--c-main)}",

      /* 画布：CommitGraph 的容器 */
      ".c-branch-graphbox{position:relative;width:100%;max-width:880px;margin:2px auto 0;min-height:200px}",
      ".c-branch-graphbox .cg-wrap{width:100%}",

      /* 一句旁白 / 讲解锚点 */
      ".c-branch-note{min-height:1.6em;max-width:760px;text-align:center;color:var(--text);",
        "font-size:clamp(14px,1.5vw,18px);line-height:1.6;transition:color .3s var(--ease)}",
      ".c-branch-note b.feat{color:var(--git)}",
      ".c-branch-note b.main{color:var(--c-main)}",
      ".c-branch-note.dim{color:var(--dim)}",

      /* 操作按钮行 */
      ".c-branch-actions{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-top:2px}",
      ".c-branch-actions .sc-btn.is-next{border-color:var(--git);color:var(--git);",
        "animation:cBranchGlow 1.8s ease-in-out infinite}",
      ".c-branch-actions .sc-btn.is-done{background:rgba(240,81,51,.12);border-color:rgba(240,81,51,.5);color:var(--git)}",
      ".c-branch-actions .sc-btn:disabled{opacity:.42;cursor:not-allowed;animation:none}",
      "@keyframes cBranchGlow{0%,100%{box-shadow:0 0 0 1px rgba(240,81,51,.35)}",
        "50%{box-shadow:0 0 0 2px rgba(240,81,51,.35),0 0 16px rgba(240,81,51,.4)}}",

      /* 折叠命令条（替代 / 补充 aiCard：纯展示「幕后命令」） */
      ".c-branch-cmd{width:100%;max-width:560px;margin:0 auto}",
      ".c-branch-cmd .aicard{max-width:none;margin:0 auto}",

      /* 金句 */
      ".c-branch-quote{text-align:center;max-width:820px;margin:6px auto 0}",
      ".c-branch-quote .accent{color:var(--git)}"
    ].join("");
    document.head.appendChild(st);
  }

  /* ============================================================
     屏 5.1 — branch-intro · 分支 = 仓库的不同开发线
     画面：横向主线 a—b—c—d，末端 d 挂 main 标签牌。
     静态进入；「下一步」只是把观众带去下一屏建分支。
     ============================================================ */
  register({
    chapter: CH,
    chapterName: CHNAME,
    id: "branch-intro",
    title: "分支 = 仓库的不同开发线",
    subtitle: "默认自带一条 main 主干",
    render: function (stage, api) {
      injectCSS();

      var wrap = h("div", "c-branch-wrap");

      var head = h("div", "c-branch-head");
      head.appendChild(h("div", "sc-pill", "🌿 branch · 分支"));
      var hh = h("h2", "sc-h2");
      hh.innerHTML = "一个仓库，可以有<span style='color:var(--git)'>好几条开发线</span>";
      head.appendChild(hh);
      wrap.appendChild(head);

      // 主线 a-b-c-d，末端 d 挂 main 标签牌
      var box = h("div", "c-branch-graphbox");
      wrap.appendChild(box);

      // 文案（旁白）
      var lead = h("p", "sc-lead c-branch-lead");
      lead.innerHTML =
        "<b class='feat'>branch 分支</b> = 仓库里一条<b>独立的开发线</b>。" +
        "默认每个仓库都自带一条 <b class='main'>main</b>（主干）—— " +
        "它是 git 最重要的结构。";
      wrap.appendChild(lead);

      stage.appendChild(wrap);

      // 建图：完整模式（出现分支标签）。main：a b c d，标签自动挂在末端 d。
      var g = api.graph(box, {});
      g.init("main", ["a", "b", "c", "d"]);

      // 下一行旁白 frag：点「下一步」时浮出，引导去建分支（不在本屏建 feature）
      var note = h("p", "c-branch-note dim");
      note.innerHTML = "现在只有这一条 <b class='main'>main</b>。下一步，我们从它身上岔出第二条线。";
      api.frag(note);
      wrap.appendChild(note);

      api.onReset(function () { /* 纯展示屏，render 已重建，无额外状态 */ });
    }
  });

  /* ============================================================
     屏 5.2 — branch-create · 建立一条 feature 分支 ⭐
     ① 从 d 建 feature 分支（出生时 feature 与 main 都指向 d）
     ② 在 feature 上提交一次 → e 长在 d 的右下方（feature lane）
     讲解锚点：feature 从 d 岔出，所以自然长在 d 的右边、另起一行。
     ============================================================ */
  register({
    chapter: CH,
    chapterName: CHNAME,
    id: "branch-create",
    title: "建立一条 feature 分支",
    subtitle: "从 d 岔出 → 在新线上提交一次",
    render: function (stage, api) {
      injectCSS();

      var wrap = h("div", "c-branch-wrap");

      var head = h("div", "c-branch-head");
      head.appendChild(h("div", "sc-pill", "🌿 新建分支"));
      var hh = h("h2", "sc-h2");
      hh.innerHTML = "从 <span class='sc-mono'>d</span> 岔出一条 <span style='color:var(--git)'>feature</span> 分支";
      head.appendChild(hh);
      wrap.appendChild(head);

      var box = h("div", "c-branch-graphbox");
      wrap.appendChild(box);

      var note = h("p", "c-branch-note");
      wrap.appendChild(note);

      var actions = h("div", "c-branch-actions");
      var btnCreate = h("button", "sc-btn", "🌿 从 d 建一条 feature 分支");
      var btnCommit = h("button", "sc-btn", "✍️ 在 feature 上提交一次");
      btnCreate.setAttribute("data-interactive", "1");
      btnCommit.setAttribute("data-interactive", "1");
      actions.appendChild(btnCreate);
      actions.appendChild(btnCommit);
      wrap.appendChild(actions);

      // 折叠命令条（幕后真命令）—— 用 aiCard 承载
      var cmdHolder = h("div", "c-branch-cmd");
      cmdHolder.appendChild(api.aiCard({
        effect: "岔出一条新开发线，并在上面提交",
        say: "给我开一条 feature 分支，然后在上面提交一次",
        cmd: "git checkout -b feature\ngit commit -m \"feature 的第一笔改动\""
      }));
      wrap.appendChild(cmdHolder);

      stage.appendChild(wrap);

      /* ----- graph 状态：level 0..2，完整重建（幂等 / 重放安全） -----
         level 0: main a b c d（feature 还没建）
         level 1: + 从 d 建 feature（feature、main 同指向 d）
         level 2: + 在 feature 上长出 e（e 落 d 右下方 feature lane）
         e 在 d 右边由框架保证：commit.index = 父.index + 1，
         feature 的父是 d，所以 e.index = d.index+1，画在 d 右边一列、
         feature 的 lane 上，不会回到 a 那一列。 */
      var g = api.graph(box, {});
      var level = 0;

      function rebuild(lv, anim) {
        g.reset();
        g.init("main", ["a", "b", "c", "d"]);
        if (lv >= 1) {
          g.createBranch("feature", "d", FEATURE);
        }
        if (lv >= 2) {
          g.addCommit("feature", "e", { anim: anim });
        }
        level = lv;
      }

      var NOTE0 = "main 现在停在 <b class='main'>d</b>。点下面第一个按钮，从 d 岔出 feature。";
      var NOTE1 = "feature 刚出生，和 main <b>一模一样</b> —— " +
        "<b class='feat'>feature</b> 和 <b class='main'>main</b> 此刻都贴在 <span class='sc-mono'>d</span> 上。";
      var NOTE2 = "feature 是从 <span class='sc-mono'>d</span> 这个时间点岔出来的，" +
        "所以新提交 <span class='sc-mono'>e</span> 自然长在 d 的<b class='feat'>右边</b>、另起一行。";

      function setNote(html, dim) {
        note.innerHTML = html;
        note.classList.toggle("dim", !!dim);
      }

      function syncButtons() {
        // create 只在 level 0 可点；commit 只在 level 1 可点
        btnCreate.disabled = level !== 0;
        btnCommit.disabled = level !== 1;
        btnCreate.classList.toggle("is-done", level >= 1);
        btnCommit.classList.toggle("is-done", level >= 2);
        btnCreate.classList.toggle("is-next", level === 0);
        btnCommit.classList.toggle("is-next", level === 1);
      }

      function applyLevel(lv, anim) {
        rebuild(lv, anim);
        setNote(lv === 0 ? NOTE0 : lv === 1 ? NOTE1 : NOTE2, lv === 0);
        syncButtons();
      }

      // 初始态
      applyLevel(0, false);

      // 两个 step：键盘流也能依次播放（① 建分支 ② 提交）
      api.step(function (animated) { applyLevel(1, animated); });
      api.step(function (animated) { applyLevel(2, animated); });

      // 按钮：点了就走对应 step（交给框架推进，保持 step 指针同步）
      btnCreate.addEventListener("click", function (e) {
        e.stopPropagation();
        if (level === 0) api.next();
      });
      btnCommit.addEventListener("click", function (e) {
        e.stopPropagation();
        if (level === 1) api.next();
      });

      api.onReset(function () { applyLevel(0, true); });
    }
  });

  /* ============================================================
     屏 5.3 — branch-pointer · 分支 = 一个指针
     接上图（main a-b-c-d + feature e from d）。
     文案：分支就是一个指针，指向这条线最新的那次提交。
       main 指着 d，feature 指着 e。
     互动：在 feature 上再提交一次 → f；feature 指针挪到 f，
       main 指针仍停在 d 不动（highlight d 强调对比）。
     ============================================================ */
  register({
    chapter: CH,
    chapterName: CHNAME,
    id: "branch-pointer",
    title: "分支 = 一个指针",
    subtitle: "指针各走各的 → 分支互不影响",
    render: function (stage, api) {
      injectCSS();

      var wrap = h("div", "c-branch-wrap");

      var head = h("div", "c-branch-head");
      head.appendChild(h("div", "sc-pill", "👉 分支 = 指针"));
      var hh = h("h2", "sc-h2");
      hh.innerHTML = "每个分支，其实就是<span style='color:var(--git)'>一个指针</span>";
      head.appendChild(hh);
      wrap.appendChild(head);

      var box = h("div", "c-branch-graphbox");
      wrap.appendChild(box);

      var lead = h("p", "sc-lead c-branch-lead");
      lead.innerHTML =
        "分支就是一个<b class='feat'>指针</b>，指向这条分支<b>最新的那一次提交</b>。" +
        "<b class='main'>main</b> 指着 <span class='sc-mono'>d</span>，" +
        "<b class='feat'>feature</b> 指着 <span class='sc-mono'>e</span>。";
      wrap.appendChild(lead);

      var note = h("p", "c-branch-note dim");
      wrap.appendChild(note);

      var actions = h("div", "c-branch-actions");
      var btnCommit = h("button", "sc-btn", "✍️ 在 feature 上再提交一次");
      btnCommit.setAttribute("data-interactive", "1");
      actions.appendChild(btnCommit);
      wrap.appendChild(actions);

      // 文楷金句
      var quote = h("p", "sc-quote c-branch-quote");
      quote.innerHTML = "所谓「分支互不影响」，本质就是<span class='accent'>各自的指针，各走各的</span>。";
      wrap.appendChild(quote);

      stage.appendChild(wrap);

      /* ----- graph：level 0..1（接上屏终态为起点） -----
         level 0: main a b c d + feature e（feature 指 e，main 指 d）
         level 1: + 在 feature 上长出 f（feature 指针挪到 f；main 仍指 d）
         强调对比：highlight d —— main 一点没动。 */
      var g = api.graph(box, {});
      var level = 0;

      function rebuild(lv, anim) {
        g.reset();
        g.init("main", ["a", "b", "c", "d"]);
        g.createBranch("feature", "d", FEATURE);
        g.addCommit("feature", "e", { anim: false });
        if (lv >= 1) {
          g.addCommit("feature", "f", { anim: anim });
        }
        // 高亮 d：强调「main 的指针停在 d 不动」
        g.highlight("d", true);
        level = lv;
      }

      var NOTE0 = "点下面的按钮，在 feature 上再提交一次，看看两个指针会怎么动。";
      var NOTE1 = "看 —— <b class='feat'>feature</b> 的指针往前走到了 <span class='sc-mono'>f</span>，" +
        "而 <b class='main'>main</b> 的指针还稳稳停在高亮的 <span class='sc-mono'>d</span> 上，一点没动。";

      function setNote(html, dim) {
        note.innerHTML = html;
        note.classList.toggle("dim", !!dim);
      }

      function syncButtons() {
        btnCommit.disabled = level !== 0;
        btnCommit.classList.toggle("is-done", level >= 1);
        btnCommit.classList.toggle("is-next", level === 0);
      }

      function applyLevel(lv, anim) {
        rebuild(lv, anim);
        setNote(lv === 0 ? NOTE0 : NOTE1, lv === 0);
        syncButtons();
      }

      applyLevel(0, false);

      api.step(function (animated) { applyLevel(1, animated); });

      btnCommit.addEventListener("click", function (e) {
        e.stopPropagation();
        if (level === 0) api.next();
      });

      api.onReset(function () { applyLevel(0, true); });
    }
  });

})();

</script>

<script>
/* ============================================================
 * 结尾屏 · 结语
 *   屏 ending · 居中文案分行淡入 + 极淡 commit 图缓慢漂移（呼应封面）
 * 样式前缀: c-end-
 * 仅调用框架契约：registerScreen / api.step / api.frag
 * 两个入口按钮：
 *   [返回目录]    → data-action="overview"（触发框架章节总览；兜底自绘）
 *   [去 GitHub 章 →] → data-bridge="github"，href="github-tutorial.html" 兜底
 *
 * 幂等：每次进入(含后退/resize) fresh 调 render；背景漂移为纯 CSS 动画，自动重跑。
 * ============================================================ */
(function () {
  'use strict';

  function register(def) {
    if (typeof window.registerScreen === 'function') { window.registerScreen(def); }
    else { (window.__pendingScreens = window.__pendingScreens || []).push(def); }
  }

  function injectStyle() {
    if (document.getElementById('c-end-style')) return;
    var s = document.createElement('style');
    s.id = 'c-end-style';
    s.textContent = [
      '.c-end-wrap{position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;min-height:64vh;overflow:hidden;width:100%;}',

      /* 极淡 commit 图背景，缓慢漂移（呼应封面 c-ch0-bg） */
      '.c-end-bg{position:absolute;inset:0;z-index:0;pointer-events:none;opacity:0.13;overflow:hidden;}',
      '.c-end-bg-track{position:absolute;top:50%;left:0;transform:translateY(-50%);will-change:transform;animation:c-end-drift 46s linear infinite;}',
      '@keyframes c-end-drift{from{transform:translate(0,-50%);}to{transform:translate(-50%,-50%);}}',

      '.c-end-inner{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;gap:0;}',

      /* 文案行：每行一块，分行淡入 */
      '.c-end-line{font-family:var(--font-sans);line-height:1.5;}',
      '.c-end-line.lead{font-size:clamp(28px,5vw,56px);font-weight:800;letter-spacing:-0.02em;margin-bottom:clamp(22px,4vh,40px);',
      'background:linear-gradient(120deg,var(--text) 0%,var(--c-teal) 60%,var(--git) 100%);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;}',
      '.c-end-line.body{font-size:clamp(16px,2.4vw,24px);color:var(--text);font-weight:500;margin:4px 0;max-width:30ch;}',
      '.c-end-line.body .hl{color:var(--c-teal);font-weight:700;}',
      '.c-end-line.body .hl2{color:var(--git);font-weight:700;}',

      /* 入口按钮组 */
      '.c-end-actions{display:flex;gap:14px;flex-wrap:wrap;justify-content:center;margin-top:clamp(30px,6vh,52px);}',
      '.c-end-actions .sc-btn{font-size:16px;padding:13px 26px;}',
      '.c-end-actions a.sc-btn{text-decoration:none;}'
    ].join('');
    document.head.appendChild(s);
  }

  /* 极淡 commit 图（自绘 SVG，两段拼接 → 无缝循环漂移，呼应封面） */
  function bgCommitSVG() {
    var seg = '';
    var n = 14, gap = 84, r = 9, y = 60;
    for (var i = 0; i < n; i++) {
      var x = 30 + i * gap;
      if (i < n - 1) {
        seg += '<line x1="' + x + '" y1="' + y + '" x2="' + (x + gap) + '" y2="' + y + '" stroke="var(--c-main)" stroke-width="3"/>';
      }
      // 偶尔分叉一条淡支线 + 合回，增加"版本图"质感
      if (i % 4 === 1) {
        seg += '<line x1="' + x + '" y1="' + y + '" x2="' + (x + gap) + '" y2="' + (y - 34) + '" stroke="var(--c-teal)" stroke-width="3"/>' +
               '<circle cx="' + (x + gap) + '" cy="' + (y - 34) + '" r="' + r + '" fill="var(--c-teal)"/>';
      }
      if (i % 5 === 3) {
        seg += '<line x1="' + x + '" y1="' + y + '" x2="' + (x + gap) + '" y2="' + (y + 32) + '" stroke="var(--git)" stroke-width="3"/>' +
               '<circle cx="' + (x + gap) + '" cy="' + (y + 32) + '" r="' + r + '" fill="var(--git)"/>';
      }
    }
    for (var j = 0; j < n; j++) {
      seg += '<circle cx="' + (30 + j * gap) + '" cy="' + y + '" r="' + r + '" fill="var(--c-main)"/>';
    }
    var W = 30 + (n - 1) * gap + 60;
    return '<svg class="c-end-bg-track" width="' + (W * 2) + '" height="140" viewBox="0 0 ' + (W * 2) + ' 140" aria-hidden="true">' +
      '<g>' + seg + '</g>' +
      '<g transform="translate(' + W + ',0)">' + seg + '</g>' +
      '</svg>';
  }

  register({
    chapter: 7,
    chapterName: '结语',
    id: 'ending',
    title: '你已经会用 Git 了',
    subtitle: '记效果 · 说人话 · 交给 AI',
    play: true,
    render: function (stage, api) {
      injectStyle();

      stage.innerHTML =
        '<div class="c-end-wrap">' +
          '<div class="c-end-bg">' + bgCommitSVG() + '</div>' +
          '<div class="c-end-inner">' +
            '<div class="c-end-line lead" id="c-end-l0">你已经会用 Git 了。</div>' +
            '<div class="c-end-line body" id="c-end-l1">不是因为你背下了命令，</div>' +
            '<div class="c-end-line body" id="c-end-l2">而是因为你知道每个动作的『<span class="hl">效果</span>』，</div>' +
            '<div class="c-end-line body" id="c-end-l3">并且能用<span class="hl2">人话</span>把它说给 AI 听。</div>' +
            '<div class="c-end-actions" id="c-end-actions">' +
              '<button class="sc-btn" id="c-end-overview" data-action="overview" data-interactive="1">↩ 返回目录</button>' +
              '<a class="sc-btn primary" id="c-end-bridge" data-bridge="github" data-interactive="1" href="github-tutorial.html">去 GitHub 章 →</a>' +
            '</div>' +
          '</div>' +
        '</div>';

      // 分行淡入（api.frag 注册为分步；后退/重放瞬时到位）
      // lead 第一行 render 即显示（不藏），其余三行 + 按钮组逐行淡入。
      api.frag(stage.querySelector('#c-end-l1'));
      api.frag(stage.querySelector('#c-end-l2'));
      api.frag(stage.querySelector('#c-end-l3'));
      api.frag(stage.querySelector('#c-end-actions'));

      // [返回目录]：优先调框架总览（__Deck.openOverview），兜底点 menu 按钮
      var ovBtn = stage.querySelector('#c-end-overview');
      ovBtn.addEventListener('click', function (e) {
        e.preventDefault();
        try {
          if (window.__Deck && typeof window.__Deck.openOverview === 'function') {
            window.__Deck.openOverview();
            return;
          }
        } catch (err) {}
        var mb = document.getElementById('menu-btn');
        if (mb) mb.click();
      });

      // [去 GitHub 章]：保留 href 兜底跳转；若框架日后挂了 bridge handler 则交给它。
      // 这里不 preventDefault —— <a href> 兜底直接跳到 github-tutorial.html。
    }
  });

})();

</script>

<!-- ===== ENGINE ===== -->
<script>
(function(){
"use strict";

/* ------------------------------------------------------------
   SCREEN REGISTRATION  (chapters may register BEFORE engine)
   ------------------------------------------------------------ */
var SCREENS = [];
// consume any screens registered before this engine ran
if (window.__pendingScreens && window.__pendingScreens.length){
  SCREENS = SCREENS.concat(window.__pendingScreens);
}
window.registerScreen = function(def){ SCREENS.push(def); };
// if a future module registers after engine load but before boot, still captured.

/* ------------------------------------------------------------
   SVG HELPERS
   ------------------------------------------------------------ */
var SVGNS = "http://www.w3.org/2000/svg";
function svgEl(name, attrs){
  var e = document.createElementNS(SVGNS, name);
  if (attrs) for (var k in attrs) e.setAttribute(k, attrs[k]);
  return e;
}
function el(tag, cls, txt){
  var e = document.createElement(tag);
  if (cls) e.className = cls;
  if (txt != null) e.textContent = txt;
  return e;
}

var BRANCH_COLORS = {
  main:'#E6EDF3', teal:'#39D0D8', purple:'#A78BFA', amber:'#FBBF24', pink:'#FF4D9D'
};
// bare ("裸线") mode: every node shares one colour — git orange.
var BARE_COLOR = '#F1502F';
// dark dot colors that need a light text label
function needsDarkLabel(hex){
  // returns true if label text should be dark (because dot is light)
  if(!hex) return false;
  var c = hex.replace('#',''); if(c.length===3) c=c.replace(/(.)/g,'$1$1');
  var r=parseInt(c.substr(0,2),16),g=parseInt(c.substr(2,2),16),b=parseInt(c.substr(4,2),16);
  var lum=(0.299*r+0.587*g+0.114*b);
  return lum>150; // light dot -> dark label
}

// deterministic 7-char short hash from an arbitrary string (FNV-1a -> hex).
// Stable across replays/back-stepping; never random.
function shortHash(str){
  str = String(str==null?'':str);
  var h = 0x811c9dc5; // FNV offset basis
  for(var i=0;i<str.length;i++){
    h ^= str.charCodeAt(i);
    h = (h + ((h<<1)+(h<<4)+(h<<7)+(h<<8)+(h<<24))) >>> 0; // *16777619 mod 2^32
  }
  // mix once more so single-char labels (A,B,C…) diverge nicely
  h = (h ^ (h>>>15)) >>> 0;
  var hex = h.toString(16);
  while(hex.length<7) hex = '0'+hex;        // pad
  return hex.substr(0,7);                    // exactly 7 chars
}

/* ============================================================
   COMMIT GRAPH
   ============================================================ */
function CommitGraph(container, opts){
  this.opts = opts || {};
  this.container = container;
  this.wrap = el('div','cg-wrap');
  container.appendChild(this.wrap);

  this.svg = svgEl('svg',{'class':'cg-svg', 'viewBox':'0 0 100 100', 'preserveAspectRatio':'xMidYMid meet'});
  this.gEdges = svgEl('g',{'class':'cg-edges'});
  this.gNodes = svgEl('g',{'class':'cg-nodes'});
  this.gLabels = svgEl('g',{'class':'cg-labels'});
  this.gHead = svgEl('g',{'class':'cg-headlayer'});
  this.svg.appendChild(this.gEdges);
  this.svg.appendChild(this.gNodes);
  this.svg.appendChild(this.gLabels);
  this.svg.appendChild(this.gHead);
  this.wrap.appendChild(this.svg);

  this.banner = el('div','cg-detach-banner','⚠ HEAD 处于分离态 (detached HEAD) — 此处的提交无分支收留');
  this.wrap.appendChild(this.banner);

  this._reset();
}

CommitGraph.prototype._reset = function(){
  this.commits = {};     // id -> {id, branchLane, x, y, parents:[], color, ghost, node}
  this.branches = {};    // name -> {name, color, lane, head:commitId}
  this.order = [];       // commit ids in creation order
  this.laneCount = 0;
  this.head = {type:'branch', ref:null}; // {type:'branch'|'commit', ref}
  this.detached = false;
  // ---- bare ("裸线") mode state ----
  this.bare = false;     // true => no branch pills, no HEAD flag, single colour, flat line
  this.showHead = false; // HEAD 旗默认不画（知识锁：HEAD 概念后面章节才讲）；init({head:true}) 才开
  this.showHashes = false;
  this.hereId = null;    // commit id wearing the plain "你在这" marker (not HEAD)
  this.gEdges.innerHTML='';
  this.gNodes.innerHTML='';
  this.gLabels.innerHTML='';
  this.gHead.innerHTML='';
  this.banner.classList.remove('show');
  this.svg.classList.remove('detached');
};

CommitGraph.prototype.reset = function(){ this._reset(); };

/* layout geometry */
CommitGraph.prototype._colX = function(index){ return 70 + index*92; };
CommitGraph.prototype._laneY = function(lane){ return 90 + lane*120; };

CommitGraph.prototype._animate = function(want){
  // returns whether to animate this change
  if (this._suppressAnim) return false;
  return want !== false;
};

/* ---- public: init a branch with N commits in a row ----
   opts (optional):
     bare:true    -> 裸线模式: no branch pills, no HEAD flag, single colour, flat line
     hashes:true  -> print a deterministic 7-char short hash under each node
     here:true    -> mark the LAST node with the plain "你在这" marker
   `ids` may be plain labels ['A','B'] OR objects [{label:'A',hash:'abc1234'}].
*/
CommitGraph.prototype.init = function(branchName, ids, opts){
  opts = opts || {};
  this.bare = !!opts.bare;
  this.showHashes = !!opts.hashes;
  this.showHead = !!opts.head;   // 知识锁：HEAD 旗默认不画，只有显式 {head:true} 才显示（留给后面的 HEAD 章）

  // 知识锁：bare 裸线模式下，分离态警告条(含 "HEAD" 字样)绝不能出现在 DOM 里——
  // 前 4 章还没讲 HEAD/分离态。彻底清空文字 + 移出布局；完整模式恢复。
  // 知识锁：分离态 banner（含 "HEAD"/"分离" 字样）默认彻底清空 + 移出布局，
  // 不论 bare/完整模式。只有真正进入分离态时(render 里)才填文字——前面章节不会触发。
  if(this.banner){ this.banner.style.display='none'; this.banner.textContent=''; this.banner.classList.remove('show'); }

  // bare mode: one unified colour (git orange) for every node; otherwise per-branch
  var color = this.bare ? (opts.color || BARE_COLOR)
                        : (BRANCH_COLORS[branchName] || BRANCH_COLORS.main);
  var lane = this.laneCount++;
  this.branches[branchName] = {name:branchName, color:color, lane:lane, head:null};
  this.head = {type:'branch', ref:branchName};

  var self=this, prevId=null;
  ids.forEach(function(item, i){
    var id, hash;
    if(item && typeof item==='object'){ id=item.label; hash=item.hash; }
    else { id=item; }
    var c=self._createCommit(id, branchName, (prevId!=null?[prevId]:[]), {anim:false});
    if(hash!=null) c.hash=hash;          // explicit hash from object form wins
    prevId=id;
  });

  if(opts.here && ids.length){
    var last=ids[ids.length-1];
    this.hereId = (last && typeof last==='object') ? last.label : last;
  }

  this._render(false);
  return this;
};

/* ---- public: place the plain "你在这" marker on a node (bare mode) ---- */
CommitGraph.prototype.markHere = function(id){
  // accept null/false to clear
  if(id==null || id===false){ this.hereId=null; }
  else if(this.commits[id]){ this.hereId=id; }
  this._render(true);
  return this;
};

CommitGraph.prototype._createCommit = function(id, branchName, parents, o){
  o = o||{};
  var b = this.branches[branchName];
  parents = parents||[];
  // ⭐ x 列号 = 拓扑深度（沿父链到根的距离）。后代永远画在父的右边。
  //   根/init 的第一个 commit 没有父 -> index 0。
  //   commit.index = max(父.index) + 1。merge 取两父中更深的一个 +1。
  //   这保证从 d 建 feature 后 addCommit('feature','e') 时 e.index = d.index+1，
  //   落在 d 右边一列，而不是回到 x=0 和 a 同列（这正是上一版的 bug）。
  var idx = 0;
  for(var pi=0; pi<parents.length; pi++){
    var pc=this.commits[parents[pi]];
    if(pc && pc.index!=null) idx = Math.max(idx, pc.index+1);
  }
  var commit = {
    id:id, branch:branchName, lane:b.lane, color:b.color,
    parents:parents, ghost:false,
    index: idx // 拓扑深度（父列+1），决定横向 x 列
  };
  this.commits[id]=commit;
  this.order.push(id);
  b.head = id;
  return commit;
};

/* ---- public: addCommit on branch tip ---- */
CommitGraph.prototype.addCommit = function(branchName, id, o){
  o=o||{};
  var b=this.branches[branchName];
  if(!b) return this;
  var parent = b.head;
  var c = this._createCommit(id, branchName, parent?[parent]:[], o);
  c._new = true;
  // if HEAD attached to this branch, head follows
  if (this.head.type==='branch' && this.head.ref===branchName){ /* head ref already on branch */ }
  this._render(this._animate(o.anim));
  return this;
};

/* ---- public: create branch off a commit ---- */
CommitGraph.prototype.createBranch = function(name, fromCommit, color){
  color = color || BRANCH_COLORS[name] || '#'+Math.floor(Math.random()*0xffffff).toString(16);
  var lane = this.laneCount++;
  this.branches[name] = {name:name, color:color, lane:lane, head:fromCommit, base:fromCommit};
  this._render(true);
  return this;
};

/* ---- public: checkout branch OR commit ---- */
CommitGraph.prototype.checkout = function(ref){
  if (this.branches[ref]){
    this.head = {type:'branch', ref:ref};
    this.detached = false;
  } else if (this.commits[ref]){
    this.head = {type:'commit', ref:ref};
    this.detached = true;
  }
  this._render(true);
  return this;
};

/* ---- public: merge srcBranch into dstBranch ---- */
CommitGraph.prototype.merge = function(srcBranch, dstBranch){
  var src=this.branches[srcBranch], dst=this.branches[dstBranch];
  if(!src||!dst) return this;
  var mergeId = (dst.head||'') + '+' + (src.head||'');
  // create merge commit on dst lane with two parents
  var c=this._createCommit('M'+(this.order.length), dstBranch, [dst.head, src.head], {});
  c.isMerge=true; c._new=true; c.label='⛙';
  this._render(true);
  return this;
};

/* ---- public: commit while detached -> orphan + astronaut ---- */
CommitGraph.prototype.commitDetached = function(id){
  var parent = this.head.ref; // a commit id
  // orphan lane: put on a fresh lane just below
  var lane=this.laneCount++;
  var c={ id:id, branch:null, lane:lane, color:BRANCH_COLORS.main,
          parents:parent?[parent]:[], ghost:true, index: (this.commits[parent]?this.commits[parent].index+1:0),
          orphan:true, _new:true };
  this.commits[id]=c; this.order.push(id);
  // head now points to this new commit (still detached)
  this.head={type:'commit', ref:id};
  this.detached=true;
  this._render(true);
  // astronaut floats away from this node
  var self=this;
  setTimeout(function(){
    var xy=self.getNodeXY(id);
    if(xy && self._api && self._api.astronaut){
      self._api.astronaut({svgRoot:self.svg, x:xy.x, y:xy.y});
    }
  }, 120);
  return this;
};

/* ---- public: mark / unmark ghost ---- */
CommitGraph.prototype.setGhost = function(id, on){
  var c=this.commits[id]; if(!c) return this;
  c.ghost = (on!==false);
  this._render(true);
  return this;
};

/* ---- public: rescue an orphan by giving it a branch ---- */
CommitGraph.prototype.rescue = function(id, branchName, color){
  var c=this.commits[id]; if(!c) return this;
  color = color || BRANCH_COLORS[branchName] || BRANCH_COLORS.amber;
  c.ghost=false; c.orphan=false; c.branch=branchName; c.color=color;
  // create a branch record pointing at this commit, reusing its lane
  this.branches[branchName]={name:branchName,color:color,lane:c.lane,head:id};
  // if head is this commit, attach head to the new branch
  if(this.head.type==='commit' && this.head.ref===id){
    this.head={type:'branch', ref:branchName};
    this.detached=false;
  }
  this._render(true);
  return this;
};

/* ---- public: highlight ---- */
CommitGraph.prototype.highlight = function(id, on){
  var c=this.commits[id]; if(!c) return this;
  c.hl=(on!==false);
  this._render(true);
  return this;
};

/* ---- public: node coordinates in PAGE space ---- */
CommitGraph.prototype.getNodeXY = function(id){
  var c=this.commits[id]; if(!c) return null;
  // svg user coords
  var ux=this._colX(c.index), uy=this._laneY(c.lane);
  // map to page via current CTM
  var pt=this.svg.createSVGPoint(); pt.x=ux; pt.y=uy;
  var ctm=this.svg.getScreenCTM();
  if(!ctm) return {x:ux,y:uy};
  var sp=pt.matrixTransform(ctm);
  return {x:sp.x, y:sp.y};
};

/* ---- internal render ---- */
CommitGraph.prototype._render = function(animate){
  var self=this;
  // compute viewBox bounds
  var maxIdx=0, maxLane=0;
  this.order.forEach(function(cid){var c=self.commits[cid];
    if(c.index>maxIdx)maxIdx=c.index; if(c.lane>maxLane)maxLane=c.lane;});
  Object.keys(this.branches).forEach(function(bn){var b=self.branches[bn];if(b.lane>maxLane)maxLane=b.lane;});
  // full mode leaves room on the right for branch pills; bare mode trims to the line
  var W=this._colX(maxIdx)+(this.bare?70:160);
  var H=this._laneY(maxLane)+90;
  this.svg.setAttribute('viewBox','0 0 '+Math.max(W,300)+' '+Math.max(H,200));

  // detached visuals — banner 文字只在真分离态时存在(前面章节永不触发)
  if(this.detached){
    this.svg.classList.add('detached');
    this.banner.textContent='⚠ HEAD 处于分离态 (detached HEAD) — 此处的提交无分支收留';
    this.banner.style.display=''; this.banner.classList.add('show');
  } else {
    this.svg.classList.remove('detached');
    this.banner.classList.remove('show'); this.banner.textContent=''; this.banner.style.display='none';
  }

  // ---- EDGES ----
  this.gEdges.innerHTML='';
  this.order.forEach(function(cid){
    var c=self.commits[cid];
    c.parents.forEach(function(pid){
      var p=self.commits[pid]; if(!p) return;
      var x1=self._colX(p.index), y1=self._laneY(p.lane);
      var x2=self._colX(c.index), y2=self._laneY(c.lane);
      var path;
      if(p.lane===c.lane){
        path='M'+x1+','+y1+' L'+x2+','+y2;
      } else {
        // curved branch / merge connector
        var mx=(x1+x2)/2;
        path='M'+x1+','+y1+' C'+mx+','+y1+' '+mx+','+y2+' '+x2+','+y2;
      }
      var e=svgEl('path',{'class':'cg-edge'+(c.isMerge?' merge':''),'d':path});
      if(c.ghost||p.ghost) e.style.opacity='.4';
      self.gEdges.appendChild(e);
    });
  });

  // ---- NODES ----
  this.gNodes.innerHTML='';
  this.order.forEach(function(cid){
    var c=self.commits[cid];
    var x=self._colX(c.index), y=self._laneY(c.lane);
    var g=svgEl('g',{'class':'cg-node'});
    g.setAttribute('transform','translate('+x+','+y+')');
    if(c.ghost) g.classList.add('ghost');
    if(c.hl) g.classList.add('hl');
    var fill = c.ghost ? '#4B5563' : c.color;
    g.classList.add(needsDarkLabel(fill)?'dark-label':'light-label');
    var circ=svgEl('circle',{'class':'glow','r':17,'cx':0,'cy':0,'fill':fill});
    g.appendChild(circ);
    var label = c.label || cid;
    var t=svgEl('text',{'class':'label'}); t.textContent=label.length>3?label.substr(0,3):label;
    g.appendChild(t);
    // bare-mode: short hash printed under the node
    if(self.showHashes){
      var hsh = c.hash || shortHash(cid);
      var ht=svgEl('text',{'class':'cg-hash','x':0,'y':26}); ht.textContent=hsh;
      g.appendChild(ht);
    }
    if(c._new && animate){ g.classList.add('appear'); c._new=false; }
    else { c._new=false; }
    c._gx=x; c._gy=y;
    self.gNodes.appendChild(g);
  });

  // ---- BRANCH LABELS = POINTERS ----  (skipped entirely in bare mode)
  // 每个分支标签牌画成"指针"：标签牌上方/旁边，一条短引线 + 小箭头戳向
  // 它所指的分支头 commit，强调"分支只是一个指向某 commit 的指针"。
  // main 标签指向 main 的头（如 d），feature 标签指向 feature 的头（如 f）。
  this.gLabels.innerHTML='';
  if(!this.bare){
  // 同一 commit 上若挂多个分支头，错开标签高度，避免叠在一起
  var labelStack={};
  Object.keys(this.branches).forEach(function(bn){
    var b=self.branches[bn];
    var hc=self.commits[b.head];
    if(!hc) {
      // empty branch sitting on its base
      hc=self.commits[b.base];
    }
    if(!hc) return;
    var nx=self._colX(hc.index), ny=self._laneY(hc.lane);
    var g=svgEl('g',{'class':'cg-pill'});

    var w=bn.length*8+20, h=22;
    // 标签牌放在分支头右上方；同 commit 多分支头则逐个上移
    var key=hc.index+'_'+hc.lane;
    var stack=labelStack[key]||0; labelStack[key]=stack+1;
    var px=nx+34;                 // 牌左边缘 x
    var py=ny-34 - stack*30;      // 牌中心 y
    var rect=svgEl('rect',{'x':px,'y':py-h/2,'width':w,'height':h,'rx':7,
      'fill':'rgba(13,17,23,.9)','stroke':b.color,'stroke-width':1.6});
    var txt=svgEl('text',{'x':px+w/2,'y':py,'fill':b.color}); txt.textContent=bn;

    // 引线：从牌的左下角拐到分支头 commit 上沿；末端一个小箭头戳向节点
    var startX=px, startY=py+h/2;          // 牌左下角
    var endX=nx, endY=ny-17;               // 节点上沿（半径 17）
    var midX=(startX+endX)/2;
    var lead='M'+startX+','+startY+' C'+midX+','+startY+' '+(endX)+','+((startY+endY)/2)+' '+endX+','+endY;
    var leadPath=svgEl('path',{'class':'lead','d':lead,'stroke':b.color});
    g.appendChild(leadPath);
    // 箭头：指向节点（向下/向左戳）
    var ah=5;
    var arrow=svgEl('path',{'class':'arrow','fill':b.color,
      'd':'M'+endX+','+endY+' l'+(-ah)+','+(-ah*1.4)+' l'+(ah*2)+',0 z'});
    g.appendChild(arrow);

    g.appendChild(rect); g.appendChild(txt);
    self.gLabels.appendChild(g);
  });
  }

  // ---- HEAD FLAG ----
  this.gHead.innerHTML='';
  if(this.bare){
    // ---- bare mode: NO HEAD flag ever. Optional plain "你在这" marker. ----
    var hereC = this.hereId ? this.commits[this.hereId] : null;
    if(hereC){
      var ex=this._colX(hereC.index), ey=this._laneY(hereC.lane);
      var eg=svgEl('g',{'class':'cg-here'});
      var label='你在这一版';
      var ew=label.length*12.5+18;          // CJK glyphs are wide
      var flagY=ey-60;
      // little stem + dot, plain pointer (deliberately NOT the HEAD flag style)
      var stem=svgEl('line',{'class':'stem','x1':ex,'y1':ey-17,'x2':ex,'y2':flagY+22});
      eg.appendChild(stem);
      var dot=svgEl('circle',{'class':'dot','cx':ex,'cy':flagY+22,'r':3});
      eg.appendChild(dot);
      var rect=svgEl('rect',{'x':ex-ew/2,'y':flagY,'width':ew,'height':24,'rx':5,'fill':BARE_COLOR});
      var txt=svgEl('text',{'x':ex,'y':flagY+12}); txt.textContent=label;
      eg.appendChild(rect); eg.appendChild(txt);
      this.gHead.appendChild(eg);
    }
    return;
  }
  // ---- full mode: HEAD flag ----
  // 知识锁：HEAD 旗只在 showHead 显式开启时才画（分支章/前面章节不显示 HEAD）。
  if(!this.showHead) return;
  var headCommit=null;
  if(this.head.type==='branch'){
    var b=this.branches[this.head.ref];
    if(b) headCommit=this.commits[b.head]||this.commits[b.base];
  } else if(this.head.type==='commit'){
    headCommit=this.commits[this.head.ref];
  }
  if(headCommit){
    var hx=this._colX(headCommit.index), hy=this._laneY(headCommit.lane);
    var fg=svgEl('g',{'class':'cg-head'+(this.detached?' detached':'')});
    // stem from node up to flag
    var flagY=hy-58;
    var stem=svgEl('line',{'class':'stem','x1':hx,'y1':hy-17,'x2':hx,'y2':flagY+18});
    fg.appendChild(stem);
    var fw=46;
    var rect=svgEl('rect',{'x':hx-fw/2,'y':flagY,'width':fw,'height':20,'rx':4});
    var txt=svgEl('text',{'x':hx,'y':flagY+10}); txt.textContent='HEAD';
    fg.appendChild(rect); fg.appendChild(txt);
    this.gHead.appendChild(fg);
  }
};

/* ============================================================
   AI COMMAND CARD
   ============================================================ */
function buildAICard(o){

  var card=el('div','aicard');
  card.setAttribute('data-interactive','1');

  var bub=el('div','aicard-bubble');
  bub.innerHTML='🤖 你对 AI 说：『<span class="say"></span>』';

/* ============================================================
   ASTRONAUT
   ============================================================ */
function launchAstronaut(o){
  o=o||{};
  var a=el('div','astronaut','👨‍🚀');
  var x=o.x!=null?o.x:window.innerWidth/2;
  var y=o.y!=null?o.y:window.innerHeight/2;
  a.style.left=x+'px'; a.style.top=y+'px';
  // random-ish drift up & away
  a.style.setProperty('--ax', (180+Math.random()*160)+'px');
  a.style.setProperty('--ay', (260+Math.random()*120)+'px');
  document.body.appendChild(a);
  // force reflow then animate
  void a.offsetWidth;
  a.classList.add('go');
  setTimeout(function(){ if(a.parentNode) a.parentNode.removeChild(a); }, 3000);
}

/* ============================================================
   STEP CONTROLLER  (per-screen)
   ============================================================ */
function StepController(){
  this.steps=[];        // array of {fn}
  this.resetCbs=[];
}
StepController.prototype.add=function(fn){ this.steps.push(fn); };
StepController.prototype.count=function(){ return this.steps.length; };
/* play steps up to targetStep (1-indexed count of executed steps).
   animated=false for replay. */
StepController.prototype.runTo=function(target, animated){
  for(var i=0;i<target && i<this.steps.length;i++){
    try{ this.steps[i](animated); }catch(err){ console.error('step error',err); }
  }
};

/* ============================================================
   DECK ENGINE
   ============================================================ */
var Deck = {
  screens:[],     // resolved & sorted screen defs
  idx:0,          // current screen index
  step:0,         // current step within screen (0 = initial)
  els:[],         // screen root divs
  ctrl:null,      // current StepController
  api:null,

  boot:function(){
    var deck=document.getElementById('deck');
    var note=document.getElementById('empty-note');

    // sort: by chapter asc, stable within chapter (registration order preserved by stable sort)
    this.screens = SCREENS.slice();
    this.screens.forEach(function(s,i){ s.__reg=i; });
    this.screens.sort(function(a,b){
      var ca=a.chapter||0, cb=b.chapter||0;
      if(ca!==cb) return ca-cb;
      return a.__reg-b.__reg;
    });

    if(!this.screens.length){
      note.style.display='flex';
      return;
    }
    note.style.display='none';

    // create a root div per screen
    var self=this;
    this.screens.forEach(function(s,i){
      var sc=el('div','screen');
      sc.setAttribute('data-screen-idx',i);
      var inner=el('div','screen-inner');
      sc.appendChild(inner);
      sc._inner=inner;
      deck.appendChild(sc);
      self.els.push(sc);
    });

    this.buildOverview();
    this.bindEvents();

    // route from hash if present (#s<idx> or #s<idx>.<step>)
    var routed=this.parseHash();
    this.go(routed.idx||0, routed.step||0, false);
  },

  parseHash:function(){
    var m=/^#s(\d+)(?:\.(\d+))?$/.exec(location.hash||'');
    if(m) return {idx:Math.min(+m[1], this.screens.length-1), step:+(m[2]||0)};
    return {idx:0, step:0};
  },
  writeHash:function(){
    var h='#s'+this.idx+(this.step?('.'+this.step):'');
    if(location.hash!==h) history.replaceState(null,'',h);
  },

  /* build api object given current screen root + controller */
  makeApi:function(ctrl, isReplay){
    var self=this;
    return {
      isReplay:isReplay,
      step:function(fn){ ctrl.add(fn); },
      frag:function(elm){
        elm.classList.add('frag-hidden');
        ctrl.add(function(animated){
          // show
          elm.classList.remove('frag-hidden');
          elm.classList.add('frag-show');
          if(!animated){
            // jump without transition for replay
            var prev=elm.style.transition; elm.style.transition='none';
            void elm.offsetWidth; elm.style.transition=prev;
          }
        });
        return elm;
      },
      graph:function(container, opts){
        var g=new CommitGraph(container, opts);
        g._api=self.api; // give graph access to astronaut etc (set after api built)
        return g;
      },
      aiCard:function(o){ return buildAICard(o); },
      astronaut:function(o){ launchAstronaut(o); },
      next:function(){ self.next(); },
      prev:function(){ self.prev(); },
      onReset:function(fn){ ctrl.resetCbs.push(fn); }
    };
  },

  /* render screen idx fresh, then replay to step */
  renderScreen:function(idx, targetStep, animated){
    var def=this.screens[idx];
    var sc=this.els[idx];
    sc._inner.innerHTML='';        // fresh
    var ctrl=new StepController();
    this.ctrl=ctrl;

    // isReplay = true whenever the screen is being (re)built non-animated
    // (back-step, prev-screen-at-last-step, resize, hash route). Render code
    // can use it to skip one-time entrance animations.
    var api=this.makeApi(ctrl, animated===false);
    this.api=api;

    try{
      def.render(sc._inner, api);
    }catch(err){ console.error('render error in screen',idx,err); }

    // clamp target
    var max=ctrl.count();
    if(targetStep>max) targetStep=max;
    if(targetStep<0) targetStep=0;
    this.step=targetStep;

    // replay steps to target without animation (initial DOM already at step 0)
    if(targetStep>0) ctrl.runTo(targetStep, false);

    return ctrl;
  },

  go:function(idx, step, animated){
    if(idx<0) idx=0;
    if(idx>this.screens.length-1) idx=this.screens.length-1;
    // hide all, show target
    this.els.forEach(function(e){ e.classList.remove('is-active'); });
    this.idx=idx;
    var sc=this.els[idx];
    sc.classList.add('is-active');
    this.renderScreen(idx, step||0, animated===false?false:false);
    // note: entering a screen always replays via animated=false for the step playback,
    // but the screen transition itself uses CSS. Live step advances use animated=true.
    this.updateChrome();
    this.writeHash();
    this.markOverviewCurrent();
  },

  next:function(){
    // advance step within screen first
    if(this.ctrl && this.step < this.ctrl.count()){
      this.step++;
      // run only the newly-revealed step WITH animation
      try{ this.ctrl.steps[this.step-1](true); }catch(e){ console.error(e); }
      this.updateChrome();
      this.writeHash();
      return;
    }
    // else go to next screen
    if(this.idx < this.screens.length-1){
      this.go(this.idx+1, 0, true);
    }
  },

  prev:function(){
    if(this.step>0){
      // step back: re-render screen at step-1 (replay, no anim)
      this.step--;
      this.renderScreen(this.idx, this.step, false);
      this.updateChrome();
      this.writeHash();
      return;
    }
    if(this.idx>0){
      // go to previous screen at its LAST step
      var prevIdx=this.idx-1;
      // render fresh to learn step count
      this.els.forEach(function(e){ e.classList.remove('is-active'); });
      this.idx=prevIdx;
      var sc=this.els[prevIdx];
      sc.classList.add('is-active');
      var ctrl=this.renderScreen(prevIdx, 0, false);
      var last=ctrl.count();
      this.step=last;
      if(last>0) ctrl.runTo(last, false);
      this.updateChrome();
      this.writeHash();
      this.markOverviewCurrent();
    }
  },

  resetScreen:function(){
    if(this.ctrl){
      this.ctrl.resetCbs.forEach(function(fn){ try{fn();}catch(e){console.error(e);} });
    }
    this.go(this.idx, 0, true);
  },

  updateChrome:function(){
    var def=this.screens[this.idx];
    // progress = overall position across screens & steps
    var total=0, done=0, self=this;
    // approximate: count each screen as 1 + its known step count? We only know current ctrl.
    // Use screens as primary unit plus intra-screen fraction.
    var n=this.screens.length;
    var intra = this.ctrl && this.ctrl.count()>0 ? (this.step/this.ctrl.count()) : 0;
    var frac = (this.idx + intra) / n;
    document.getElementById('progress').style.width=(frac*100).toFixed(2)+'%';

    document.getElementById('foot-chap').textContent='第 '+(def.chapter||0)+' 章 · '+(def.chapterName||'');
    var ft=document.getElementById('foot-title');
    ft.textContent = def.title ? ('— '+def.title) : '';
  },

  /* ---- overview ---- */
  buildOverview:function(){
    var body=document.getElementById('ov-body');
    body.innerHTML='';
    // group by chapter
    var groups=[]; var byCh={};
    var self=this;
    this.screens.forEach(function(s,i){
      var ch=s.chapter||0;
      if(!byCh[ch]){ byCh[ch]={chapter:ch, name:s.chapterName||'', items:[]}; groups.push(byCh[ch]); }
      byCh[ch].items.push({def:s, idx:i});
    });
    groups.sort(function(a,b){return a.chapter-b.chapter;});
    groups.forEach(function(grp){
      var gEl=el('div','ov-chapter');
      var h=el('div','ov-chapter-h');
      h.appendChild(el('span','num','第 '+grp.chapter+' 章'));
      h.appendChild(el('span','nm',grp.name));
      gEl.appendChild(h);
      var list=el('div','ov-list');
      grp.items.forEach(function(it){
        var item=el('button','ov-item');
        item.setAttribute('data-goto',it.idx);
        var idxBadge=el('span','idx','#'+(it.idx+1));
        item.appendChild(idxBadge);
        item.appendChild(el('div','t',it.def.title||it.def.id||('屏 '+(it.idx+1))));
        if(it.def.subtitle) item.appendChild(el('div','s',it.def.subtitle));
        item.addEventListener('click',function(){
          self.closeOverview();
          self.go(it.idx,0,true);
        });
        list.appendChild(item);
      });
      gEl.appendChild(list);
      body.appendChild(gEl);
    });
  },
  markOverviewCurrent:function(){
    var items=document.querySelectorAll('.ov-item');
    var self=this;
    items.forEach(function(it){
      it.classList.toggle('current', +it.getAttribute('data-goto')===self.idx);
    });
  },
  openOverview:function(){ document.getElementById('overview').classList.add('open'); this.markOverviewCurrent(); },
  closeOverview:function(){ document.getElementById('overview').classList.remove('open'); },
  toggleOverview:function(){
    var ov=document.getElementById('overview');
    if(ov.classList.contains('open')) this.closeOverview(); else this.openOverview();
  },

  toggleFull:function(){
    if(!document.fullscreenElement){
      (document.documentElement.requestFullscreen||function(){}).call(document.documentElement);
    } else {
      (document.exitFullscreen||function(){}).call(document);
    }
  },

  /* ---- input ---- */
  bindEvents:function(){
    var self=this;
    document.addEventListener('keydown',function(e){
      var ov=document.getElementById('overview').classList.contains('open');
      if(e.key==='Escape'){ self.toggleOverview(); e.preventDefault(); return; }
      if(ov){ return; } // when overview open, ignore nav keys (esc handled)
      switch(e.key){
        case ' ': case 'ArrowRight': case 'PageDown':
          self.next(); e.preventDefault(); break;
        case 'ArrowLeft': case 'PageUp':
          self.prev(); e.preventDefault(); break;
        case 'f': case 'F':
          self.toggleFull(); e.preventDefault(); break;
        case 'r': case 'R':
          self.resetScreen(); e.preventDefault(); break;
      }
    });

    // click left/right halves of screen, guarding interactive elements
    document.getElementById('deck').addEventListener('click',function(e){
      if(e.target.closest('button,a,input,textarea,select,[data-interactive],.sc-btn,.aicard-toggle')) return;
      var x=e.clientX, mid=window.innerWidth/2;
      if(x<mid) self.prev(); else self.next();
    });

    // chrome buttons
    document.getElementById('btn-next').addEventListener('click',function(){self.next();});
    document.getElementById('btn-prev').addEventListener('click',function(){self.prev();});
    document.getElementById('btn-reset').addEventListener('click',function(){self.resetScreen();});
    document.getElementById('btn-full').addEventListener('click',function(){self.toggleFull();});
    document.getElementById('menu-btn').addEventListener('click',function(){self.toggleOverview();});
    document.getElementById('ov-close').addEventListener('click',function(){self.closeOverview();});

    // re-layout graphs on resize (re-render current screen at current step)
    var rt;
    window.addEventListener('resize',function(){
      clearTimeout(rt);
      rt=setTimeout(function(){ self.renderScreen(self.idx, self.step, false); }, 180);
    });
  }
};

/* ------------------------------------------------------------
   DECORATIVE BACKGROUND GENERATION
   ------------------------------------------------------------ */
function buildDeco(){
  var g=document.getElementById('deco-g');
  if(!g) return;
  // scattered faint stars (deterministic via simple LCG so layout is stable)
  var seed=20240601;
  function rnd(){ seed=(seed*1103515245+12345)&0x7fffffff; return seed/0x7fffffff; }
  for(var s=0;s<120;s++){
    var sx=rnd()*1200, sy=rnd()*800, sr=rnd()*1.1+0.3;
    var star=document.createElementNS(SVGNS,'circle');
    star.setAttribute('class','deco-star');
    star.setAttribute('cx',sx.toFixed(1)); star.setAttribute('cy',sy.toFixed(1));
    star.setAttribute('r',sr.toFixed(2));
    star.setAttribute('opacity',(rnd()*0.10+0.03).toFixed(3));
    g.appendChild(star);
  }
  var lanes=[150,330,520,680];
  var x=0, prevPts=[];
  // draw a few wandering lanes with dots, repeated to allow seamless drift
  for(var rep=0;rep<2;rep++){
    var ox=rep*620;
    lanes.forEach(function(ly,li){
      var py=ly;
      var prevX=null, prevY=null;
      for(var i=0;i<9;i++){
        var cx=ox+60+i*70;
        var cy=ly + (i%3===0? (li%2?20:-20):0);
        if(prevX!==null){
          var d='M'+prevX+','+prevY+' C'+((prevX+cx)/2)+','+prevY+' '+((prevX+cx)/2)+','+cy+' '+cx+','+cy;
          var p=document.createElementNS(SVGNS,'path');
          p.setAttribute('class','deco-line'); p.setAttribute('d',d); g.appendChild(p);
        }
        var c=document.createElementNS(SVGNS,'circle');
        c.setAttribute('class','deco-dot'); c.setAttribute('cx',cx); c.setAttribute('cy',cy); c.setAttribute('r',9);
        g.appendChild(c);
        prevX=cx; prevY=cy;
      }
    });
  }
}

/* ------------------------------------------------------------
   BOOT
   ------------------------------------------------------------ */
function start(){
  buildDeco();
  Deck.screens=[]; // reset
  Deck.boot();
}
if(document.readyState==='loading') document.addEventListener('DOMContentLoaded',start);
else start();

// expose for debugging / integration
window.__Deck = Deck;

})();
