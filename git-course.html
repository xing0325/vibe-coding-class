<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Git &amp; GitHub 大串讲 · 互动课程</title>
<style>
  :root {
    --course-accent: #2f81f7;
    --course-accent-soft: rgba(47, 129, 247, 0.15);
    --c-bg: #0d1117;
    --c-bg-card: #161b22;
    --c-bg-soft: #21262d;
    --c-fg: #e6edf3;
    --c-fg-muted: #7d8590;
    --c-border: #30363d;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: var(--c-bg);
    color: var(--c-fg);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans", "PingFang SC", "Microsoft YaHei", Helvetica, Arial, sans-serif;
    height: 100%;
  }
  body { min-height: 100vh; overflow-x: hidden; }
  code, .deck-code, .deck-kbd { font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace; }

  /* ============ 顶部进度条 ============ */
  #course-progress {
    position: fixed; top: 0; left: 0; right: 0; height: 4px;
    background: rgba(255,255,255,0.06); z-index: 100;
  }
  #course-progress > div {
    height: 100%; width: 0;
    background: linear-gradient(90deg, var(--course-accent), #3fb950);
    transition: width 0.35s ease;
  }

  /* ============ 封面 / 大纲 ============ */
  #course-home {
    max-width: 1100px; margin: 0 auto; padding: 64px 24px 80px;
  }
  .home-hero { text-align: center; margin-bottom: 56px; }
  .home-hero .badge {
    display: inline-block; padding: 5px 14px; border-radius: 999px;
    background: var(--course-accent-soft); color: var(--course-accent);
    font-size: 13px; font-weight: 600; letter-spacing: 0.04em; margin-bottom: 20px;
  }
  .home-hero h1 {
    font-size: clamp(34px, 6vw, 64px); margin: 0 0 16px;
    background: linear-gradient(120deg, #a371f7, #2f81f7, #39c5cf, #3fb950);
    -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
    font-weight: 800; letter-spacing: -0.01em;
  }
  .home-hero p { font-size: 18px; color: var(--c-fg-muted); margin: 0 auto; max-width: 640px; line-height: 1.7; }

  .chapter-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 18px;
  }
  .chapter-card {
    position: relative; overflow: hidden;
    background: var(--c-bg-card); border: 1px solid var(--c-border);
    border-radius: 14px; padding: 22px 22px 22px 26px; cursor: pointer;
    transition: transform 0.18s ease, border-color 0.18s ease, box-shadow 0.18s ease;
    text-align: left;
  }
  .chapter-card::before {
    content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 5px;
    background: var(--cc, #2f81f7);
  }
  .chapter-card:hover { transform: translateY(-4px); border-color: var(--cc, #2f81f7); box-shadow: 0 12px 32px rgba(0,0,0,0.45); }
  .chapter-card .cc-top { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
  .chapter-card .cc-emoji { font-size: 30px; line-height: 1; }
  .chapter-card .cc-num {
    font-size: 12px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--cc, #2f81f7); background: color-mix(in srgb, var(--cc, #2f81f7) 15%, transparent);
    padding: 3px 9px; border-radius: 999px; margin-left: auto;
  }
  .chapter-card h3 { margin: 0 0 6px; font-size: 19px; }
  .chapter-card p { margin: 0; color: var(--c-fg-muted); font-size: 14px; line-height: 1.6; }
  .chapter-card .cc-done { color: #3fb950; font-size: 12px; margin-top: 10px; font-weight: 600; }

  .practice-card {
    grid-column: 1 / -1;
    background: linear-gradient(135deg, rgba(46,160,67,0.16), rgba(47,129,247,0.12));
    border: 1px solid #2ea043;
  }
  .practice-card::before { background: #2ea043; }
  .practice-card:hover { border-color: #3fb950; }

  /* ============ Deck 视图 ============ */
  #course-deck { display: none; flex-direction: column; min-height: 100vh; }
  #course-deck.active { display: flex; }
  .deck-topbar {
    display: flex; align-items: center; gap: 16px;
    padding: 16px 28px; border-bottom: 1px solid var(--c-border);
    position: sticky; top: 0; background: rgba(13,17,23,0.85); backdrop-filter: blur(10px); z-index: 50;
  }
  .deck-topbar .dt-back {
    display: inline-flex; align-items: center; gap: 6px;
    background: var(--c-bg-soft); border: 1px solid var(--c-border); color: var(--c-fg);
    padding: 7px 13px; border-radius: 8px; cursor: pointer; font-size: 13px;
  }
  .deck-topbar .dt-back:hover { border-color: var(--course-accent); }
  .deck-topbar .dt-title { font-weight: 700; font-size: 16px; display: flex; align-items: center; gap: 8px; }
  .deck-topbar .dt-title .dt-emoji { font-size: 20px; }
  .deck-topbar .dt-chip {
    font-size: 12px; color: var(--course-accent);
    background: var(--course-accent-soft); padding: 3px 10px; border-radius: 999px; font-weight: 600;
  }
  .deck-topbar .dt-count { margin-left: auto; color: var(--c-fg-muted); font-size: 13px; font-variant-numeric: tabular-nums; }

  .deck-stage-wrap { flex: 1; display: flex; align-items: stretch; justify-content: center; padding: 32px 24px; }
  .deck-stage {
    width: 100%; max-width: 980px; margin: 0 auto;
    animation: deck-fade 0.32s ease;
  }
  @keyframes deck-fade { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

  .deck-nav {
    display: flex; align-items: center; justify-content: space-between; gap: 16px;
    padding: 16px 28px 28px; max-width: 980px; margin: 0 auto; width: 100%;
  }
  .deck-dots { display: flex; gap: 7px; flex-wrap: wrap; justify-content: center; flex: 1; }
  .deck-dot { width: 9px; height: 9px; border-radius: 50%; background: var(--c-bg-soft); border: 1px solid var(--c-border); cursor: pointer; transition: all 0.18s; }
  .deck-dot.active { background: var(--course-accent); border-color: var(--course-accent); transform: scale(1.25); }
  .deck-dot.seen { background: color-mix(in srgb, var(--course-accent) 45%, transparent); }

  .deck-navbtn {
    display: inline-flex; align-items: center; gap: 7px;
    padding: 11px 20px; border-radius: 10px; cursor: pointer; font-size: 15px; font-weight: 600;
    border: 1px solid var(--c-border); background: var(--c-bg-soft); color: var(--c-fg);
    transition: all 0.16s;
  }
  .deck-navbtn.primary { background: var(--course-accent); border-color: var(--course-accent); color: #fff; }
  .deck-navbtn.primary:hover { filter: brightness(1.1); }
  .deck-navbtn:disabled { opacity: 0.35; cursor: not-allowed; }
  .deck-navbtn:not(:disabled):hover { border-color: var(--course-accent); }

  .deck-hint-key {
    text-align: center; color: var(--c-fg-muted); font-size: 12px; padding-bottom: 18px;
  }
  .deck-hint-key kbd {
    background: var(--c-bg-soft); border: 1px solid var(--c-border); border-radius: 5px;
    padding: 1px 7px; font-size: 11px; margin: 0 2px;
  }

  /* ============ 章节内容通用 class（供章节模块使用）============ */
  .deck-h1 { font-size: clamp(26px, 4vw, 40px); font-weight: 800; margin: 0 0 18px; letter-spacing: -0.01em; }
  .deck-h2 { font-size: clamp(20px, 3vw, 27px); font-weight: 700; margin: 0 0 14px; }
  .deck-lead { font-size: 19px; color: var(--c-fg); line-height: 1.75; margin: 0 0 18px; }
  .deck-p { font-size: 16px; color: var(--c-fg-muted); line-height: 1.8; margin: 0 0 14px; }
  .deck-p strong, .deck-lead strong { color: var(--c-fg); }
  .deck-callout {
    border-left: 4px solid var(--course-accent);
    background: var(--course-accent-soft);
    padding: 14px 18px; border-radius: 0 10px 10px 0; margin: 16px 0; line-height: 1.7;
  }
  .deck-callout.warn { border-left-color: #d29922; background: rgba(210,153,34,0.13); }
  .deck-code {
    background: #010409; border: 1px solid var(--c-border); border-radius: 10px;
    padding: 14px 18px; font-size: 14px; line-height: 1.7; overflow-x: auto;
    color: #e6edf3; white-space: pre; margin: 14px 0;
  }
  .deck-kbd {
    background: var(--c-bg-soft); border: 1px solid var(--c-border); border-radius: 6px;
    padding: 2px 8px; font-size: 13px; color: var(--course-accent);
  }
  .deck-btn {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 11px 20px; border-radius: 10px; cursor: pointer; font-size: 15px; font-weight: 600;
    background: var(--course-accent); color: #fff; border: 1px solid var(--course-accent);
    text-decoration: none; transition: all 0.16s;
  }
  .deck-btn:hover { filter: brightness(1.12); transform: translateY(-2px); }
  .deck-btn.ghost { background: var(--c-bg-soft); color: var(--c-fg); border-color: var(--c-border); }
  .deck-btn.ghost:hover { border-color: var(--course-accent); }
  .deck-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 16px; margin: 16px 0; }
  .deck-card {
    background: var(--c-bg-card); border: 1px solid var(--c-border);
    border-radius: 12px; padding: 18px; line-height: 1.7;
  }
  .deck-card h4 { margin: 0 0 8px; font-size: 16px; }
  .deck-center { display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; min-height: 60vh; }
  .deck-stage svg { max-width: 100%; height: auto; }
  .deck-stage svg text { font-family: -apple-system, "Segoe UI", "PingFang SC", sans-serif; }

  /* 加载占位 */
  #course-loading { text-align: center; padding: 120px 24px; color: var(--c-fg-muted); }
</style>
</head>
<body>
  <div id="course-progress"><div></div></div>

  <!-- 封面 / 大纲 -->
  <div id="course-home">
    <div class="home-hero">
      <span class="badge">VIBE CODER 友好 · 互动翻页课程</span>
      <h1>Git &amp; GitHub 大串讲</h1>
      <p>从「版本控制是什么」到「多人协作怎么玩」，用树状图、动画和亲手互动把 Git 的设计之美讲透。你不用背命令——AI 时代，记住效果就够了。</p>
    </div>
    <div class="chapter-grid" id="chapter-grid">
      <div id="course-loading">章节加载中…（如果一直显示这行，说明章节模块没注册成功）</div>
    </div>
  </div>

  <!-- Deck 视图 -->
  <div id="course-deck">
    <div class="deck-topbar">
      <button class="dt-back" id="deck-back">← 课程大纲</button>
      <span class="dt-title"><span class="dt-emoji" id="deck-emoji"></span><span id="deck-title"></span></span>
      <span class="dt-chip" id="deck-chip"></span>
      <span class="dt-count" id="deck-count"></span>
    </div>
    <div class="deck-stage-wrap">
      <div class="deck-stage" id="deck-stage"></div>
    </div>
    <div class="deck-nav">
      <button class="deck-navbtn" id="deck-prev">← 上一页</button>
      <div class="deck-dots" id="deck-dots"></div>
      <button class="deck-navbtn primary" id="deck-next">下一页 →</button>
    </div>
    <div class="deck-hint-key"><kbd>←</kbd> <kbd>→</kbd> 翻页 · <kbd>Enter</kbd> 下一页 · <kbd>Esc</kbd> 回大纲</div>
  </div>

<!-- ===== CHAPTER MODULES INLINE BELOW ===== -->
<script>window.__pendingChapters=[];window.registerChapter=function(c){window.__pendingChapters.push(c);};</script>
<!-- ch-intro -->
<script>
(function () {
  'use strict';

  // ============================================================
  // 第1章 · 什么是 Git / GitHub
  // theme: #a371f7  emoji: 🌱
  // 样式前缀: c-intro-
  // ============================================================

  // 复用：一个简洁的内联 git logo（三节点 + 分支连线）
  function gitLogoSVG(size) {
    var s = size || 120;
    return (
      '<svg class="c-intro-gitlogo" viewBox="0 0 120 120" width="' + s + '" height="' + s + '" aria-hidden="true">' +
        '<line x1="60" y1="92" x2="60" y2="60" stroke="var(--course-accent)" stroke-width="6" stroke-linecap="round"/>' +
        '<line x1="60" y1="60" x2="92" y2="34" stroke="var(--course-accent)" stroke-width="6" stroke-linecap="round"/>' +
        // 主干上的点
        '<circle cx="60" cy="92" r="12" fill="var(--course-accent)" stroke="#fff" stroke-width="3"/>' +
        '<circle cx="60" cy="60" r="12" fill="var(--course-accent)" stroke="#fff" stroke-width="3"/>' +
        // 分支出去的点
        '<circle cx="92" cy="34" r="12" fill="var(--course-accent)" stroke="#fff" stroke-width="3"/>' +
      '</svg>'
    );
  }

  window.registerChapter({
    id: 'intro',
    index: 1,
    emoji: '🌱',
    title: '什么是 Git',
    subtitle: 'GitHub = Git + Hub',
    theme: '#a371f7',
    slides: [

      // ---------- Slide 1：开场，拆字 GitHub = Git + Hub ----------
      {
        title: '先拆个字',
        render: function (stage, api) {
          stage.innerHTML =
            '<div class="deck-center">' +
              '<p class="deck-lead">你天天听人说 <b>GitHub</b>，但它其实是俩词拼起来的 👇</p>' +
              '<div class="c-intro-merge" id="c-intro-merge">' +
                '<span class="c-intro-word" id="c-intro-git">Git</span>' +
                '<span class="c-intro-plus" id="c-intro-plus">+</span>' +
                '<span class="c-intro-word" id="c-intro-hub">Hub</span>' +
              '</div>' +
              '<button class="deck-btn" id="c-intro-mergebtn">👆 点一下，把它们拼起来</button>' +
              '<p class="deck-p c-intro-hint" id="c-intro-hint" style="visibility:hidden">' +
                '<b>Hub</b> 是"中心 / 集散地"——一个把大家的代码放在一起、能互相分享的网站。<br>' +
                '所以这一章我们先搞懂前半截：<b style="color:var(--course-accent)">Git</b> 到底是啥。' +
              '</p>' +
            '</div>' +
            '<style>' +
            '.c-intro-merge{display:flex;align-items:center;justify-content:center;gap:18px;margin:34px 0;font-size:64px;font-weight:800;letter-spacing:1px;}' +
            '.c-intro-word{padding:14px 26px;border-radius:18px;background:var(--c-bg-soft);border:2px solid var(--c-border);transition:all .55s cubic-bezier(.34,1.56,.64,1);}' +
            '#c-intro-git{color:var(--course-accent);}' +
            '#c-intro-hub{color:var(--c-fg);}' +
            '.c-intro-plus{font-size:42px;color:var(--c-fg-muted);transition:all .4s ease;}' +
            '.c-intro-merge.merged{gap:0;}' +
            '.c-intro-merge.merged .c-intro-plus{opacity:0;transform:scale(0);width:0;}' +
            '.c-intro-merge.merged #c-intro-git{border-top-right-radius:0;border-bottom-right-radius:0;border-right:none;transform:translateX(8px);}' +
            '.c-intro-merge.merged #c-intro-hub{border-top-left-radius:0;border-bottom-left-radius:0;border-left:none;transform:translateX(-8px);}' +
            '.c-intro-merge.merged .c-intro-word{box-shadow:0 0 26px var(--course-accent-soft);}' +
            '.c-intro-hint{transition:opacity .4s ease;}' +
            '</style>';

          var box = stage.querySelector('#c-intro-merge');
          var hint = stage.querySelector('#c-intro-hint');
          var btn = stage.querySelector('#c-intro-mergebtn');
          var merged = false;
          function toggle() {
            merged = !merged;
            box.classList.toggle('merged', merged);
            hint.style.visibility = merged ? 'visible' : 'hidden';
            btn.textContent = merged ? '🔁 再拆开看看' : '👆 点一下，把它们拼起来';
          }
          btn.addEventListener('click', toggle);
          box.addEventListener('click', toggle);
        }
      },

      // ---------- Slide 2：那 Git 是什么？亮出 git logo + 揭晓定义 ----------
      {
        title: '那 Git 是什么？',
        render: function (stage, api) {
          stage.innerHTML =
            '<div class="deck-center">' +
              '<p class="deck-lead">把 GitHub 拆出来的前半截——<b style="color:var(--course-accent)">Git</b>，它本身是一个<b>软件</b> 👇</p>' +
              '<div class="c-intro-reveal" id="c-intro-reveal">' +
                gitLogoSVG(150) +
              '</div>' +
              '<button class="deck-btn" id="c-intro-revealbtn">✨ 揭晓答案</button>' +
              '<div class="deck-callout c-intro-def" id="c-intro-def" style="display:none">' +
                '<div class="deck-h2" style="margin:0 0 6px">Git = 版本控制软件</div>' +
                '<p class="deck-p" style="margin:0">一个帮你<b>记录和管理"一份东西的不同版本"</b>的工具。' +
                '下一页我们用你最熟的场景来解释什么叫"版本控制"。</p>' +
              '</div>' +
            '</div>' +
            '<style>' +
            '.c-intro-reveal{margin:28px auto 8px;display:flex;justify-content:center;}' +
            '.c-intro-gitlogo{filter:drop-shadow(0 0 20px var(--course-accent-soft));animation:c-intro-float 3s ease-in-out infinite;}' +
            '@keyframes c-intro-float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}' +
            '.c-intro-def{max-width:560px;margin:22px auto 0;text-align:left;animation:c-intro-pop .45s cubic-bezier(.34,1.56,.64,1);}' +
            '@keyframes c-intro-pop{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}' +
            '</style>';

          var btn = stage.querySelector('#c-intro-revealbtn');
          var def = stage.querySelector('#c-intro-def');
          btn.addEventListener('click', function () {
            def.style.display = 'block';
            btn.style.display = 'none';
          });
        }
      },

      // ---------- Slide 3：什么是"版本控制"？写推文类比 ----------
      {
        title: '什么是"版本控制"？',
        render: function (stage, api) {
          var versions = [
            { name: '第一版', emoji: '📄' },
            { name: '第二版', emoji: '📄' },
            { name: '第三版', emoji: '📄' },
            { name: '定稿版', emoji: '📝' },
            { name: '最终版', emoji: '✅' },
            { name: '打死不改最终版', emoji: '🔒' }
          ];
          var cards = versions.map(function (v, i) {
            return (
              '<div class="c-intro-file" style="animation-delay:' + (i * 90) + 'ms">' +
                '<div class="c-intro-file-ico">' + v.emoji + '</div>' +
                '<div class="c-intro-file-name">' + v.name + '</div>' +
                '<div class="c-intro-file-num">v' + (i + 1) + '</div>' +
              '</div>'
            );
          }).join('<span class="c-intro-arrow">→</span>');

          stage.innerHTML =
            '<h2 class="deck-h2">想象你在给线下活动写推文 📣</h2>' +
            '<p class="deck-lead">同一篇推文，你会存好多个版本，越改越多：</p>' +
            '<div class="c-intro-files">' + cards + '</div>' +
            '<div class="deck-callout warn" style="margin-top:26px">' +
              '<b>为什么要小心保存每一个历史版本？</b><br>' +
              '因为有时候你会想<b>反悔</b>——"最终版"删掉的那段文案，其实"第三版"里写得更好。' +
              '只要历史版本都还在，你随时能<b>翻回去</b>，找回被删掉的段落。' +
            '</div>' +
            '<style>' +
            '.c-intro-files{display:flex;align-items:center;justify-content:center;flex-wrap:wrap;gap:6px;margin:26px 0;}' +
            '.c-intro-file{display:flex;flex-direction:column;align-items:center;gap:4px;background:var(--c-bg-card);border:1px solid var(--c-border);border-radius:12px;padding:12px 14px;min-width:78px;animation:c-intro-rise .5s both cubic-bezier(.34,1.56,.64,1);}' +
            '.c-intro-file-ico{font-size:30px;line-height:1;}' +
            '.c-intro-file-name{font-size:12px;color:var(--c-fg);white-space:nowrap;}' +
            '.c-intro-file-num{font-size:11px;color:var(--course-accent);font-weight:700;font-family:ui-monospace,monospace;}' +
            '.c-intro-arrow{color:var(--c-fg-muted);font-size:20px;}' +
            '@keyframes c-intro-rise{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}' +
            '</style>';
        }
      },

      // ---------- Slide 4：这就是最原始的版本控制（一个人 + 纯人工） ----------
      {
        title: '其实你早就在做版本控制了',
        render: function (stage, api) {
          stage.innerHTML =
            '<div class="deck-center">' +
              '<div class="c-intro-bigemoji">🙋‍♂️📄📄📄</div>' +
              '<h2 class="deck-h2">恭喜，这就是<span style="color:var(--course-accent)">最原始的版本控制</span></h2>' +
              '<p class="deck-lead">"留着每个历史版本、需要时翻回去"——你存推文的方式，本质上就是在做版本控制。</p>' +
              '<div class="deck-grid c-intro-2col">' +
                '<div class="deck-card">' +
                  '<div class="c-intro-card-h">👤 但它只有一个人</div>' +
                  '<p class="deck-p" style="margin:0">从头到尾都是你自己在改、自己在记。</p>' +
                '</div>' +
                '<div class="deck-card">' +

<script>
(function () {
  'use strict';

  // ============================================================
  // 第2章 · Commit 提交
  // theme: #3fb950  emoji: 📦
  // 样式前缀: c-commit-
  // ============================================================

  // 推文版本名 <-> commit 一一对应
  var TWEET_VERSIONS = ['第一版', '第二版', '第三版', '定稿版', '最终版', '打死不改最终版'];
  var COMMIT_HASHES = ['a1f3c0', 'b7e9d2', 'c2a8f1', 'd0c4b9', 'e5f7a3', 'f9b1e8'];
  var COMMIT_MSGS = [
    '初稿：搭好推文骨架',
    '补上活动时间地点',
    '改了开头的钩子',
    '定稿：润色措辞',
    '换了一张封面图',
    '修个错别字（真的最后一次）'
  ];

  // 画一条横向 commit 链。
  // opts: { ids, msgs, topLabels, head(index|null), interactive(bool), accent } 由调用方决定坐标
  function buildChainSVG(opts) {
    var ids = opts.ids;
    var n = ids.length;
    var w = 760, h = opts.topLabels ? 230 : 170;
    var pad = 70;
    var gap = (w - pad * 2) / (n - 1);
    var cy = opts.topLabels ? 150 : 86;
    var r = 16;

    var parts = [];
    parts.push('<svg class="c-commit-chain" viewBox="0 0 ' + w + ' ' + h + '" width="100%" aria-hidden="true">');

    // 连线（先画，垫底）
    for (var i = 0; i < n - 1; i++) {
      var x1 = pad + gap * i, x2 = pad + gap * (i + 1);
      parts.push('<line x1="' + x1 + '" y1="' + cy + '" x2="' + x2 + '" y2="' + cy + '" stroke="var(--course-accent)" stroke-width="4"/>');
    }

    // 顶部推文版本名 + 连到对应 commit 的虚线
    if (opts.topLabels) {
      for (var t = 0; t < n; t++) {
        var lx = pad + gap * t;
        parts.push('<line x1="' + lx + '" y1="48" x2="' + lx + '" y2="' + (cy - r - 4) + '" stroke="var(--c-fg-muted)" stroke-width="1.5" stroke-dasharray="3 4"/>');
        parts.push('<text x="' + lx + '" y="40" text-anchor="middle" font-size="13" fill="var(--c-fg)" font-weight="600">' + opts.topLabels[t] + '</text>');
      }
    }

    // commit 圆点 + 下方编号/hash
    for (var c = 0; c < n; c++) {
      var cx = pad + gap * c;
      var g = '<g class="c-commit-node" data-i="' + c + '"' + (opts.interactive ? ' style="cursor:pointer"' : '') + '>';
      // 交互模式下加一个透明大热区，方便点
      if (opts.interactive) {
        g += '<circle class="c-commit-hit" cx="' + cx + '" cy="' + cy + '" r="30" fill="transparent"/>';
      }
      g += '<circle class="c-commit-dot" cx="' + cx + '" cy="' + cy + '" r="' + r + '" fill="var(--course-accent)" stroke="#fff" stroke-width="3"/>';
      g += '</g>';
      parts.push(g);
      // 下方两行：commit #N + hash
      var ly = cy + r + 22;
      parts.push('<text class="c-commit-num" x="' + cx + '" y="' + ly + '" text-anchor="middle" font-size="13" fill="var(--c-fg)" font-weight="700">commit #' + (c + 1) + '</text>');
      parts.push('<text class="c-commit-hash" x="' + cx + '" y="' + (ly + 17) + '" text-anchor="middle" font-size="11" fill="var(--c-fg-muted)" font-family="ui-monospace,monospace">' + ids[c] + '</text>');
    }

    parts.push('</svg>');
    return parts.join('');
  }

  window.registerChapter({
    id: 'commit',
    index: 2,
    emoji: '📦',
    title: 'Commit 提交',
    subtitle: '一次 commit = 一个版本',
    theme: '#3fb950',
    slides: [

      // ---------- Slide 1：点题，commit 是最基本单元 ----------
      {
        title: 'commit 是什么',
        render: function (stage, api) {
          stage.innerHTML =
            '<div class="deck-center">' +
              '<div class="c-commit-bigbox">📦</div>' +
              '<h1 class="deck-h1"><span style="color:var(--course-accent)">commit（提交）</span></h1>' +
              '<p class="deck-lead">是 Git 进行版本控制的<b>最基本单元</b>。</p>' +
              '<div class="deck-callout">' +
                '<p class="deck-p" style="margin:0;font-size:18px">' +
                  '一句话记住它：<br>' +
                  '<b style="color:var(--course-accent)">每一次 commit，就是一个版本。</b>' +
                '</p>' +
              '</div>' +
              '<p class="deck-p" style="color:var(--c-fg-muted)">' +
                '还记得上一章存推文吗？每存一个"第 X 版"，在 Git 里就对应一次 commit。下一页我们把它俩对起来看。' +
              '</p>' +
            '</div>' +
            '<style>' +
            '.c-commit-bigbox{font-size:64px;line-height:1;margin:6px 0 8px;animation:c-commit-bob 2.6s ease-in-out infinite;}' +
            '@keyframes c-commit-bob{0%,100%{transform:translateY(0) rotate(-2deg)}50%{transform:translateY(-9px) rotate(2deg)}}' +
            '</style>';
        }
      },

      // ---------- Slide 2：核心对照图（推文版本 ←→ commit 链）----------
      {
        title: '推文版本 ←→ commit 链',
        render: function (stage, api) {
          stage.innerHTML =
            '<h2 class="deck-h2">把上一章的推文版本，对到 commit 上 🔗</h2>' +
            '<p class="deck-lead">上面是你熟悉的推文版本名，下面是 Git 里的 commit 链，一一对应：</p>' +
            '<div class="c-commit-chartwrap">' +
              buildChainSVG({ ids: COMMIT_HASHES, topLabels: TWEET_VERSIONS, interactive: false }) +
            '</div>' +
            '<div class="deck-callout">' +
              '推文里的"<b>第三版</b>" = Git 里的 "<b>commit #3</b>"。' +
              '你每次说"存一版"，Git 那边就是"做一次 commit"。一根链串起来，就是这篇推文从头到尾的全部历史。' +
            '</div>' +
            '<style>' +
            '.c-commit-chartwrap{background:var(--c-bg-card);border:1px solid var(--c-border);border-radius:16px;padding:18px 10px;margin:18px 0;}' +
            '.c-commit-chain{display:block;max-width:760px;margin:0 auto;}' +
            '</style>';
        }
      },

      // ---------- Slide 3：commit 历史 = 项目变迁链路（可点击回溯）----------
      {
        title: '点任意一个 commit 回溯',
        render: function (stage, api) {
          stage.innerHTML =
            '<h2 class="deck-h2">commit 历史链 = 项目变迁的链路 🕰️</h2>' +
            '<p class="deck-lead">每一个 commit 都是一个存档点，<b>都可以随时回溯</b>。点链上任意一个圆点试试 👇</p>' +
            '<div class="c-commit-chartwrap">' +
              buildChainSVG({ ids: COMMIT_HASHES, interactive: true }) +
            '</div>' +
            '<div class="c-commit-detail" id="c-commit-detail">' +
              '<span class="c-commit-detail-empty">👆 点上面任意一个 commit 圆点</span>' +
            '</div>' +
            '<style>' +
            '.c-commit-chartwrap{background:var(--c-bg-card);border:1px solid var(--c-border);border-radius:16px;padding:18px 10px;margin:18px 0 14px;}' +
            '.c-commit-chain{display:block;max-width:760px;margin:0 auto;}' +
            '.c-commit-node .c-commit-dot{transition:r .2s ease,filter .2s ease;}' +
            '.c-commit-node.sel .c-commit-dot{r:20;filter:drop-shadow(0 0 12px var(--course-accent));}' +
            '.c-commit-node.sel .c-commit-num{fill:var(--course-accent);}' +
            '.c-commit-detail{min-height:78px;background:var(--c-bg-soft);border:1px solid var(--c-border);border-left:4px solid var(--course-accent);border-radius:10px;padding:14px 18px;display:flex;align-items:center;}' +
            '.c-commit-detail-empty{color:var(--c-fg-muted);}' +
            '.c-commit-detail .h{font-weight:700;color:var(--c-fg);}' +
            '.c-commit-detail code{font-family:ui-monospace,monospace;color:var(--course-accent);}' +
            '.c-commit-restore{margin-top:8px;display:inline-block;font-size:13px;background:var(--course-accent);color:#08240f;font-weight:700;padding:4px 12px;border-radius:999px;}' +
            '</style>';

          var detail = stage.querySelector('#c-commit-detail');
          var nodes = stage.querySelectorAll('.c-commit-node');
          nodes.forEach(function (node) {
            node.addEventListener('click', function () {
              var i = parseInt(node.getAttribute('data-i'), 10);
              nodes.forEach(function (x) { x.classList.remove('sel'); });
              node.classList.add('sel');
              detail.innerHTML =
                '<div>' +
                  '<div class="h">commit #' + (i + 1) + ' · <code>' + COMMIT_HASHES[i] + '</code> · 对应「' + TWEET_VERSIONS[i] + '」</div>' +
                  '<div style="color:var(--c-fg-muted);margin-top:3px">改动说明：' + COMMIT_MSGS[i] + '</div>' +
                  '<span class="c-commit-restore">⏪ 回到这个版本</span>' +
                '</div>';
            });
          });
        }
      },

      // ---------- Slide 4：协作视角，每次改动都被记录（谁/何时/改了啥）----------
      {
        title: '协作：谁改了啥一清二楚',
        render: function (stage, api) {
          var rows = [
            { who: '小明 👦', hash: 'a1f3c0', when: '周一 09:12', what: '加上了活动报名链接' },
            { who: '小红 👧', hash: 'b7e9d2', when: '周一 14:30', what: '修好了首页一处错别字' },
            { who: '你 🙋', hash: 'c2a8f1', when: '周二 10:05', what: '新增"常见问题"板块' },
            { who: '小刚 🧑', hash: 'd0c4b9', when: '周二 16:48', what: '换了一张更清楚的封面图' }
          ];
          var tr = rows.map(function (r) {
            return (
              '<div class="c-commit-row">' +

                '<div class="c-commit-cell what">' + r.what + '</div>' +

            );
          }).join('');

          stage.innerHTML =
            '<h2 class="deck-h2">人一多，commit 的好处就炸出来了 👥</h2>' +
            '<p class="deck-lead">每个协作者的<b>每一次改动</b>都会被一个 commit 记下来——谁、什么时候、改了什么，全都有据可查：</p>' +
            '<div class="c-commit-table">' +
              '<div class="c-commit-row head">' +

<script>

      '.c-repo-brand.is-hub{border-color:var(--course-accent);box-shadow:0 0 0 1px var(--course-accent);}',
      '.c-repo-brand .name{font-weight:700;font-size:15px;}',
      '.c-repo-brand .note{font-size:12px;color:var(--c-fg-muted);text-align:center;}',

      '.c-repo-ignore-toggle{display:flex;gap:8px;flex-wrap:wrap;margin:14px 0;}',
      '.c-repo-chip{cursor:pointer;border:1px solid var(--c-border);background:var(--c-bg-soft);color:var(--c-fg);border-radius:999px;padding:7px 13px;font-size:13px;user-select:none;transition:.15s;}',
      '.c-repo-chip.on{background:var(--course-accent-soft);border-color:var(--course-accent);color:var(--c-fg);}',
      '.c-repo-chip .x{color:#f85149;font-weight:700;}',

      '.c-repo-step .num{flex:none;width:30px;height:30px;border-radius:50%;background:var(--course-accent-soft);color:var(--course-accent);display:flex;align-items:center;justify-content:center;font-weight:700;}',

  // 小工具：一台电脑的 SVG

      '8.01 0 0 0 16 8c0-4.42-3.58-8-8-8z"/></svg>';

  // 小工具：GitLab 狐狸徽标（简化）
  function svgGitLabMark(size) {

      '<path d="M38 26H26l2 12h8z" fill="#fff"/>' +

  window.registerChapter({
    id: 'repo',
    index: 3,
    emoji: '☁️',
    title: '本地 vs 远端仓库',
    subtitle: 'local → remote → hub',
    theme: '#2f81f7',
    slides: [
      // ---------- 1. 两个名词：local vs remote ----------
      {
        title: '两个仓库，一台在手边，一台在云上',
        render: function (stage) {
          injectStyle();
          stage.innerHTML =
            '<h1 class="deck-h1">先认识两个名词 ☁️</h1>' +
            '<p class="deck-lead">上一章你学会了在本地 commit 存版本。但这些 commit 现在只躺在你电脑里——' +
            'git 世界里，同一个项目其实存在两份：一份在你电脑里，一份在云端。</p>' +
            '<div class="c-repo-flow">' +
              '<div class="c-repo-node">' + svgComputer(86) +

            '<div class="deck-grid">' +
              '<div class="deck-card"><h2 class="deck-h2">本地仓库 local</h2>' +
                '<p class="deck-p">就在你电脑的项目文件夹里。你写代码、提交版本（commit），全在这儿发生，断网也能干活。</p></div>' +
              '<div class="deck-card"><h2 class="deck-h2">远端仓库 remote</h2>' +

            '<div class="deck-code" id="c-repo-igfile"># .gitignore</div>' +
            '<div class="deck-callout warn">' +
              '<strong>密钥、密码千万别上传！</strong>把 <code class="deck-kbd">.env</code>、各种 key 写进 .gitignore，' +
              '否则一 push 就公开给全世界看了，这是新手最常见的事故。</div>';

          var items = [
            { name: '.env', why: '存密钥/密码，绝不能公开', danger: true, on: true },
            { name: 'node_modules/', why: '依赖包，几百兆，能重新装回来', on: true },
            { name: '*.log', why: '运行产生的临时日志', on: true },
            { name: 'dist/  build/', why: '编译产物，能从源码再生成', on: true },
            { name: '.DS_Store', why: 'macOS 自动生成的垃圾文件', on: true },
            { name: 'README.md', why: '这个要上传！别忽略它', danger: false, keep: true, on: false }
          ];
          var box = stage.querySelector('#c-repo-ig');
          var file = stage.querySelector('#c-repo-igfile');

          function render() {
            box.innerHTML = items.map(function (it, i) {
              return '<span class="c-repo-chip' + (it.on ? ' on' : '') + '" data-i="' + i + '" title="' + it.why + '">' +
                (it.on ? '✓ ' : '<span class="x">✕</span> ') + it.name + '</span>';
            }).join('');
            var lines = ['# .gitignore'];
            items.forEach(function (it) { if (it.on) lines.push(it.name); });
            if (lines.length === 1) lines.push('(空：什么都没忽略)');
            file.innerHTML = lines.join('<br>');
            box.querySelectorAll('.c-repo-chip').forEach(function (chip) {
              chip.addEventListener('click', function () {
                var i = +chip.getAttribute('data-i');
                items[i].on = !items[i].on;
                render();
              });
            });
          }
          render();
        }
      },

      // ---------- 6. 小结 ----------
      {
        title: '本章小结',
        render: function (stage) {
          injectStyle();
          stage.innerHTML =
            '<h1 class="deck-h1">一条线串起来 🧵</h1>' +
            '<p class="deck-lead">本地写、commit 存、push 上云，别人就看得到——这就是 git + GitHub 的日常循环。</p>' +
            '<div class="c-repo-summary">' +
              '<div class="c-repo-step"><div class="num">1</div><div class="txt">在 <strong>local</strong>（你的电脑）里写代码、改文件。</div></div>' +
              '<div class="c-repo-step"><div class="num">2</div><div class="txt"><strong>commit</strong> 把当前进度存成一个版本快照。</div></div>' +
              '<div class="c-repo-step"><div class="num">3</div><div class="txt"><strong>push</strong> 把这些 commit 上传到 <strong>remote</strong>（GitHub）。</div></div>' +
              '<div class="c-repo-step"><div class="num">4</div><div class="txt">队友能看到、能 <strong>pull</strong> 下来一起协作。</div></div>' +
            '</div>' +
            '<div class="deck-callout">' +
              '<strong>记住这条链：</strong> 写代码 → <code class="deck-kbd">commit</code> 存版本 → ' +
              '<code class="deck-kbd">push</code> 上传到远端(GitHub) → 全世界都能看到 / 一起改。' +
              '下一章我们讲：万一改错了，怎么吃「后悔药」。💊</div>';
        }
      }
    ]
  });
})();

</script>
<!-- ch-undo -->
<script>
(function () {
  // ===== 第4章 三种后悔药 =====================================
  // 主题色 #d29922（GitHub 金/琥珀）。样式前缀 c-undo-。
  // 框架提供翻页（底部按钮 + 键盘 ←→），本文件只负责每页内容 + 页内互动。

  function injectStyle() {
    if (document.getElementById('c-undo-style')) return;
    var s = document.createElement('style');
    s.id = 'c-undo-style';
    s.textContent = [
      '.c-undo-graph{display:block;margin:16px auto;}',
      '.c-undo-hashbox{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;background:var(--c-bg-soft);border:1px solid var(--c-border);border-radius:12px;padding:18px;text-align:center;font-size:clamp(15px,2.4vw,22px);letter-spacing:1px;word-break:break-all;margin:14px 0;}',
      '.c-undo-hashbox .short{color:#0d1117;background:var(--course-accent);border-radius:6px;padding:2px 5px;font-weight:700;}',
      '.c-undo-hashbox .rest{color:var(--c-fg-muted);}',
      '.c-undo-3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin:16px 0;}',
      '@media(max-width:760px){.c-undo-3{grid-template-columns:1fr;}}',
      '.c-undo-pill{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:10px 0 4px;}',
      '.c-undo-card{background:var(--c-bg-card);border:1px solid var(--c-border);border-top:4px solid var(--course-accent);border-radius:14px;padding:16px;display:flex;flex-direction:column;gap:8px;}',
      '.c-undo-card h3{margin:0;font-size:17px;}',
      '.c-undo-card code{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;color:var(--course-accent);}',
      '.c-undo-card .mini{font-size:12px;color:var(--c-fg-muted);}',
      '.c-undo-card .danger{color:#f85149;font-weight:600;}',
      '.c-undo-card .safe{color:#3fb950;font-weight:600;}',
      '.c-undo-cmpbtn{display:flex;gap:8px;justify-content:center;margin:6px 0 12px;}',
      '.c-undo-diff{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:14px 0;}',
      '@media(max-width:760px){.c-undo-diff{grid-template-columns:1fr;}}',
      '.c-undo-codepane{background:var(--c-bg-soft);border:1px solid var(--c-border);border-radius:12px;overflow:hidden;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:13px;}',
      '.c-undo-codepane .head{background:var(--c-bg-card);padding:8px 12px;border-bottom:1px solid var(--c-border);color:var(--c-fg-muted);font-size:12px;}',
      '.c-undo-codepane .row{padding:3px 12px;white-space:pre;}',
      '.c-undo-codepane .add{background:rgba(63,185,80,.15);color:#56d364;}',
      '.c-undo-codepane .del{background:rgba(248,81,73,.15);color:#ff7b72;}',
      '.c-undo-codepane .add::before{content:"+ ";opacity:.6;}',
      '.c-undo-codepane .del::before{content:"- ";opacity:.6;}',
      '.c-undo-msg{display:flex;flex-direction:column;gap:10px;}',
      '.c-undo-msg .good,.c-undo-msg .bad{display:flex;gap:10px;align-items:flex-start;background:var(--c-bg-card);border:1px solid var(--c-border);border-radius:10px;padding:12px 14px;}',
      '.c-undo-msg .good{border-left:4px solid #3fb950;}',
      '.c-undo-msg .bad{border-left:4px solid #f85149;}',
      '.c-undo-msg code{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;}',
      '.c-undo-final{display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;min-height:48vh;gap:18px;}',
      '.c-undo-final .big{font-size:clamp(26px,5.5vw,46px);font-weight:800;line-height:1.35;background:linear-gradient(120deg,var(--course-accent),#f0c674);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;}'
    ].join('\n');
    document.head.appendChild(s);
  }

  // ---- Git 图谱 SVG 原子件 -------------------------------------
  // commit 圆点：半径16，填充主题色，白描边；下方短 hash
  function commitNode(x, y, hash, opts) {
    opts = opts || {};
    var r = 16;
    var fill = opts.ghost ? 'rgba(125,133,144,.25)' : 'var(--course-accent)';
    var stroke = opts.ghost ? 'rgba(125,133,144,.6)' : '#fff';
    var dash = opts.ghost ? ' stroke-dasharray="3 3"' : '';
    var hashColor = opts.ghost ? 'rgba(125,133,144,.7)' : 'var(--c-fg-muted)';
    return '<g>' +
      '<circle cx="' + x + '" cy="' + y + '" r="' + r + '" fill="' + fill + '" stroke="' + stroke + '" stroke-width="2.5"' + dash + '/>' +
      (opts.label ? '<text x="' + x + '" y="' + (y + 5) + '" text-anchor="middle" font-size="13" fill="#0d1117" font-weight="700">' + opts.label + '</text>' : '') +
      '<text x="' + x + '" y="' + (y + 34) + '" text-anchor="middle" font-size="12" font-family="ui-monospace,Menlo,monospace" fill="' + hashColor + '">' + hash + '</text>' +
      '</g>';
  }
  function edge(x1, y1, x2, y2, ghost) {
    var st = ghost ? 'rgba(125,133,144,.5)' : 'var(--c-border)';
    var dash = ghost ? ' stroke-dasharray="3 4"' : '';
    return '<line x1="' + x1 + '" y1="' + y1 + '" x2="' + x2 + '" y2="' + y2 + '" stroke="' + st + '" stroke-width="3"' + dash + '/>';
  }
  // 分支 pill：指向某 commit
  function branchPill(x, y, text) {
    var w = text.length * 8 + 18;
    return '<g>' +
      '<rect x="' + (x - w / 2) + '" y="' + y + '" width="' + w + '" height="22" rx="11" fill="var(--c-bg-soft)" stroke="var(--course-accent)" stroke-width="1.5"/>' +
      '<text x="' + x + '" y="' + (y + 15) + '" text-anchor="middle" font-size="12" font-family="ui-monospace,Menlo,monospace" fill="var(--course-accent)">' + text + '</text>' +
      '</g>';
  }
  // HEAD pill：金黄
  function headPill(x, y) {
    return '<g>' +
      '<rect x="' + (x - 26) + '" y="' + y + '" width="52" height="22" rx="11" fill="#e3b341"/>' +
      '<text x="' + x + '" y="' + (y + 15) + '" text-anchor="middle" font-size="12" font-weight="700" font-family="ui-monospace,Menlo,monospace" fill="#0d1117">HEAD</text>' +
      '</g>';
  }

  window.registerChapter({
    id: 'undo',
    index: 4,
    emoji: '💊',
    title: '三种后悔药',
    subtitle: 'discard · reset · revert',
    theme: '#d29922',
    slides: [
      // ---------- 1. commit message ----------
      {
        title: '提交摘要 commit message',
        render: function (stage) {
          injectStyle();
          stage.innerHTML =
            '<h1 class="deck-h1">每次提交，都写一句「我改了啥」</h1>' +
            '<p class="deck-lead">上一章结尾说要讲「后悔药」💊。但吃药前得先认门牌——先从你每次提交都会写的那句话说起：' +
            '<strong>commit message（提交摘要）</strong>，它是你给这次改动贴的标签。</p>' +
            '<p class="deck-p">未来的你、还有队友翻历史的时候，全靠这一句话秒懂"这个版本干了什么"。写得好不好，差别巨大：</p>' +
            '<div class="c-undo-msg">' +
              '<div class="good"><span>✅</span><div><code>修复登录页手机号校验，11 位才放行</code><div class="mini" style="color:var(--c-fg-muted);font-size:12px;margin-top:4px;">一看就懂改了哪、为啥改</div></div></div>' +
              '<div class="bad"><span>❌</span><div><code>update</code> / <code>改了一下</code> / <code>fix bug</code><div class="mini" style="color:var(--c-fg-muted);font-size:12px;margin-top:4px;">三个月后你自己都不知道改的是啥</div></div></div>' +
            '</div>' +
            '<div class="deck-callout">' +
              '<strong>AI 时代小窍门：</strong>让 AI 帮你 commit 时，可以直接说「commit，message 写：xxx」，' +
              '或者干脆让它「根据这次改动自动写一句清楚的中文 message」。</div>';
        }
      },

      // ---------- 2. commit id / hash ----------
      {
        title: 'commit id / hash',
        render: function (stage) {
          injectStyle();
          stage.innerHTML =
            '<h1 class="deck-h1">每个 commit 都有个独一无二的「身份证号」</h1>' +
            '<p class="deck-lead">你每提交一次，git 就用哈希算法自动算出一串编号——这就是 <strong>commit id / commit hash</strong>。</p>' +
            '<div style="display:flex;justify-content:center;">' +
              '<svg class="c-undo-graph" width="430" height="120" viewBox="0 0 430 120">' +
                edge(70, 60, 215, 60) + edge(215, 60, 360, 60) +
                commitNode(70, 60, 'a1b2c3d') +
                commitNode(215, 60, '9f8e7d6') +
                commitNode(360, 60, '4c5d6e7') +
                branchPill(360, 12, 'main') +
              '</svg>' +
            '</div>' +
            '<div class="deck-grid">' +
              '<div class="deck-card"><h2 class="deck-h2">它是唯一的</h2><p class="deck-p">在整个仓库里，没有两个 commit 会撞号。它就像这个 commit 的<strong>名字 / 代号</strong>，指名道姓不会认错。</p></div>' +
              '<div class="deck-card"><h2 class="deck-h2">它是算出来的</h2><p class="deck-p">不是随便编的，而是用<strong>哈希算法</strong>从这次提交里算出来的。这背后藏着 git 最妙的数学——<strong>想知道为什么这么神奇？最后一章揭秘。</strong></p></div>' +
            '</div>' +
            '<div class="deck-callout">有了这个唯一代号，你就能精确地指着历史上的某一刻说：「就是它。」</div>';
        }
      },

      // ---------- 3. 长 id 与短 id ----------
      {
        title: '长 id 与短 id',
        render: function (stage) {
          injectStyle();
          stage.innerHTML =
            '<h1 class="deck-h1">长 id 太长？前 7 位就够用</h1>' +
            '<p class="deck-lead">完整 hash 有 40 位，没人愿意打那么长。<strong>取前 7 位</strong>就是「短 id」，俩功能完全一样。</p>' +
            '<div class="c-undo-hashbox">' +
              '<span class="short">8f3a1c9</span><span class="rest">d4e7b20a6f1c8e9d3b5a7c2f0e4d6b8a1c3e5f7</span>' +
            '</div>' +
            '<p class="deck-p" style="text-align:center;">' +
              '<span style="color:var(--course-accent);font-weight:700;">高亮的前 7 位 = 短 id</span>，后面那一长串灰色的是完整长 id 的剩余部分。' +
              '指同一个 commit，短的好打、好记、好念。</p>' +
            '<div class="deck-callout">' +
              '<strong>AI 时代的关键用法 🔑：</strong>把某个重要版本的 hash 记下来（短 id 就行），' +
              '回头跟 AI 说——<br>「帮我回退到 <code class="deck-kbd">8f3a1c9</code> 的状态」，' +
              'AI 立刻就懂你指的是哪个 commit，不用你描述半天。</div>';
        }
      },

      // ---------- 4. 三种后悔药总览 ----------
      {
        title: '三种后悔药总览',
        render: function (stage) {
          injectStyle();
          stage.innerHTML =
            '<h1 class="deck-h1">三种「后悔药」，吃法完全不同 💊</h1>' +
            '<p class="deck-lead">discard / reset / revert 都是"反悔"，但语义差很远。别吃错药——先看清各自治什么。</p>' +
            '<div class="c-undo-3">' +
              '<div class="c-undo-card">' +
                this._svgDiscard() +
                '<h3>discard changes</h3>' +
                '<p class="deck-p">丢弃<strong>还没 commit</strong> 的改动，回到上一次 commit 的干净状态。</p>' +
                '<div class="mini">像把草稿纸上的涂改 <span class="danger">擦掉</span>，回到誊抄前的样子。</div></div>' +
              '<div class="c-undo-card">' +
                this._svgReset() +
                '<h3>reset</h3>' +
                '<p class="deck-p">让分支指针 <strong>倒退</strong> 到某个旧 commit，后面的提交被丢弃。</p>' +
                '<div class="mini">像把书签 <span class="danger">往前翻回去</span>，后面的页当作没写过。</div></div>' +
              '<div class="c-undo-card">' +
                this._svgRevert() +
                '<h3>revert</h3>' +
                '<p class="deck-p">不删历史，<strong>新建一个反向提交</strong> 来抵消某次旧提交。</p>' +
                '<div class="mini">不撕纸，而是 <span class="safe">补一笔</span> 把那次改动反着写回来。</div></div>' +
            '</div>' +
            '<div class="deck-callout warn">' +
              '记忆口诀：<strong>discard</strong> 治"还没存的"，<strong>reset</strong> 治"想当没发生过"，' +
              '<strong>revert</strong> 治"已经发出去、只能光明正大撤销"。</div>';
        },
        // discard = 橡皮擦擦掉草稿
        _svgDiscard: function () {
          return '<svg width="100%" height="64" viewBox="0 0 200 64">' +
            '<path d="M30 44h60" stroke="var(--c-fg-muted)" stroke-width="2" stroke-dasharray="5 4"/>' +
            '<g transform="rotate(-18 120 30)">' +
              '<rect x="100" y="18" width="46" height="22" rx="4" fill="var(--course-accent)" stroke="#fff" stroke-width="2"/>' +
              '<rect x="100" y="18" width="14" height="22" rx="4" fill="#f0c674"/>' +
            '</g>' +
            '<path d="M60 40l-3 6 6-1z" fill="var(--c-fg-muted)"/>' +
            '<text x="158" y="56" font-size="11" fill="var(--c-fg-muted)">擦掉草稿</text>' +
            '</svg>';
        },
        // reset = 指针往回拉
        _svgReset: function () {
          return '<svg width="100%" height="64" viewBox="0 0 200 64">' +
            '<line x1="30" y1="32" x2="170" y2="32" stroke="var(--c-border)" stroke-width="3"/>' +
            '<circle cx="50" cy="32" r="9" fill="var(--course-accent)" stroke="#fff" stroke-width="2"/>' +
            '<circle cx="100" cy="32" r="9" fill="var(--course-accent)" stroke="#fff" stroke-width="2"/>' +
            '<circle cx="150" cy="32" r="9" fill="rgba(125,133,144,.25)" stroke="rgba(125,133,144,.6)" stroke-width="2" stroke-dasharray="3 3"/>' +
            '<path d="M120 18 L100 18" stroke="#e3b341" stroke-width="3"/>' +
            '<path d="M104 13l-6 5 6 5z" fill="#e3b341"/>' +
            '<rect x="86" y="2" width="40" height="16" rx="8" fill="#e3b341"/>' +
            '<text x="106" y="14" text-anchor="middle" font-size="10" font-weight="700" fill="#0d1117">HEAD</text>' +
            '</svg>';
        },
        // revert = 新增一个"反向"圆点
        _svgRevert: function () {
          return '<svg width="100%" height="64" viewBox="0 0 200 64">' +
            '<line x1="30" y1="36" x2="170" y2="36" stroke="var(--c-border)" stroke-width="3"/>' +
            '<circle cx="55" cy="36" r="9" fill="var(--course-accent)" stroke="#fff" stroke-width="2"/>' +
            '<circle cx="105" cy="36" r="9" fill="var(--course-accent)" stroke="#fff" stroke-width="2"/>' +
            '<circle cx="155" cy="36" r="11" fill="#3fb950" stroke="#fff" stroke-width="2"/>' +
            '<text x="155" y="40" text-anchor="middle" font-size="12" font-weight="700" fill="#0d1117">↩</text>' +
            '<text x="155" y="58" text-anchor="middle" font-size="10" fill="#3fb950">反向提交</text>' +
            '</svg>';
        }
      },

      // ---------- 5. 单独讲 revert ----------
      {
        title: 'revert：光明正大地撤销',
        render: function (stage) {
          injectStyle();
          stage.innerHTML =
            '<h1 class="deck-h1"><code class="deck-kbd">revert</code>：不删历史，补一个「反向提交」</h1>' +
            '<p class="deck-lead">发现历史上某一次提交是错的？revert 会新建一个 commit，专门把那次的改动反着做一遍，刚好抵消。</p>' +
            '<div style="display:flex;justify-content:center;">' +
              '<svg class="c-undo-graph" width="520" height="130" viewBox="0 0 520 130">' +
                edge(60, 70, 175, 70) + edge(175, 70, 290, 70) + edge(290, 70, 405, 70) +
                commitNode(60, 70, 'a1b2c3d') +
                commitNode(175, 70, 'BAD 提交', { label: '✕' }) +
                commitNode(290, 70, '7f6e5d4') +
                commitNode(405, 70, '反向提交', { label: '↩' }) +
                branchPill(405, 22, 'main') +
                '<text x="175" y="118" text-anchor="middle" font-size="11" fill="#ff7b72">这次错了</text>' +
                '<text x="405" y="118" text-anchor="middle" font-size="11" fill="#3fb950">抵消它，但历史还在</text>' +
              '</svg>' +
            '</div>' +
            '<p class="deck-p">注意：那个出错的 BAD 提交<strong>没有被删</strong>，它还老老实实留在历史里。revert 只是又加了一笔把它的效果取消掉。其他正常的更新（比如 <code class="deck-kbd">7f6e5d4</code>）完全不受影响。</p>' +
            '<div class="deck-callout">' +
              '<strong>什么时候非它不可？</strong>当这段历史<strong>已经 push 到远程、别人也拉过了</strong>——这时候不能偷偷改历史（会把队友搞乱），' +
              '只能用 revert 这种"公开补一刀"的方式撤销。</div>';
        }
      },

      // ---------- 6. git diff ----------
      {
        title: 'git diff 比较两次提交',
        render: function (stage) {
          injectStyle();
          stage.innerHTML =
            '<h1 class="deck-h1"><code class="deck-kbd">git diff</code>：这两版到底差在哪？</h1>' +
            '<p class="deck-lead">把两个 commit 的 hash 给 AI，让它告诉你这两次提交之间改了哪些内容——一目了然。</p>' +
            '<div class="c-undo-cmpbtn">' +
              '<button class="deck-btn" id="c-undo-diffbtn">⇄ 高亮两版的差异</button></div>' +
            '<div class="c-undo-diff">' +
              '<div class="c-undo-codepane"><div class="head">旧版本 <span style="font-family:ui-monospace">a1b2c3d</span></div>' +
                '<div class="row">function login(phone) {</div>' +
                '<div class="row" data-pair="1">  if (phone) {</div>' +
                '<div class="row">    submit();</div>' +
                '<div class="row">  }</div>' +
                '<div class="row">}</div></div>' +
              '<div class="c-undo-codepane"><div class="head">新版本 <span style="font-family:ui-monospace">8f3a1c9</span></div>' +
                '<div class="row">function login(phone) {</div>' +
                '<div class="row" data-pair="1">  if (phone.length === 11) {</div>' +
                '<div class="row">    submit();</div>' +
                '<div class="row">  }</div>' +
                '<div class="row">}</div></div>' +
            '</div>' +
            '<div class="deck-callout">' +
              '<strong>AI 咒语：</strong>「帮我用 git diff 比较 <code class="deck-kbd">a1b2c3d</code> 和 ' +
              '<code class="deck-kbd">8f3a1c9</code> 这两次提交，改了哪些内容？」AI 就会把差异行给你列出来。</div>';

          var btn = stage.querySelector('#c-undo-diffbtn');
          var on = false;
          btn.addEventListener('click', function () {
            on = !on;
            var rows = stage.querySelectorAll('.c-undo-codepane');
            // 左 pane data-pair="1" 标红删除，右 pane 标绿新增
            var panes = stage.querySelectorAll('.c-undo-codepane');
            var leftPair = panes[0].querySelector('[data-pair="1"]');
            var rightPair = panes[1].querySelector('[data-pair="1"]');
            if (on) {
              leftPair.classList.add('del');
              rightPair.classList.add('add');
              btn.textContent = '↺ 取消高亮';
            } else {
              leftPair.classList.remove('del');
              rightPair.classList.remove('add');
              btn.textContent = '⇄ 高亮两版的差异';
            }
          });
        }
      },

      // ---------- 7. vibe coder 实话 ----------
      {
        title: 'vibe coder 实话',
        render: function (stage) {
          injectStyle();
          stage.innerHTML =
            '<h1 class="deck-h1">说点 vibe coder 的实话 🫢</h1>' +
            '<div class="deck-callout">' +
              '<p class="deck-p" style="margin-top:0;">老实讲：discard / revert 这些"后悔药"，<strong>vibe coder 很多时候用不太上</strong>。' +
              '看哪儿不顺眼，直接让 AI 在最新版上接着改就行了——根本不用回退。</p>' +
              '<p class="deck-p" style="margin-bottom:0;">但有<strong>两个真实场景</strong>，知道它们能救命：</p>' +
            '</div>' +
            '<div class="deck-grid">' +
              '<div class="deck-card"><h2 class="deck-h2">① 用 discard 回退一次和 AI 的问答</h2>' +
                '<p class="deck-p">AI 改完一版你不满意？<code class="deck-kbd">discard</code> 掉这次还没 commit 的改动，' +
                '相当于把这一轮对话"作废"，<strong>省下宝贵的上下文空间</strong>，重新清爽地问一次。</p></div>' +
              '<div class="deck-card"><h2 class="deck-h2">② 用 revert 撤销已 push 的提交</h2>' +
                '<p class="deck-p">代码<strong>已经 push 出去、被别人拉过</strong>了，这时候不能粗暴改历史。' +
                '用 <code class="deck-kbd">revert</code> 光明正大地补一个反向提交，安全撤销，不坑队友。</p></div>' +
            '</div>' +
            '<div class="deck-callout warn">' +
              '所以别死记命令——记住这两个<strong>场景</strong>就够了：' +
              '「重问一遍省 token」用 discard，「已发出去要撤回」用 revert。</div>';
        }
      },

      // ---------- 8. 收尾金句 ----------
      {
        title: '收尾金句',
        render: function (stage) {
          injectStyle();
          stage.innerHTML =
            '<div class="c-undo-final">' +
              '<div class="deck-kbd" style="font-size:14px;">本章金句</div>' +
              '<div class="big">言之所以在意<br>得意而忘言</div>' +
              '<p class="deck-lead" style="max-width:640px;">' +
                'AI 时代，你不必背命令本身。你只需记住每个 git 命令的 <strong>效果</strong>——' +
                '把那个效果用人话描述出来，AI 就能帮你实现。</p>' +
              '<div class="deck-grid" style="max-width:720px;width:100%;">' +
                '<div class="deck-card"><p class="deck-p" style="margin:0;">想<strong>回到某个版本</strong> → 说「回退到 <code class="deck-kbd">8f3a1c9</code>」</p></div>' +
                '<div class="deck-card"><p class="deck-p" style="margin:0;">想<strong>撤销一次错误提交</strong> → 说「帮我 revert 掉那次提交」</p></div>' +
                '<div class="deck-card"><p class="deck-p" style="margin:0;">想<strong>比较两版差异</strong> → 说「diff 一下这两个 hash」</p></div>' +
                '<div class="deck-card"><p class="deck-p" style="margin:0;">想<strong>作废这轮改动</strong> → 说「丢弃还没提交的改动」</p></div>' +
              '</div>' +
              '<p class="deck-p" style="color:var(--c-fg-muted);">得意而忘言——抓住效果，忘掉命令。🪄</p>' +
              '<p class="deck-p" style="color:var(--c-fg-muted);">到这里，你已经能在一条时间线上自由穿梭了。' +
                '<b>下一章</b>登场的是 git 最核心、最强的武器——<b style="color:var(--course-accent)">分支</b>，' +
                '它让时间线本身长出好几条。</p>' +
            '</div>';
        }
      }
    ]
  });
})();

<!-- ch-branch -->
<script>
(function () {
  'use strict';

  // ============================================================
  // 第5章 · 分支 Branch（git 概念的核心）
  // theme: #39c5cf  emoji: 🌿
  // 样式前缀: c-branch-
  //
  // 这一章大量用内联 SVG 画 git 树状图。统一画法封装在下面的
  // gitTree() 里：
  //   commit  = 圆点（半径 14-18，白描边）
  //   main    = 一种颜色的连线；feature = 另一种颜色的连线
  //   分支标签 = 圆角 pill，用短线指向它当前所指的 commit
  //   HEAD    = 金黄 #e3b341 特殊 pill
  //   孤儿/被丢弃 commit = 虚线 + 半透明灰
  // ============================================================

  // ---- 调色（与 theme 协调）----
  var CLR = {
    main: '#39c5cf',        // 主干色（= theme）
    feature: '#d2a8ff',     // feature 分支色（紫）
    feature2: '#f0883e',    // 第二条 feature（橙）
    head: '#e3b341',        // HEAD 金黄
    ghost: '#6e7681',       // 孤儿/丢弃灰
    revert: '#3fb950'       // revert 新提交（绿）
  };

  // ------------------------------------------------------------
  // 通用：一个 commit 圆点
  // o = { x, y, color, label, hash, ghost }
  // ------------------------------------------------------------
  function commitDot(o) {
    var r = o.r || 16;
    var color = o.ghost ? CLR.ghost : (o.color || CLR.main);
    var fill = o.ghost ? 'var(--c-bg-soft)' : color;
    var dash = o.ghost ? ' stroke-dasharray="4 3"' : '';
    var op = o.ghost ? ' opacity="0.55"' : '';
    var s = '<g' + op + '>';
    s += '<circle cx="' + o.x + '" cy="' + o.y + '" r="' + r + '" fill="' + fill +
         '" stroke="' + (o.ghost ? CLR.ghost : '#fff') + '" stroke-width="3"' + dash + '/>';
    if (o.hash) {
      s += '<text x="' + o.x + '" y="' + (o.y + (o.hashBelow === false ? -r - 10 : r + 18)) +
           '" text-anchor="middle" font-size="12" font-family="ui-monospace,monospace" fill="var(--c-fg-muted)">' +
           o.hash + '</text>';
    }
    if (o.inner) {
      s += '<text x="' + o.x + '" y="' + (o.y + 5) + '" text-anchor="middle" font-size="13" fill="#fff" font-weight="700">' + o.inner + '</text>';
    }
    s += '</g>';
    return s;
  }

  // 连线（两点之间）
  function link(x1, y1, x2, y2, color, ghost) {
    var dash = ghost ? ' stroke-dasharray="5 4"' : '';
    var op = ghost ? ' opacity="0.5"' : '';
    return '<line x1="' + x1 + '" y1="' + y1 + '" x2="' + x2 + '" y2="' + y2 +
      '" stroke="' + (ghost ? CLR.ghost : color) + '" stroke-width="5" stroke-linecap="round"' + dash + op + '/>';
  }

  // 分支 pill 标签 + 指向短线
  // o = { x, y, text, color, toX, toY, head }
  function branchPill(o) {
    var color = o.head ? CLR.head : (o.color || CLR.main);
    var w = Math.max(46, o.text.length * 9 + 22);
    var h = 26;
    var px = o.x - w / 2;
    var py = o.y - h / 2;
    var s = '<g class="c-branch-pill"' + (o.id ? ' data-pill="' + o.id + '"' : '') + '>';
    // 指向短线
    if (o.toX != null) {
      s += '<line x1="' + o.x + '" y1="' + o.y + '" x2="' + o.toX + '" y2="' + o.toY +
        '" stroke="' + color + '" stroke-width="2.5" stroke-dasharray="3 3" opacity="0.85"/>';
    }
    s += '<rect x="' + px + '" y="' + py + '" width="' + w + '" height="' + h +
      '" rx="13" fill="' + color + '" opacity="' + (o.head ? '1' : '0.92') + '"/>';
    var tcolor = o.head ? '#1a1500' : '#06121a';
    s += '<text x="' + o.x + '" y="' + (o.y + 4.5) + '" text-anchor="middle" font-size="13" font-weight="800" ' +
      'font-family="ui-monospace,monospace" fill="' + tcolor + '">' + o.text + '</text>';
    s += '</g>';
    return s;
  }

  // 包一层 svg 外壳
  function svg(vb, inner, extra) {
    return '<svg class="c-branch-svg ' + (extra || '') + '" viewBox="0 0 ' + vb +
      '" width="100%" aria-hidden="true">' + inner + '</svg>';
  }

  // 每张 svg 都带的 arrow marker / 通用样式
  function defs() {
    return '<defs>' +
      '<marker id="c-branch-arrow" markerWidth="9" markerHeight="9" refX="6.5" refY="4.5" orient="auto">' +
        '<path d="M0,0 L9,4.5 L0,9 Z" fill="' + CLR.main + '"/></marker>' +
      '</defs>';
  }

  window.registerChapter({
    id: 'branch',
    index: 5,
    emoji: '🌿',
    title: '分支 Branch',
    subtitle: '存储库的不同开发线',
    theme: '#39c5cf',
    slides: [

      // ========================================================
      // Slide 1 · 什么是 branch
      // ========================================================
      {
        title: '什么是分支',
        render: function (stage, api) {
          var diagram = svg('560 240',
            defs() +
            // 主干 main：三个 commit 一条线
            link(60, 150, 200, 150, CLR.main) +
            link(200, 150, 340, 150, CLR.main) +
            // 从第二个 commit 岔出一条 feature 支线（往上）
            link(200, 150, 320, 70, CLR.feature) +
            link(320, 70, 440, 70, CLR.feature) +
            commitDot({ x: 60, y: 150, color: CLR.main }) +
            commitDot({ x: 200, y: 150, color: CLR.main }) +
            commitDot({ x: 340, y: 150, color: CLR.main }) +
            commitDot({ x: 320, y: 70, color: CLR.feature }) +
            commitDot({ x: 440, y: 70, color: CLR.feature }) +
            branchPill({ x: 420, y: 178, text: 'main', color: CLR.main }) +
            branchPill({ x: 500, y: 70, text: 'feature', color: CLR.feature, toX: 458, toY: 70 }) +
            // 岔点强调
            '<circle cx="200" cy="150" r="24" fill="none" stroke="var(--course-accent)" stroke-width="2" stroke-dasharray="4 4" opacity="0.7"><animate attributeName="r" values="20;26;20" dur="2.4s" repeatCount="indefinite"/></circle>'
          );

          stage.innerHTML =
            '<h1 class="deck-h1">分支 <span style="color:var(--course-accent)">Branch</span></h1>' +
            '<p class="deck-lead">前面几章里，你的项目都只有<b>一条</b>时间线。从这章起，时间线要分叉了——' +
            '分支，就是一条<b>独立的开发线</b>，一个仓库可以同时存在好几条。</p>' +
            '<div class="c-branch-stage">' + diagram + '</div>' +
            '<div class="deck-callout">' +
              '<p class="deck-p" style="margin:0">一句话记住它 👇</p>' +
              '<p class="deck-p c-branch-bigline">分支让你在<b style="color:var(--course-accent)">不影响别人</b>的前提下，<b>开一条自己的开发线</b>。</p>' +
              '<p class="deck-p" style="margin:0;color:var(--c-fg-muted)">上图：从 <b style="color:var(--course-accent)">main</b> 的某个 commit 岔出去一条 <b style="color:' + CLR.feature + '">feature</b>。' +
              '它们后面各走各的，互不干扰。' +
            '</div>' +
            commonStyle();
        }
      },

      // ========================================================
      // Slide 2 · main / master 主干分支
      // ========================================================
      {
        title: 'main 主干分支',
        render: function (stage, api) {
          var diagram = svg('560 180',
            defs() +
            link(80, 90, 220, 90, CLR.main) +
            link(220, 90, 360, 90, CLR.main) +
            link(360, 90, 500, 90, CLR.main) +
            commitDot({ x: 80, y: 90, color: CLR.main, hash: 'c1' }) +
            commitDot({ x: 220, y: 90, color: CLR.main, hash: 'c2' }) +
            commitDot({ x: 360, y: 90, color: CLR.main, hash: 'c3' }) +
            commitDot({ x: 500, y: 90, color: CLR.main, hash: 'c4' }) +
            branchPill({ x: 500, y: 38, text: 'main', color: CLR.main, toX: 500, toY: 70 }) +
            branchPill({ x: 430, y: 132, text: 'HEAD', head: true, toX: 488, toY: 102 })
          );

          stage.innerHTML =
            '<h2 class="deck-h2">每个仓库，天生就有一条 <span style="color:var(--course-accent)">main</span></h2>' +
            '<p class="deck-lead">你 <span class="deck-kbd">git init</span> 或在 GitHub 建仓库的那一刻，' +
            '默认就有一条主干分支叫 <b style="color:var(--course-accent)">main</b>（旧名 <b>master</b>，现在基本都改叫 main 了）。</p>' +
            '<div class="c-branch-stage">' + diagram + '</div>' +
            '<div class="deck-grid c-branch-2col">' +
              '<div class="deck-card">' +
                '<div class="c-branch-cardh"><span style="color:var(--course-accent)">●</span> main 是干啥的</div>' +
                '<p class="deck-p" style="margin:0">它是项目的"正式版主线"。一般来说，能上线、能给别人用的代码，最终都要回到 main。</p>' +
              '</div>' +
              '<div class="deck-card">' +
                '<div class="c-branch-cardh"><span style="color:' + CLR.head + '">●</span> 那 HEAD 呢</div>' +
                '<p class="deck-p" style="margin:0">金黄色这块叫 <b style="color:' + CLR.head + '">HEAD</b>，表示你<b>现在所在的位置</b>。先记个脸熟，第 8 页专门讲它。</p>' +
              '</div>' +
            '</div>' +
            commonStyle();
        }
      },

      // ========================================================
      // Slide 3 · 新建 feature 分支（互动：长出 pill）
      // ========================================================
      {
        title: '新建 feature 分支',
        render: function (stage, api) {
          function draw(showFeature) {
            return svg('560 200',
              defs() +
              link(80, 110, 240, 110, CLR.main) +
              link(240, 110, 400, 110, CLR.main) +
              commitDot({ x: 80, y: 110, color: CLR.main, hash: 'c1' }) +
              commitDot({ x: 240, y: 110, color: CLR.main, hash: 'c2' }) +
              commitDot({ x: 400, y: 110, color: CLR.main, hash: 'c3' }) +
              branchPill({ x: 400, y: 60, text: 'main', color: CLR.main, toX: 400, toY: 90 }) +
              branchPill({ x: 320, y: 165, text: 'HEAD', head: true, toX: 388, toY: 122 }) +
              (showFeature
                ? ('<g class="c-branch-grow">' +
                    branchPill({ x: 500, y: 110, text: 'feature', color: CLR.feature, toX: 422, toY: 110 }) +
                   '</g>')
                : '')
            );
          }

          stage.innerHTML =
            '<h2 class="deck-h2">新建一条 <span style="color:' + CLR.feature + '">feature</span> 分支</h2>' +
            '<p class="deck-lead">关键点：feature <b>刚被创建的那一刻</b>，它和 main <b>一模一样</b>——指向<b>同一个 commit</b>，' +
            '没有任何新东西。</p>' +
            '<div class="c-branch-stage" id="c-branch-s3">' + draw(false) + '</div>' +
            '<div class="deck-center">' +
              '<button class="deck-btn" id="c-branch-s3btn">🌿 创建 feature 分支</button>' +
            '</div>' +
            '<div class="deck-callout c-branch-s3note" id="c-branch-s3note" style="display:none">' +
              '看到没？feature 这个 pill 直接贴在 <b>c3</b> 上，和 main 重合。' +
              '<b>创建分支几乎不花成本</b>——它只是给当前这个 commit 多挂了一个名牌，<b>没有复制任何文件</b>。' +
            '</div>' +
            commonStyle();

          var host = stage.querySelector('#c-branch-s3');
          var note = stage.querySelector('#c-branch-s3note');
          var btn = stage.querySelector('#c-branch-s3btn');
          var made = false;
          btn.addEventListener('click', function () {
            made = !made;
            host.innerHTML = draw(made);
            note.style.display = made ? 'block' : 'none';
            btn.textContent = made ? '↩️ 删掉这条分支' : '🌿 创建 feature 分支';
          });
        }
      },

      // ========================================================
      // Slide 4 · 分支隔离（互动：feature 长出 commit，main 不动）
      // ========================================================
      {
        title: '分支隔离',
        render: function (stage, api) {
          function draw(extra) {
            extra = extra || 0; // feature 上多出几个 commit
            var inner = defs();
            // main 主干（纹丝不动）
            inner += link(80, 130, 240, 130, CLR.main) + link(240, 130, 400, 130, CLR.main);
            // feature 从 c3 岔出
            var fx = [490, 580]; // feature commit 的 x
            inner += link(400, 130, 470, 70, CLR.feature, extra < 1); // 第一段（>=1 才实线）
            if (extra >= 1) inner += commitDot({ x: 470, y: 70, color: CLR.feature, hash: 'f1' });
            if (extra >= 2) {
              inner += link(470, 70, 560, 70, CLR.feature);
              inner += commitDot({ x: 560, y: 70, color: CLR.feature, hash: 'f2' });
            }
            inner += commitDot({ x: 80, y: 130, color: CLR.main, hash: 'c1' });
            inner += commitDot({ x: 240, y: 130, color: CLR.main, hash: 'c2' });
            inner += commitDot({ x: 400, y: 130, color: CLR.main, hash: 'c3' });
            inner += branchPill({ x: 200, y: 175, text: 'main', color: CLR.main, toX: 400, toY: 152 });
            var headX = extra >= 2 ? 560 : (extra >= 1 ? 470 : 430);
            inner += branchPill({ x: headX + 60, y: 30, text: 'HEAD→feature', head: true, toX: headX + 8, toY: extra >= 1 ? 58 : 100 });
            return svg('640 200', inner);
          }

          stage.innerHTML =
            '<h2 class="deck-h2">在 feature 上改东西，<span style="color:var(--course-accent)">main 纹丝不动</span></h2>' +
            '<p class="deck-lead">现在你站在 feature 上写代码、提交。每点一次"提交"，feature 往前长一个 commit——' +
            '注意看下面的 main：<b>一动不动</b>。</p>' +
            '<div class="c-branch-stage" id="c-branch-s4">' + draw(0) + '</div>' +
            '<div class="deck-center c-branch-row">' +
              '<button class="deck-btn" id="c-branch-s4commit">✍️ 在 feature 上 commit</button>' +
              '<button class="deck-btn ghost" id="c-branch-s4reset">重来</button>' +
              '<span class="c-branch-counter" id="c-branch-s4cnt">feature 已有 0 个新提交</span>' +
            '</div>' +
            '<div class="deck-callout">' +
              '这就是<b>分支隔离</b>：你在 feature 上做的 commit，<b>只属于 feature，也只能在 feature 看到</b>，' +
              '完全<b>不会影响 main</b>。等于你在一个安全的"平行宇宙"里随便折腾，主线毫发无损。' +
            '</div>' +
            commonStyle();

          var host = stage.querySelector('#c-branch-s4');
          var cnt = stage.querySelector('#c-branch-s4cnt');
          var n = 0;
          function rerender() {
            host.innerHTML = draw(n);
            cnt.textContent = 'feature 已有 ' + n + ' 个新提交';
          }
          stage.querySelector('#c-branch-s4commit').addEventListener('click', function () {
            if (n < 2) { n++; rerender(); }
          });
          stage.querySelector('#c-branch-s4reset').addEventListener('click', function () {
            n = 0; rerender();
          });
        }
      },

      // ========================================================
      // Slide 5 · 多人 / 多 agent 并行
      // ========================================================
      {
        title: '多人 / 多 agent 协作',
        render: function (stage, api) {
          var diagram = svg('600 280',

<script>
(function () {

  // 第7章 · Git 的数学之美

  // ------------------------------------------------------------
  // 一个稳定的"伪哈希"函数（用于演示，不是真 SHA-1，但雪崩效应明显）。
  // 用 FNV-1a 思路滚动出一个 32-bit 数，再扩成定长十六进制串。
  // 同样输入 → 同样输出；改一个字 → 整串面目全非。
  // ------------------------------------------------------------
  function pseudoHash(input, len) {
    len = len || 16;
    input = String(input);
    var out = '';
    // 用不同盐 + 多轮混合，凑够 len 位十六进制，保证雪崩
    for (var seg = 0; seg < Math.ceil(len / 8); seg++) {
      var h = (0x811c9dc5 ^ (seg * 0x9e3779b1)) >>> 0;
      for (var i = 0; i < input.length; i++) {
        h ^= input.charCodeAt(i);
        h = Math.imul(h, 0x01000193) >>> 0;
        h = (h ^ (h >>> 15)) >>> 0;
        h = (h + ((i + 1) * (seg + 7))) >>> 0;
      }
      // 再多搅几轮，让长输入也充分扩散
      h = Math.imul(h ^ (h >>> 13), 0x85ebca6b) >>> 0;
      h = Math.imul(h ^ (h >>> 16), 0xc2b2ae35) >>> 0;
      h = (h ^ (h >>> 16)) >>> 0;
      out += ('00000000' + h.toString(16)).slice(-8);
    }
    return out.slice(0, len);
  }

  // 把两个十六进制串逐字符比较，不同的字符包成红色 span（雪崩可视化）
  function diffHashHTML(prev, now) {
    var html = '';
    for (var i = 0; i < now.length; i++) {
      var ch = now.charAt(i);
      if (prev && prev.charAt(i) === ch) {
        html += '<span class="c-math-h-same">' + ch + '</span>';
      } else {
        html += '<span class="c-math-h-diff">' + ch + '</span>';
      }
    }
    return html;
  }

                '<line x1="346" y1="98" x2="276" y2="150" stroke="var(--course-accent)" stroke-width="2" marker-end="url(#c-math-mk4)"/>' +
                '<line x1="446" y1="90" x2="378" y2="90" stroke="var(--course-accent)" stroke-width="2" marker-end="url(#c-math-mk4)"/>' +
              '</g>' +
              // 分支 pill（像便利贴贴上去）
              '<g font-family="ui-monospace,monospace" font-size="12" font-weight="700">' +
                '<rect x="430" y="186" width="78" height="26" rx="13" fill="var(--course-accent)"/>' +

              // HEAD 指针指向 main
              '<g font-family="ui-monospace,monospace" font-size="12" font-weight="800">' +
                '<rect x="430" y="220" width="78" height="24" rx="6" fill="var(--c-bg-soft)" stroke="var(--course-accent)" stroke-dasharray="4 3"/>' +
                '<text x="469" y="237" text-anchor="middle" fill="var(--course-accent)">HEAD →</text>' +
                '<line x1="469" y1="220" x2="469" y2="214" stroke="var(--course-accent)" stroke-width="1.5" stroke-dasharray="3 2"/>' +
