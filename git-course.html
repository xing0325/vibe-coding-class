            '<div class="c-ch5-ins" id="c-ch5-4-i1">' +
              '<div class="n">1</div>' +
              '<div class="b">分支的意义，是告诉 git <b>「下一个 commit 该挂到哪」</b>。HEAD 跟着分支走，提交就自动接到分支头。</div>' +
            '</div>' +
            '<div class="c-ch5-ins" id="c-ch5-4-i2">' +
              '<div class="n">2</div>' +
              '<div class="b">想<b>回看历史而不改 main 指向</b>，有两条路：' +
                '<span class="warnhl">① 分离头指针</span>（只看不挂，代价是新提交会成孤儿）；' +
                '<span class="githl">② 给历史 commit 建一条分支</span>（把那个点正式收编进时间线）。</div>' +
            '</div>' +
            '<div class="c-ch5-ins path" id="c-ch5-4-i3">' +
              '<div class="n">3</div>' +
              '<div class="b">Vibe coder 基本不存在「只看不改」—— 你看了多半就想动手。' +
                '<b>所以你多半用 ②</b>：给它一条分支，想怎么折腾都不怕弄丢。</div>' +
            '</div>' +
          '</div>' +
          '<div class="c-ch5-mini-row" id="c-ch5-4-minis">' +
            '<div class="c-ch5-mini">' +
              '<h4><span class="way1">姿势 ①</span> 分离头指针 · 只看不挂</h4>' +
              '<div class="c-ch5-graphbox" id="c-ch5-4-m1" style="margin:0;"></div>' +
              '<div class="cap">HEAD 直接钉到 B，main 不动还在 D。看完切走，B 上若有新提交就成孤儿。</div>' +
            '</div>' +
            '<div class="c-ch5-mini">' +
              '<h4><span class="way2">姿势 ②</span> 给历史建分支 · 留得住</h4>' +
              '<div class="c-ch5-graphbox" id="c-ch5-4-m2" style="margin:0;"></div>' +
              '<div class="cap">在 B 上拉出一条 look 分支，HEAD 正常挂着它 —— 在这往后随便提交都有人收着。</div>' +
            '</div>' +
          '</div>' +
        '</div>';

      // 两个迷你画布
      var m1box = stage.querySelector('#c-ch5-4-m1');
      var m2box = stage.querySelector('#c-ch5-4-m2');
      var g1 = api.graph(m1box, {});
      var g2 = api.graph(m2box, {});
      g1.init('main', ['A', 'B', 'C', 'D']);
      g2.init('main', ['A', 'B', 'C', 'D']);

      // 三行洞察分步淡入
      api.frag(stage.querySelector('#c-ch5-4-i1'));
      api.frag(stage.querySelector('#c-ch5-4-i2'));
      api.frag(stage.querySelector('#c-ch5-4-i3'));

      // step 4：姿势① 演示一次回看（分离态钉 B）
      var demoed1 = false;
      api.step(function (animated) {
        g1.checkout('B');
        demoed1 = true;
      });
      // step 5：姿势② 演示给历史 commit 建分支（look 分支挂 B，正常态）
      var demoed2 = false;
      api.step(function (animated) {
        if (!demoed2) {
          g2.createBranch('look', 'B', '#2DD4BF');
          g2.checkout('look');
          g2.highlight('B', true);
          demoed2 = true;
        }
      });

      api.onReset(function () {
        g1.reset(); g1.init('main', ['A', 'B', 'C', 'D']);
        g2.reset(); g2.init('main', ['A', 'B', 'C', 'D']);
        demoed1 = false; demoed2 = false;
      });
    }
  });

})();

</script>

        var g = api.graph(miniBox, {});

        if (rx === 'discard') {
          // discard 不涉及 commit 图 → 用文字 + 一条干净时间线表示「工作区回到上次 commit」
          g.init('main', ['A', 'B', 'C', 'D']);
          g.highlight('D', true);
          panelH.textContent = '💊 discard · 工作区回到上次 commit';
          capEl.textContent = '未提交的改动全丢掉，提交图一点没动 —— 你还停在 D，只是工作区变干净了。';
        } else if (rx === 'reset') {
          g.init('main', ['A', 'B', 'C', 'D']);
          panelH.textContent = '💊 reset --hard · 退回 B，C/D 成孤儿';
          capEl.textContent = 'main 硬退回 B，C、D 被丢弃飘走。最暴力、重写历史 —— 没 push 才安全。';
          setTimeout(function () {
            g.setGhost('C', true); g.setGhost('D', true); g.highlight('B', true);
            var xy = g.getNodeXY('D'); if (xy) api.astronaut({ svgRoot: g.svg, x: xy.x, y: xy.y });
          }, 160);
        } else if (rx === 'revert') {
          g.init('main', ['A', 'B', 'C', 'D']);
          panelH.textContent = '💊 revert · 新增 E 抵消，历史全留';
          capEl.textContent = '新建 E，E 的内容 = B，但 A-B-C-D 一个不删。push 过也安全。';
          setTimeout(function () { g.addCommit('main', 'E', { anim: true }); g.highlight('E', true); }, 160);
        } else if (rx === 'checkout') {
          g.init('main', ['A', 'B', 'C', 'D']);
          panelH.textContent = '💊 checkout · 分离头指针，只看不改';
          capEl.textContent = 'HEAD 分离落在 B（冷色），main 标签仍在 D 没动。看完切回即可。';
          setTimeout(function () { g.checkout('B'); }, 160);
        }
      }

      var rows = tbody.querySelectorAll('tr.rx');
      rows.forEach(function (tr) {
        tr.addEventListener('click', function () {
          rows.forEach(function (x) { x.classList.remove('on'); });
          tr.classList.add('on');
          replay(tr.getAttribute('data-rx'));
        });
      });

      // 四行依次浮入，再浮出收尾句
      rows.forEach(function (tr) { api.frag(tr); });
      api.frag(stage.querySelector('#c-ch6-6-closer'));

      // 进屏默认先放 discard 一帧（让右侧不空），但放在 step 之后不影响分步
      // 用一个轻量初始重放（不抢 step 焦点）
      replay('discard');
      rows[0].classList.add('on');

      api.onReset(function () {
        rows.forEach(function (x) { x.classList.remove('on'); });
        replay('discard');
        rows[0].classList.add('on');
      });
    }
  });

})();

</script>

  /* ====================================================== */
  /* 屏 7.1 — 比较两次提交                                   */
  /* ====================================================== */
  window.registerScreen({
    chapter: 7,
    chapterName: 'git diff',
    id: 'diff',
    title: '比较两次提交',
    subtitle: '点两个版本，看改了啥',
    render: function (stage, api) {
      injectStyle();

      /* 时间线节点：从旧到新（hash + 一句改动说明） */
      var NODES = [
        { id: 'a1b2c3d', msg: '初版登录' },
        { id: 'e4f5g6h', msg: '修空指针' },
        { id: 'b8c9d0e', msg: '加记住我' },
        { id: 'f1a2b3c', msg: '改文案' }
      ];

      /* 2-3 组不同 diff 文本，按"选了哪两个节点"轮换。
         key = 旧id + '>' + 新id；默认兜底用 DIFF_DEFAULT。 */
      var DIFFS = {
        'a1b2c3d>e4f5g6h': {
          file: 'src/login.js',
          lines: [
            { t: 'hunk', s: '@@ login() 防一下空指针 @@' },
            { t: 'del',  s: 'function login(u){ return u.name }' },
            { t: 'add',  s: 'function login(u){ return u?.name }' }
          ]
        },
        'e4f5g6h>b8c9d0e': {
          file: 'src/login.js',
          lines: [
            { t: 'hunk', s: '@@ 新增"记住我" @@' },
            { t: 'ctx',  s: 'function login(u, opts){' },
            { t: 'del',  s: '  return u?.name' },
            { t: 'add',  s: '  if (opts?.remember) setCookie(u.id)' },
            { t: 'add',  s: '  return u?.name' },
            { t: 'ctx',  s: '}' }
          ]
        },
        'b8c9d0e>f1a2b3c': {
          file: 'src/ui/strings.js',
          lines: [
            { t: 'hunk', s: '@@ 改登录按钮文案 @@' },
            { t: 'del',  s: 'export const LOGIN_BTN = "登 录"' },
            { t: 'add',  s: 'export const LOGIN_BTN = "立即登录"' }
          ]
        }
      };

      /* 跨段（跳着选）时给一个"合并视角"的兜底 diff */
      function fallbackDiff(oldId, newId) {
        return {
          file: 'src/login.js',
          lines: [
            { t: 'hunk', s: '@@ ' + oldId + ' → ' + newId + ' 累计改动 @@' },
            { t: 'del',  s: 'function login(u){ return u.name }' },
            { t: 'add',  s: 'function login(u, opts){' },
            { t: 'add',  s: '  if (opts?.remember) setCookie(u.id)' },
            { t: 'add',  s: '  return u?.name' },
            { t: 'add',  s: '}' }
          ]
        };
      }

      stage.innerHTML =
        '<h2 class="sc-h2 sc-center">git diff：看两个版本差在哪</h2>' +
        '<div class="c-ch7-wrap">' +
          '<p class="c-ch7-hint" id="c-ch7-hint">在下面的时间线上，依次点 <b>两个</b> 提交（先点旧的、再点新的），下面会弹出它俩的差异。</p>' +
          '<div class="c-ch7-pickpill" id="c-ch7-pick">' +
            '<span class="slot" data-slot="0">旧版本 ·······</span>' +
            '<span class="arrow">⇄</span>' +
            '<span class="slot" data-slot="1">新版本 ·······</span>' +
          '</div>' +
          '<div class="c-ch7-timeline" id="c-ch7-tl"></div>' +
          '<div class="c-ch7-diff" id="c-ch7-diff" data-interactive="1">' +
            '<div class="c-ch7-diff-empty" id="c-ch7-diffempty">选满两个提交后，这里出现 diff（红行=删掉，绿行=加上）。</div>' +
          '</div>' +
          '<div class="c-ch7-aihost" id="c-ch7-aihost"></div>' +
        '</div>';

      /* ---- 画时间线（自绘 SVG） ---- */
      var SVGNS = 'http://www.w3.org/2000/svg';
      var tlHost = stage.querySelector('#c-ch7-tl');
      var n = NODES.length;
      var GAP = 200, X0 = 90, Y = 56, W = X0 + (n - 1) * GAP + 90, H = 110;
      var svg = document.createElementNS(SVGNS, 'svg');
      svg.setAttribute('class', 'c-ch7-tl-svg');
      svg.setAttribute('viewBox', '0 0 ' + W + ' ' + H);
      svg.setAttribute('preserveAspectRatio', 'xMidYMid meet');
      // 连线
      var edge = document.createElementNS(SVGNS, 'path');
      edge.setAttribute('class', 'c-ch7-tl-edge');
      edge.setAttribute('d', 'M' + X0 + ',' + Y + ' L' + (X0 + (n - 1) * GAP) + ',' + Y);
      svg.appendChild(edge);

      var nodeEls = [];
      NODES.forEach(function (node, i) {
        var cx = X0 + i * GAP;
        var g = document.createElementNS(SVGNS, 'g');
        g.setAttribute('class', 'c-ch7-node');
        g.setAttribute('transform', 'translate(' + cx + ',' + Y + ')');
        g.setAttribute('data-interactive', '1');
        g.setAttribute('data-id', node.id);
        var circ = document.createElementNS(SVGNS, 'circle');
        circ.setAttribute('class', 'ndot');
        circ.setAttribute('r', 18);
        circ.setAttribute('cx', 0);
        circ.setAttribute('cy', 0);
        g.appendChild(circ);
        var badge = document.createElementNS(SVGNS, 'text');
        badge.setAttribute('class', 'badge');
        badge.textContent = ''; // 选中顺序角标（旧/新）
        g.appendChild(badge);
        var hash = document.createElementNS(SVGNS, 'text');
        hash.setAttribute('class', 'hash');
        hash.setAttribute('y', 38);
        hash.textContent = node.id;
        g.appendChild(hash);
        var msg = document.createElementNS(SVGNS, 'text');
        msg.setAttribute('class', 'msg');
        msg.setAttribute('y', 54);
        msg.textContent = node.msg;
        g.appendChild(msg);
        svg.appendChild(g);
        nodeEls.push({ g: g, badge: badge, id: node.id });
      });
      tlHost.appendChild(svg);

      var diffPanel = stage.querySelector('#c-ch7-diff');
      var pickEl = stage.querySelector('#c-ch7-pick');
      var slots = pickEl.querySelectorAll('.slot');
      var hintEl = stage.querySelector('#c-ch7-hint');

      /* ---- 选择状态（render 内部局部状态 → 重渲染即归零，幂等） ---- */
      var picks = []; // 存 id，最多 2 个

      function idShort(id) { return id; }

      function renderPicks() {
        nodeEls.forEach(function (ne) {
          var k = picks.indexOf(ne.id);
          if (k === 0) { ne.g.classList.add('sel'); ne.badge.textContent = '旧'; }
          else if (k === 1) { ne.g.classList.add('sel'); ne.badge.textContent = '新'; }
          else { ne.g.classList.remove('sel'); ne.badge.textContent = ''; }
        });
        slots[0].textContent = picks[0] ? idShort(picks[0]) : '旧版本 ·······';
        slots[0].classList.toggle('filled', !!picks[0]);
        slots[1].textContent = picks[1] ? idShort(picks[1]) : '新版本 ·······';
        slots[1].classList.toggle('filled', !!picks[1]);
      }

      function lineHTML(ln) {
        // textContent-safe：手动转义
        var esc = ln.s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        return '<span class="c-ch7-line ' + ln.t + '">' + esc + '</span>';
      }

      function showDiff() {
        if (picks.length < 2) {
          diffPanel.classList.remove('show');
          diffPanel.innerHTML = '<div class="c-ch7-diff-empty" id="c-ch7-diffempty">选满两个提交后，这里出现 diff（红行=删掉，绿行=加上）。</div>';
          return;
        }
        var oldId = picks[0], newId = picks[1];
        var key = oldId + '>' + newId;
        var d = DIFFS[key] || fallbackDiff(oldId, newId);
        var body = d.lines.map(lineHTML).join('');
        diffPanel.innerHTML =
          '<div class="c-ch7-diff-head">' +
            '<span class="cmd">$ git diff ' + oldId + ' ' + newId + '</span>' +
            '<span class="vs">（' + oldId + ' ⇄ ' + newId + '）</span>' +
          '</div>' +
          '<div class="c-ch7-diff-file">' + d.file + '</div>' +
          '<div class="c-ch7-diff-body">' + body + '</div>';
        // 触发淡入
        void diffPanel.offsetWidth;
        diffPanel.classList.add('show');
      }

      function pick(id) {
        var existing = picks.indexOf(id);
        if (existing !== -1) {
          // 再次点同一个 → 取消选它
          picks.splice(existing, 1);
        } else if (picks.length < 2) {
          picks.push(id);
        } else {
          // 已满两个：开始新一轮，从这个开始
          picks = [id];
        }
        renderPicks();
        if (picks.length === 2) {
          hintEl.innerHTML = '换两个节点试试 → diff 内容会跟着变。再点已选中的可取消。';
        } else {
          hintEl.innerHTML = '在下面的时间线上，依次点 <b>两个</b> 提交（先点旧的、再点新的），下面会弹出它俩的差异。';
        }
        showDiff();
      }

      nodeEls.forEach(function (ne) {
        ne.g.addEventListener('click', function (e) {
          e.stopPropagation();
          pick(ne.id);
        });
      });

      // 重置本屏：清空选择
      api.onReset(function () { picks = []; });

      /* ---- AI 卡片 ---- */
      var aiHost = stage.querySelector('#c-ch7-aihost');
      var card = api.aiCard({
        effect: '让 AI 说清两个版本差在哪',
        say: '比较 a1b2c3d 和 e4f5g6h，改了哪些东西',
        cmd: 'git diff a1b2c3d e4f5g6h'
      });
      aiHost.appendChild(card);

      /* ---- 初始：预选第一组，给观众一个"看得见的成果"，可随意改 ----
         时间线 + 取数槽一进来就在、随时可点（互动不依赖分步）。 */
      picks = ['a1b2c3d', 'e4f5g6h'];
      renderPicks();
      showDiff();

      /* ---- 分步：仅把 AI 卡作为一个揭示步（让讲解有节奏） ---- */
      api.frag(aiHost);
    }
  });

})();

</script>

      '.c-ch8-resolved-tag .ck{font-weight:900;}',

    ].join('');
    document.head.appendChild(s);

  /* ============================================================
   * 自绘小工具：在 svg 里画一个 commit 节点
   * ============================================================ */
  function drawDot(parent, cx, cy, fill, label, opts) {
    opts = opts || {};
    var g = sx('g', { 'transform': 'translate(' + cx + ',' + cy + ')' });
    if (opts.cls) g.setAttribute('class', opts.cls);
    var r = opts.r || 18;
    var c = sx('circle', { 'class': 'c-ch8-dot' + (opts.merge ? ' c-ch8-merge-dot' : ''), 'r': r, 'cx': 0, 'cy': 0, 'fill': fill });
    if (opts.stroke) { c.setAttribute('stroke', opts.stroke); c.setAttribute('stroke-width', opts.strokeW || 3.5); }
    g.appendChild(c);
    var t = sx('text', { 'class': 'c-ch8-dotlabel', 'fill': opts.labelFill || '#010409' });
    t.textContent = label;
    g.appendChild(t);
    parent.appendChild(g);
    return g;
  }
  function drawEdge(parent, x1, y1, x2, y2, cls) {
    var d;
    if (y1 === y2) d = 'M' + x1 + ',' + y1 + ' L' + x2 + ',' + y2;
    else { var mx = (x1 + x2) / 2; d = 'M' + x1 + ',' + y1 + ' C' + mx + ',' + y1 + ' ' + mx + ',' + y2 + ' ' + x2 + ',' + y2; }
    var e = sx('path', { 'class': 'c-ch8-edge' + (cls ? ' ' + cls : ''), 'd': d });
    parent.insertBefore(e, parent.firstChild); // 边在节点下层
    return e;
  }
  function laneLabel(parent, x, y, txt, color) {
    var t = sx('text', { 'class': 'c-ch8-lane-label', 'x': x, 'y': y, 'fill': color });
    t.textContent = txt;
    parent.appendChild(t);
    return t;
  }

  var COL = {
    main: '#E6EDF3', teal: '#2DD4BF', purple: '#A78BFA', amber: '#FBBF24', pink: '#F472B6', git: '#F05133'
  };

  /* ====================================================== */
  /* 屏 8.1 — 别直接在 main 上改                            */
  /* ====================================================== */
  window.registerScreen({
    chapter: 8,
    chapterName: '多人协作',
    id: 'no-main',
    title: '别直接在 main 上改',
    subtitle: '快进 vs 三方合并',
    render: function (stage, api) {
      injectStyle();

      stage.innerHTML =
        '<h2 class="sc-h2 sc-center">别直接在 main 上改</h2>' +
        '<div class="c-ch8-wrap">' +
          '<p class="c-ch8-lead">同一个仓库，别人也在往 <b>main</b> 上推。看你把自己的改动放哪——结局天差地别。</p>' +
          '<div class="c-ch8-switch" id="c-ch8-sw" data-interactive="1">' +
            '<button data-mode="main" data-interactive="1">😱 在 main 上改</button>' +
            '<button data-mode="branch" class="on" data-interactive="1">😎 在分支上改</button>' +
          '</div>' +
          '<div class="c-ch8-stage" id="c-ch8-stage">' +
            '<div class="c-ch8-stage-title" id="c-ch8-stitle"></div>' +
            '<div id="c-ch8-graph"></div>' +
            '<div class="c-ch8-pullbar">' +
              '<button class="sc-btn primary" id="c-ch8-pullbtn" data-interactive="1">▶ 演示 git pull 之后</button>' +
              '<span class="c-ch8-verdict" id="c-ch8-verdict"></span>' +
            '</div>' +
          '</div>' +
          '<p class="c-ch8-quote" id="c-ch8-quote"></p>' +
        '</div>';

      var graphHost = stage.querySelector('#c-ch8-graph');
      var titleEl = stage.querySelector('#c-ch8-stitle');
      var verdictEl = stage.querySelector('#c-ch8-verdict');
      var pullBtn = stage.querySelector('#c-ch8-pullbtn');
      var quoteEl = stage.querySelector('#c-ch8-quote');
      var swBtns = stage.querySelectorAll('#c-ch8-sw button');

      var mode = 'branch';   // 'main' | 'branch'   局部状态 → 重渲染归零（幂等）
      var pulled = false;    // 是否已演示 pull 结果

      // 几何
      var X0 = 70, GAP = 92;
      function X(i) { return X0 + i * GAP; }

      function drawGraph() {
        graphHost.innerHTML = '';
        var svg = sx('svg', { 'class': 'c-ch8-gsvg', 'preserveAspectRatio': 'xMidYMid meet' });
        graphHost.appendChild(svg);

        if (mode === 'main') {
          titleEl.innerHTML = '<span class="tag bad">在 main 上改</span> 你和上游都从 C 分叉，各走各的';
          var laneYourY = 70, laneUpY = 200;
          // 公共 A B C 放在你这条线（lane your），上游从 C 拉一条到下面
          // 你的 main: A B C X Y
          var yourIds = ['A', 'B', 'C', 'X', 'Y'];
          var upIds = ['D', 'E']; // 接在 C 之后（index 3,4）
          if (!pulled) {
            // 两条线都从 C 分叉
            // 你：A(0)B(1)C(2)X(3)Y(4)
            for (var i = 0; i < yourIds.length - 1; i++) drawEdge(svg, X(i), laneYourY, X(i + 1), laneYourY);
            // 上游：C(2) -> D(3) -> E(4) 在下面一条 lane，从 C 弯下去
            drawEdge(svg, X(2), laneYourY, X(3), laneUpY); // C -> D 分叉
            drawEdge(svg, X(3), laneUpY, X(4), laneUpY);   // D -> E
            yourIds.forEach(function (id, i) {
              var isMine = (id === 'X' || id === 'Y');
              drawDot(svg, X(i), laneYourY, isMine ? COL.git : COL.main, id, { labelFill: '#010409' });
            });
            upIds.forEach(function (id, i) {
              drawDot(svg, X(3 + i), laneUpY, COL.amber, id, { labelFill: '#010409' });
            });
            laneLabel(svg, X(4) + 28, laneYourY, '你的 main', COL.git);
            laneLabel(svg, X(4) + 28, laneUpY, '上游 main', COL.amber);
            svg.setAttribute('viewBox', '0 0 ' + (X(4) + 130) + ' 270');
          } else {
            // pull 之后：真·三方合并，多一个菱形合并点 M，X/Y 撞 D/E → 冲突
            for (var j = 0; j < yourIds.length - 1; j++) drawEdge(svg, X(j), laneYourY, X(j + 1), laneYourY);
            drawEdge(svg, X(2), laneYourY, X(3), laneUpY);
            drawEdge(svg, X(3), laneUpY, X(4), laneUpY);
            // 合并点 M 在 index 5（你的 lane），两个父：Y(4,your) 和 E(4,up)
            drawEdge(svg, X(4), laneYourY, X(5), laneYourY, 'merge');
            drawEdge(svg, X(4), laneUpY, X(5), laneYourY, 'merge');
            yourIds.forEach(function (id, i) {
              var isMine = (id === 'X' || id === 'Y');
              var conflict = (id === 'X' || id === 'Y');
              var node = drawDot(svg, X(i), laneYourY, isMine ? COL.git : COL.main, id, { labelFill: '#010409' });
              if (conflict) {
                // 红色冲突小标
                var b = sx('text', { 'class': 'c-ch8-conflict-badge', 'x': 0, 'y': -26, 'fill': COL.git });
                b.textContent = '✗冲突';
                node.appendChild(b);
              }
            });
            upIds.forEach(function (id, i) {
              drawDot(svg, X(3 + i), laneUpY, COL.amber, id, { labelFill: '#010409' });
            });
            drawDot(svg, X(5), laneYourY, COL.purple, '⛙', { merge: true, cls: 'c-ch8-pop', labelFill: '#010409' });
            laneLabel(svg, X(5) + 28, laneYourY, '乱掉的 main', COL.git);
            laneLabel(svg, X(4) + 28, laneUpY, '上游 main', COL.amber);
            svg.setAttribute('viewBox', '0 0 ' + (X(5) + 150) + ' 270');
          }
        } else {
          // branch 模式
          titleEl.innerHTML = '<span class="tag good">在分支上改</span> main 没动，你的活在 feature 分支上';
          var yourMainY = 70, featY = 200, upTheirY = 70;
          var baseIds = ['A', 'B', 'C'];
          var featIds = ['X', 'Y'];   // 在 feature lane，接 C
          var upIds2 = ['D', 'E'];    // 上游 main 接 C
          if (!pulled) {
            // 你的 main：A B C（没动）
            for (var k = 0; k < baseIds.length - 1; k++) drawEdge(svg, X(k), yourMainY, X(k + 1), yourMainY);
            // feature：C -> X -> Y（下面 lane）
            drawEdge(svg, X(2), yourMainY, X(3), featY);
            drawEdge(svg, X(3), featY, X(4), featY);
            baseIds.forEach(function (id, i) {
              drawDot(svg, X(i), yourMainY, COL.main, id, { labelFill: '#010409' });
            });
            featIds.forEach(function (id, i) {
              drawDot(svg, X(3 + i), featY, COL.teal, id, { labelFill: '#010409' });
            });
            laneLabel(svg, X(2) + 28, yourMainY, '你的 main（干净）', COL.main);
            laneLabel(svg, X(4) + 28, featY, 'feature 分支', COL.teal);
            svg.setAttribute('viewBox', '0 0 ' + (X(4) + 200) + ' 270');
          } else {
            // pull 之后：checkout main && pull → 完美快进 A B C D E（一条直线）
            var ffIds = ['A', 'B', 'C', 'D', 'E'];
            for (var m = 0; m < ffIds.length - 1; m++) {
              var isFF = (m >= 2); // C->D, D->E 是快进新拿到的
              drawEdge(svg, X(m), yourMainY, X(m + 1), yourMainY, isFF ? 'ff' : '');
            }
            // feature 还挂在 C 上（你的活还在，等会儿再开 PR）
            drawEdge(svg, X(2), yourMainY, X(3), featY);
            drawEdge(svg, X(3), featY, X(4), featY);
            ffIds.forEach(function (id, i) {
              var got = (id === 'D' || id === 'E');
              drawDot(svg, X(i), yourMainY, got ? COL.amber : COL.main, id, { labelFill: '#010409', cls: got ? 'c-ch8-pop' : '' });
            });
            featIds.forEach(function (id, i) {
              drawDot(svg, X(3 + i), featY, COL.teal, id, { labelFill: '#010409' });
            });
            laneLabel(svg, X(4) + 28, yourMainY, 'main = 上游（快进）', COL.teal);
            laneLabel(svg, X(4) + 28, featY, 'feature（你的活还在）', COL.teal);
            svg.setAttribute('viewBox', '0 0 ' + (X(4) + 220) + ' 270');
          }
        }
      }

      function renderVerdict() {
        if (!pulled) { verdictEl.classList.remove('show'); verdictEl.textContent = ''; return; }
        if (mode === 'main') {
          verdictEl.className = 'c-ch8-verdict show bad';
          verdictEl.textContent = '✗ 三方合并 + 冲突，历史变乱';
        } else {
          verdictEl.className = 'c-ch8-verdict show ok';
          verdictEl.textContent = '✓ fast-forward 快进，零冲突';
        }
      }

      function setQuote() {
        quoteEl.innerHTML = '为什么改东西要<span class="hl">开分支</span>、别碰 main——这是协作的<span class="hl">第一纪律</span>。';
      }

      function setMode(m) {
        mode = m;
        pulled = false;
        swBtns.forEach(function (b) { b.classList.toggle('on', b.getAttribute('data-mode') === m); });
        pullBtn.disabled = false;
        pullBtn.textContent = '▶ 演示 git pull 之后';
        drawGraph();
        renderVerdict();
      }

      swBtns.forEach(function (b) {
        b.addEventListener('click', function (e) {
          e.stopPropagation();
          setMode(b.getAttribute('data-mode'));
        });
      });
      pullBtn.addEventListener('click', function (e) {
        e.stopPropagation();
        pulled = true;
        pullBtn.disabled = true;
        pullBtn.textContent = mode === 'main' ? '⛙ 已 pull（三方合并）' : '⚡ 已 pull（快进）';
        drawGraph();
        renderVerdict();
      });

      api.onReset(function () { mode = 'branch'; pulled = false; });

      // 初始绘制（默认推荐做法：在分支上改）
      setMode('branch');
      setQuote();

      // 分步：开关 + 图一进来就能玩；金句作为一个揭示步（淡入），给讲解节奏。
      api.frag(quoteEl);
    }
  });

  /* ====================================================== */
  /* 屏 8.2 — fork → PR → review → merge                    */
  /* ====================================================== */
  window.registerScreen({
    chapter: 8,
    chapterName: '多人协作',
    id: 'pr-flow',
    title: 'fork → PR → review',
    subtitle: '协作的标准动作',
    render: function (stage, api) {
      injectStyle();

      var STEPS = [
        { key: 'fork', ic: '🍴', nm: 'fork', en: 'fork', exp: '把别人的仓库<b>复制一份到你自己名下</b>。从此你在自己的副本里随便改，碰不到原仓库。' },
        { key: 'edit', ic: '✏️', nm: '改', en: 'branch + commit', exp: '在你副本里<b>开一条分支</b>改东西、提交。别在 main 上改——还记得上一屏的第一纪律吗？' },
        { key: 'pr', ic: '📬', nm: '提 PR', en: 'pull request', exp: 'PR = <b>合并请求</b>：你举手说"我这条分支想并回原仓库，请看看"。本质是一次礼貌的对话。' },
        { key: 'review', ic: '🔍', nm: 'review', en: 'code review', exp: '维护者<b>审核</b>你的改动：逐行评论、提意见、要求你再改改。把关质量。' },
        { key: 'merge', ic: '✅', nm: 'merge', en: 'merge', exp: '审核通过 → <b>合并</b>进原仓库的 main。你的代码正式进入项目，皆大欢喜。' }
      ];

      var flowHTML = '';
      STEPS.forEach(function (s, i) {
        flowHTML +=
          '<div class="c-ch8-step" data-interactive="1" data-key="' + s.key + '" data-i="' + i + '">' +
            '<div class="ic">' + s.ic + '</div>' +
            '<div class="nm">' + s.nm + '</div>' +
            '<div class="en">' + s.en + '</div>' +
          '</div>';

      });

      stage.innerHTML =
        '<h2 class="sc-h2 sc-center">fork → 改 → PR → review → merge</h2>' +
        '<div class="c-ch8-wrap">' +
          '<p class="c-ch8-lead">点流程里的每一站，看它<b>是什么、为什么</b>。具体点哪个绿按钮，交给后面的 GitHub 章。</p>' +
          '<div class="c-ch8-flow" id="c-ch8-flow">' + flowHTML + '</div>' +
          '<div class="c-ch8-explain" id="c-ch8-explain"><span class="lab">点上面任意一站</span>这里出现它的一句话解释。</div>' +
          '<div class="c-ch8-sidecard" id="c-ch8-side">' +
            '<span class="k">🔑</span>' +
            '<div>有<b>写权限</b>时：直接 <span class="mono">git clone</span>、把分支 <span class="mono">push</span> 回<b>同一个仓库</b>、照样走 PR，<b>不用 fork</b>。<br>fork 是给你<b>没有写权限</b>时用的（比如给别人的开源项目贡献）。</div>' +
          '</div>' +
          '<div class="c-ch8-bridge" id="c-ch8-bridge">' +
            '<a class="sc-btn primary" id="c-ch8-bridgebtn" data-interactive="1" data-bridge="github" href="github-tutorial.html">看看在 GitHub 上长啥样 →</a>' +
          '</div>' +
        '</div>';

      var stepEls = stage.querySelectorAll('.c-ch8-step');
      var explainEl = stage.querySelector('#c-ch8-explain');

      function selectStep(i) {
        stepEls.forEach(function (el, k) { el.classList.toggle('on', k === i); });
        var s = STEPS[i];
        explainEl.innerHTML = '<span class="lab">' + s.nm + '</span>' + s.exp;
      }

      stepEls.forEach(function (el) {
        el.addEventListener('click', function (e) {
          e.stopPropagation();
          selectStep(+el.getAttribute('data-i'));
        });
      });

      // 桥接占位：若集成层挂了 data-bridge 处理就用它，否则 href 兜底跳 GitHub 章
      var bridgeBtn = stage.querySelector('#c-ch8-bridgebtn');
      bridgeBtn.addEventListener('click', function (e) {
        // 不 stopPropagation 之外：交给集成层；这里仅防止误触幻灯片导航
        e.stopPropagation();
      });

      api.onReset(function () {
        stepEls.forEach(function (el) { el.classList.remove('on'); });
        explainEl.innerHTML = '<span class="lab">点上面任意一站</span>这里出现它的一句话解释。';
      });

      // 默认高亮第一站，给观众一个起点
      selectStep(0);

      // 分步：副卡 + 过桥按钮作为后续揭示步（流程图一进来就能点）
      api.frag(stage.querySelector('#c-ch8-side'));
      api.frag(stage.querySelector('#c-ch8-bridge'));
    }
  });

  /* ====================================================== */
  /* 屏 8.3 — merge conflict（人来拍板）                     */
  /* ====================================================== */
  window.registerScreen({
    chapter: 8,
    chapterName: '多人协作',
    id: 'conflict',
    title: 'merge conflict',
    subtitle: '这时必须人来拍板',
    play: true,
    render: function (stage, api) {
      injectStyle();

      stage.innerHTML =
        '<h2 class="sc-h2 sc-center">merge conflict：同一行，两种主张</h2>' +
        '<div class="c-ch8-wrap">' +
          '<div class="c-ch8-conflict-intro">' +
            '<div class="c-ch8-branchcard mine">' +
              '<div class="who">🟢 你（小 C）· 实时结算</div>' +
              '<code>settleCredit(user, mode = "realtime")</code>' +
            '</div>' +
            '<div class="c-ch8-branchcard theirs">' +
              '<div class="who">🩷 别人（小 D）· 每周结算</div>' +
              '<code>settleCredit(user, mode = "weekly")</code>' +
            '</div>' +
          '</div>' +
          '<p class="c-ch8-lead">两个<b>共享同一个父节点</b>的 commit，改了<b>同一文件的同一行</b> → 冲突。' +
          'git 不敢替你瞎选，于是把两边都塞进文件，画上冲突标记。</p>' +
          '<div class="c-ch8-code" id="c-ch8-code" data-interactive="1"></div>' +
          '<p class="c-ch8-quote" id="c-ch8-cq">这时必须 <span class="hl">人来拍板</span>——连 AI 也得你定。</p>' +
          '<div class="c-ch8-choices" id="c-ch8-choices">' +
            '<button class="sc-btn pickwin" data-interactive="1" data-pick="mine">保留实时结算</button>' +
            '<button class="sc-btn pickwin" data-interactive="1" data-pick="theirs">保留每周结算</button>' +
            '<button class="sc-btn pickwin" data-interactive="1" data-pick="both">都要，我手动合</button>' +
          '</div>' +
        '</div>';

      var codeEl = stage.querySelector('#c-ch8-code');
      var choiceBtns = stage.querySelectorAll('#c-ch8-choices button');
      var resolved = null; // null | 'mine' | 'theirs' | 'both'

      function esc(s) { return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }

      function conflictView() {
        return '' +
          '<div class="c-ch8-code-head">src/credit/settle.js — ⚠ 冲突（CONFLICT）</div>' +
          '<div class="c-ch8-code-body">' +
            '<span class="c-ch8-cl ctx">function settleAll(users){</span>' +
            '<span class="c-ch8-cl marker">' + esc('<<<<<<< HEAD（你的：实时结算）') + '</span>' +
            '<span class="c-ch8-cl mine">  settleCredit(user, mode = "realtime")</span>' +
            '<span class="c-ch8-cl marker mid">' + esc('=======') + '</span>' +
            '<span class="c-ch8-cl theirs">  settleCredit(user, mode = "weekly")</span>' +
            '<span class="c-ch8-cl marker">' + esc('>>>>>>> feature-D（别人的：每周结算）') + '</span>' +
            '<span class="c-ch8-cl ctx">}</span>' +
          '</div>';
      }

      function resolvedView(pick) {
        var head, lines, tag;
        if (pick === 'mine') {
          head = 'src/credit/settle.js — ✓ 已解决';
          lines = '<span class="c-ch8-cl kept">  settleCredit(user, mode = "realtime")</span>';
          tag = '保留了：实时结算（你的版本）';
        } else if (pick === 'theirs') {
          head = 'src/credit/settle.js — ✓ 已解决';
          lines = '<span class="c-ch8-cl kept">  settleCredit(user, mode = "weekly")</span>';
          tag = '保留了：每周结算（别人的版本）';
        } else {
          head = 'src/credit/settle.js — ✓ 已解决（手动合并）';
          lines = '<span class="c-ch8-cl kept">  settleCredit(user, mode = opts.weekly ? "weekly" : "realtime")</span>';
          tag = '两套都要：你手动写了一行同时支持';
        }
        return '' +
          '<div class="c-ch8-code-head">' + head + '</div>' +
          '<div class="c-ch8-code-body">' +
            '<span class="c-ch8-cl ctx">function settleAll(users){</span>' +
            lines +
            '<span class="c-ch8-cl ctx">}</span>' +
          '</div>' +
          '<div class="c-ch8-resolved-tag"><span class="ck">✓</span>' + tag + '（冲突标记已清除）</div>';
      }

      function paint() {
        if (resolved) {
          codeEl.innerHTML = resolvedView(resolved);
        } else {
          codeEl.innerHTML = conflictView();
        }
        choiceBtns.forEach(function (b) {
          b.classList.toggle('primary', resolved && b.getAttribute('data-pick') === resolved);
        });
      }

      choiceBtns.forEach(function (b) {
        b.addEventListener('click', function (e) {
          e.stopPropagation();
          resolved = (resolved === b.getAttribute('data-pick')) ? null : b.getAttribute('data-pick');
          paint();
        });
      });

      api.onReset(function () { resolved = null; });

      // 初始：显示带冲突标记的代码块
      paint();

      // 分步：先代码块（已在），再金句，再三个按钮——给讲解节奏
      api.frag(stage.querySelector('#c-ch8-cq'));
      api.frag(stage.querySelector('#c-ch8-choices'));
    }
  });

  /* ====================================================== */
  /* 屏 8.4 — cherry-pick（只拣一个 commit）                 */
  /* ====================================================== */
  window.registerScreen({
    chapter: 8,
    chapterName: '多人协作',
    id: 'cherry-pick',
    title: 'cherry-pick',
    subtitle: '只搬那一个 commit',
    render: function (stage, api) {
      injectStyle();

      stage.innerHTML =
        '<h2 class="sc-h2 sc-center">cherry-pick：只拣那一个好 commit</h2>' +
        '<div class="c-ch8-wrap">' +
          '<p class="c-ch8-cp-hint" id="c-ch8-cphint">feature 上有个 <b>★ 好 commit</b>。你只想要它、不想要整条分支。' +
          '把 ★ <b>拖到 main</b>（或点按钮）→ 复制一份落到 main 末端。</p>' +
          '<div id="c-ch8-cpgraph" style="position:relative;"></div>' +
          '<div class="c-ch8-cpbtns">' +
            '<button class="sc-btn primary" id="c-ch8-cpbtn" data-interactive="1">🍒 拣选这个 commit</button>' +
            '<button class="sc-btn" id="c-ch8-cpreset" data-interactive="1">↺ 重来</button>' +
          '</div>' +
          '<div class="c-ch8-aihost" id="c-ch8-cpai"></div>' +
        '</div>';

      var host = stage.querySelector('#c-ch8-cpgraph');
      var hintEl = stage.querySelector('#c-ch8-cphint');
      var picked = false; // 是否已 cherry-pick（局部状态 → 幂等）

      // 几何
      var X0 = 70, GAP = 100;
      function X(i) { return X0 + i * GAP; }
      var mainY = 70, featY = 200;

      // ★ 好 commit 在 feature 上：A B ★ Z（index 0..3 在 feature lane，但 A B 与 main 共享）
      // 为简洁：main: A B C（共享 A B），feature 从 B 分叉 → ★ Z
      // 布局：A(0) B(1) 在 main lane；C(2) 在 main lane；feature: ★(2) Z(3) 在 feat lane（从 B 分叉）
      var goodG = null;

      function draw() {
        host.innerHTML = '';
        var svg = sx('svg', { 'class': 'c-ch8-gsvg', 'preserveAspectRatio': 'xMidYMid meet' });
        host.appendChild(svg);

        // ---- main lane: A B C (+ 末端可能多一个 ★副本) ----
        drawEdge(svg, X(0), mainY, X(1), mainY); // A-B
        drawEdge(svg, X(1), mainY, X(2), mainY); // B-C
        drawDot(svg, X(0), mainY, COL.main, 'A', { labelFill: '#010409' });
        drawDot(svg, X(1), mainY, COL.main, 'B', { labelFill: '#010409' });
        drawDot(svg, X(2), mainY, COL.main, 'C', { labelFill: '#010409' });

        // ---- feature lane: 从 B 分叉 → ★ → Z ----
        drawEdge(svg, X(1), mainY, X(2), featY);  // B -> ★
        drawEdge(svg, X(2), featY, X(3), featY);  // ★ -> Z
        goodG = drawDot(svg, X(2), featY, COL.git, '★', { stroke: COL.git, labelFill: '#fff', cls: 'c-ch8-good' });
        goodG.setAttribute('data-interactive', '1'); // 防止拖拽/点击误触幻灯片导航
        // ★ 标注
        var lbl = sx('text', { 'class': 'c-ch8-conflict-badge', 'x': 0, 'y': -28, 'fill': COL.git });
        lbl.textContent = '好commit';
        goodG.appendChild(lbl);
        drawDot(svg, X(3), featY, COL.teal, 'Z', { labelFill: '#010409' });

        laneLabel(svg, X(2) + (picked ? 1 : 0) * GAP + 32, mainY, picked ? 'main（含 ★ 副本）' : 'main', picked ? COL.git : COL.main);
        laneLabel(svg, X(3) + 30, featY, 'feature', COL.teal);

        var rightMost = X(2);
        if (picked) {
          // ★ 的副本落到 main 末端（C 之后，index 3 在 main lane）
          drawEdge(svg, X(2), mainY, X(3), mainY); // C -> ★'
          drawDot(svg, X(3), mainY, COL.git, '★', { stroke: COL.git, labelFill: '#fff', cls: 'c-ch8-pop' });
          var lbl2 = sx('text', { 'class': 'c-ch8-conflict-badge', 'x': X(3), 'y': mainY - 28, 'fill': COL.git });
          lbl2.textContent = '副本';
          svg.appendChild(lbl2);
          rightMost = X(3);
          // 重画 main 标签到末端
        }
        svg.setAttribute('viewBox', '0 0 ' + (rightMost + 220) + ' 270');

        bindDrag(svg);
      }

      // 拖拽：把 ★ 拖到 main lane → 触发 cherry-pick
      function bindDrag(svg) {
        if (!goodG || picked) return;
        var dragging = false, ghost = null;
        function startXY(ev) {
          var t = (ev.touches && ev.touches[0]) || ev;
          return { x: t.clientX, y: t.clientY };
        }
        function onDown(ev) {
          if (picked) return;
          ev.preventDefault(); ev.stopPropagation();
          dragging = true;
          // 用一个浮动的 ★ 跟手
          ghost = document.createElement('div');
          ghost.textContent = '★';
          ghost.style.cssText = 'position:fixed;z-index:90;font-family:var(--font-mono);font-weight:800;font-size:22px;color:#fff;background:' + COL.git + ';width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;pointer-events:none;box-shadow:0 0 14px rgba(240,81,51,.8);transform:translate(-50%,-50%);';
          var p = startXY(ev);
          ghost.style.left = p.x + 'px'; ghost.style.top = p.y + 'px';
          document.body.appendChild(ghost);
          document.addEventListener('mousemove', onMove);
          document.addEventListener('mouseup', onUp);
          document.addEventListener('touchmove', onMove, { passive: false });
          document.addEventListener('touchend', onUp);
        }
        function onMove(ev) {
          if (!dragging) return;
          ev.preventDefault();
          var p = startXY(ev);
          ghost.style.left = p.x + 'px'; ghost.style.top = p.y + 'px';
        }
        function onUp(ev) {
          if (!dragging) return;
          dragging = false;
          var p = startXY(ev);
          if (ghost && ghost.parentNode) ghost.parentNode.removeChild(ghost);
          ghost = null;
          document.removeEventListener('mousemove', onMove);
          document.removeEventListener('mouseup', onUp);
          document.removeEventListener('touchmove', onMove);
          document.removeEventListener('touchend', onUp);
          // 命中判定：落点是否落在 main lane（svg 上半区）
          var rect = svg.getBoundingClientRect();
          var midY = rect.top + rect.height * 0.5;
          if (p.y < midY && p.x > rect.left && p.x < rect.right) {
            doPick();
          }
        }
        goodG.addEventListener('mousedown', onDown);
        goodG.addEventListener('touchstart', onDown, { passive: false });
      }

      function doPick() {
        if (picked) return;
        picked = true;
        hintEl.innerHTML = '✓ <b>git cherry-pick</b> 把 ★ <b>复制</b>了一份到 main 末端——原来那个 ★ 还留在 feature 上，整条分支没被拖过来。';
        draw();
      }

      stage.querySelector('#c-ch8-cpbtn').addEventListener('click', function (e) {
        e.stopPropagation();
        doPick();
      });
      stage.querySelector('#c-ch8-cpreset').addEventListener('click', function (e) {
        e.stopPropagation();
        picked = false;
        hintEl.innerHTML = 'feature 上有个 <b>★ 好 commit</b>。你只想要它、不想要整条分支。把 ★ <b>拖到 main</b>（或点按钮）→ 复制一份落到 main 末端。';
        draw();
      });

      api.onReset(function () { picked = false; });

      // AI 卡
      var card = api.aiCard({
        effect: '只把那一个 commit 搬到 main，不连带整条分支',
        say: '把 a1b2c3d 这个 commit 单独 cherry-pick 到 main',
        cmd: 'git cherry-pick a1b2c3d'
      });
      stage.querySelector('#c-ch8-cpai').appendChild(card);

      // 初始绘制
      draw();

      // 分步：AI 卡作为揭示步（图与互动一进来就在）
      api.frag(stage.querySelector('#c-ch8-cpai'));
    }
  });

})();

</script>

(function () {

  var AMBER = '#FBBF24';

  /* 本章作用域样式，仅注入一次（多屏共用） */

      '.c-ch9-pane{background:var(--pane);border:1px solid var(--border);border-radius:14px;overflow:hidden;display:flex;flex-direction:column;min-width:0;}',

      '.c-ch9-dots{display:flex;gap:6px;}',

      '.c-ch9-shared .cg-wrap{width:100%;}',

      /* 两束视线（屏 9.2）：从两个面板汇向中央 .git */

  /* 工作窗口面板（标题栏 + 主体）。返回 {el, body} 供填充。 */
  function makePane(opts) {
    opts = opts || {};
    var pane = document.createElement('div');
    pane.className = 'c-ch9-pane' + (opts.cls ? ' ' + opts.cls : '');
    var bar = document.createElement('div');
    bar.className = 'c-ch9-bar';
    bar.innerHTML =
      '<span class="c-ch9-dots"><i class="c-ch9-dot r"></i><i class="c-ch9-dot y"></i><i class="c-ch9-dot g"></i></span>' +
      '<span class="c-ch9-bar-title">' + (opts.title || '') + '</span>';
    var body = document.createElement('div');
    body.className = 'c-ch9-body';
    if (opts.bodyHTML) body.innerHTML = opts.bodyHTML;
    pane.appendChild(bar);
    pane.appendChild(body);
    return { el: pane, body: body, bar: bar };
  }

  /* ====================================================== */
  register({
    chapter: 9,
    chapterName: 'Worktree（进阶/彩蛋）',
    id: 'worktree-killer',
    title: 'Vibe coder 的杀手级用法',
    subtitle: '多个 agent · 各占一个 worktree + 分支',
    play: true,
    render: function (stage, api) {
      injectStyle();

      stage.innerHTML =
        '<div class="c-ch9-wrap">' +
          '<div class="c-ch9-head">' +
            '<span class="sc-pill">⚡ 杀手级用法</span>' +
            '<h2 class="sc-h2">同时跑好几个 <span style="color:' + TEAL + '">agent</span></h2>' +

          '<div class="c-ch9-panes three" id="c-ch9-4-panes"></div>' +

            '<span class="c-ch9-shared-label">shared .git · 三条分支并行</span>' +
          '</div>' +

            '<span class="c-ch9-hint">每个 agent 一个 worktree、一条分支，各改各的互不冲突，最后分别合并。</span>' +
          '</div>' +
        '</div>';

      var panes = stage.querySelector('#c-ch9-4-panes');
      var sharedHost = stage.querySelector('#c-ch9-4-shared');
      var narrate = stage.querySelector('#c-ch9-4-narrate');
      var btn = stage.querySelector('#c-ch9-4-btn');

      var g = api.graph(sharedHost, {});

      var AGENTS = [
        { name: 'agent-A', icon: '🤖', branch: 'feat/login', color: TEAL, task: '写登录页', commit: 'L' },
        { name: 'agent-B', icon: '🦾', branch: 'feat/pay', color: PURPLE, task: '接支付', commit: 'P' },
        { name: 'agent-C', icon: '👾', branch: 'feat/i18n', color: AMBER, task: '做多语言', commit: 'I' }
      ];

      var INITIAL =
        '最适合 vibe coder 的场景：<b>同时跑好几个 agent</b>，' +
        '每个 agent 待在<b>自己的一个 worktree + 一条分支</b>里并行干活。' +
        '<br>下面三个窗口现在都在待命 —— 点「启动」让它们一起开工。';

      /* 共享图：main A B C，三条分支从 C 开。level=已开工的 agent 数(0..3)。 */
      function buildGraph(level, anim) {
        g.reset();
        g.init('main', ['A', 'B', 'C']);
        for (var i = 0; i < AGENTS.length; i++) {
          var a = AGENTS[i];
          // 三条分支总是从 C 拉出（并行）
          g.createBranch(a.branch, 'C', a.color);
          if (level > i) {
            // 这个 agent 已开工：在自己分支上长一个 commit
            g.addCommit(a.branch, a.commit, { anim: anim });
          }
        }
      }

      /* 三个 agent 面板。level 个已开工（spinner→done），其余 idle。 */
      function buildPanes(level) {
        panes.innerHTML = '';
        AGENTS.forEach(function (a, i) {
          var working = level > i;
          var statusHTML = working
            ? '<div class="c-ch9-status done">✓ 已提交 ' + a.commit + '（在 ' + a.branch + ' 上）</div>'
            : (level === i
                ? '<div class="c-ch9-status"><span class="spin"></span> 待命中…</div>'
                : '<div class="c-ch9-status idle">○ 待命中</div>');
          var pane = makePane({
            cls: 'agent',
            title: '<span class="c-ch9-agent">' + a.icon + '</span> <b>' + a.name + '</b>',
            bodyHTML:
              branchTag(a.branch, a.color) +
              '<div class="c-ch9-path">~/project-' + a.name + '</div>' +
              '<div class="c-ch9-file"><span class="ic">🎯</span> 任务：' + a.task + '</div>' +
              statusHTML
          });
          panes.appendChild(pane.el);
        });
      }

      function setBtn(level) {
        if (level >= AGENTS.length) {
          btn.textContent = '✓ 3 个 agent 各自交了活';
          btn.disabled = true;
          btn.classList.remove('primary');
        } else {
          btn.textContent = level === 0 ? '▶ 启动 3 个 agent' : '▶ 让下一个 agent 开工';
          btn.disabled = false;
          btn.classList.add('primary');
        }
      }

      // 初始态
      buildGraph(0, false);
      buildPanes(0);
      narrate.innerHTML = INITIAL;
      setBtn(0);

      // 三步：每步一个 agent 在自己分支上提交（并行生长）
      AGENTS.forEach(function (a, i) {
        api.step(function (animated) {
          var level = i + 1;
          buildGraph(level, animated);
          buildPanes(level);
          if (animated) { try { g.highlight(a.commit, true); } catch (e) {} }
          var done = AGENTS.slice(0, level).map(function (x) {
            return '<b style="color:' + x.color + '">' + x.name + '</b>';
          }).join('、');
          if (level < AGENTS.length) {
            narrate.innerHTML = done + ' 开工，在<b>自己的分支</b>上提交了一笔 —— ' +
              '看底部图：' + level + ' 条彩线已经在并行往前长，<b>互不冲突</b>。';
          } else {
            narrate.innerHTML = '三个 agent <b>各占一个 worktree、各走一条分支</b>，' +
              '同时长出 <b style="color:' + TEAL + '">L</b>、<b style="color:' + PURPLE + '">P</b>、' +
              '<b style="color:' + AMBER + '">I</b> 三笔，全程互不踩脚。' +
              '<br>最后把三条线<b>分别 merge 回 main</b> 就收工了 —— 这就是 worktree 给 vibe coder 的杀手级用法。🎉';
          }
          setBtn(level);
        });
      });

      btn.addEventListener('click', function () { api.next(); });

      api.onReset(function () {
        buildGraph(0, false);
        buildPanes(0);
        narrate.innerHTML = INITIAL;
        setBtn(0);
      });
    }
  });

})();

</script>

<script>
(function(){
"use strict";

/* ------------------------------------------------------------
   SCREEN REGISTRATION  (chapters may register BEFORE engine)
   ------------------------------------------------------------ */
var SCREENS = [];
// consume any screens registered before this engine ran
if (window.__pendingScreens && window.__pendingScreens.length){
  SCREENS = SCREENS.concat(window.__pendingScreens);
}
window.registerScreen = function(def){ SCREENS.push(def); };
// if a future module registers after engine load but before boot, still captured.

/* ------------------------------------------------------------
   SVG HELPERS
   ------------------------------------------------------------ */
var SVGNS = "http://www.w3.org/2000/svg";
function svgEl(name, attrs){
  var e = document.createElementNS(SVGNS, name);
  if (attrs) for (var k in attrs) e.setAttribute(k, attrs[k]);
  return e;
}
function el(tag, cls, txt){
  var e = document.createElement(tag);
  if (cls) e.className = cls;
  if (txt != null) e.textContent = txt;
  return e;
}

var BRANCH_COLORS = {
  main:'#E6EDF3', teal:'#2DD4BF', purple:'#A78BFA', amber:'#FBBF24', pink:'#F472B6'
};
// dark dot colors that need a light text label
function needsDarkLabel(hex){
  // returns true if label text should be dark (because dot is light)
  if(!hex) return false;
  var c = hex.replace('#',''); if(c.length===3) c=c.replace(/(.)/g,'$1$1');
  var r=parseInt(c.substr(0,2),16),g=parseInt(c.substr(2,2),16),b=parseInt(c.substr(4,2),16);
  var lum=(0.299*r+0.587*g+0.114*b);
  return lum>150; // light dot -> dark label
}

/* ============================================================
   COMMIT GRAPH
   ============================================================ */
function CommitGraph(container, opts){
  this.opts = opts || {};
  this.container = container;
  this.wrap = el('div','cg-wrap');
  container.appendChild(this.wrap);

  this.svg = svgEl('svg',{'class':'cg-svg', 'viewBox':'0 0 100 100', 'preserveAspectRatio':'xMidYMid meet'});
  this.gEdges = svgEl('g',{'class':'cg-edges'});
  this.gNodes = svgEl('g',{'class':'cg-nodes'});
  this.gLabels = svgEl('g',{'class':'cg-labels'});
  this.gHead = svgEl('g',{'class':'cg-headlayer'});
  this.svg.appendChild(this.gEdges);
  this.svg.appendChild(this.gNodes);
  this.svg.appendChild(this.gLabels);
  this.svg.appendChild(this.gHead);
  this.wrap.appendChild(this.svg);

  this.banner = el('div','cg-detach-banner','⚠ HEAD 处于分离态 (detached HEAD) — 此处的提交无分支收留');
  this.wrap.appendChild(this.banner);

  this._reset();
}

CommitGraph.prototype._reset = function(){
  this.commits = {};     // id -> {id, branchLane, x, y, parents:[], color, ghost, node}
  this.branches = {};    // name -> {name, color, lane, head:commitId}
  this.order = [];       // commit ids in creation order
  this.laneCount = 0;
  this.head = {type:'branch', ref:null}; // {type:'branch'|'commit', ref}
  this.detached = false;
  this.gEdges.innerHTML='';
  this.gNodes.innerHTML='';
  this.gLabels.innerHTML='';
  this.gHead.innerHTML='';
  this.banner.classList.remove('show');
  this.svg.classList.remove('detached');
};

CommitGraph.prototype.reset = function(){ this._reset(); };

/* layout geometry */
CommitGraph.prototype._colX = function(index){ return 70 + index*92; };
CommitGraph.prototype._laneY = function(lane){ return 90 + lane*120; };

CommitGraph.prototype._animate = function(want){
  // returns whether to animate this change
  if (this._suppressAnim) return false;
  return want !== false;
};

/* ---- public: init a branch with N commits in a row ---- */
CommitGraph.prototype.init = function(branchName, ids){
  var color = BRANCH_COLORS[branchName] || BRANCH_COLORS.main;
  var lane = this.laneCount++;
  this.branches[branchName] = {name:branchName, color:color, lane:lane, head:null};
  this.head = {type:'branch', ref:branchName};
  var self=this;
  ids.forEach(function(id, i){
    self._createCommit(id, branchName, (i===0?[]:[ids[i-1]]), {anim:false});
  });
  this._render(false);
  return this;
};

CommitGraph.prototype._createCommit = function(id, branchName, parents, o){
  o = o||{};
  var b = this.branches[branchName];
  // commit index = number of commits already on this lane (chain length on lane)
  var laneCommits = this.order.filter(function(cid){return this.commits[cid].lane===b.lane;}, this);
  var commit = {
    id:id, branch:branchName, lane:b.lane, color:b.color,
    parents:parents||[], ghost:false,
    index: laneCommits.length // position along the lane
  };
  this.commits[id]=commit;
  this.order.push(id);
  b.head = id;
  return commit;
};

/* ---- public: addCommit on branch tip ---- */
CommitGraph.prototype.addCommit = function(branchName, id, o){
  o=o||{};
  var b=this.branches[branchName];
  if(!b) return this;
  var parent = b.head;
  var c = this._createCommit(id, branchName, parent?[parent]:[], o);
  c._new = true;
  // if HEAD attached to this branch, head follows
  if (this.head.type==='branch' && this.head.ref===branchName){ /* head ref already on branch */ }
  this._render(this._animate(o.anim));
  return this;
};

/* ---- public: create branch off a commit ---- */
CommitGraph.prototype.createBranch = function(name, fromCommit, color){
  color = color || BRANCH_COLORS[name] || '#'+Math.floor(Math.random()*0xffffff).toString(16);
  var lane = this.laneCount++;
  this.branches[name] = {name:name, color:color, lane:lane, head:fromCommit, base:fromCommit};
  this._render(true);
  return this;
};

/* ---- public: checkout branch OR commit ---- */
CommitGraph.prototype.checkout = function(ref){
  if (this.branches[ref]){
    this.head = {type:'branch', ref:ref};
    this.detached = false;
  } else if (this.commits[ref]){
    this.head = {type:'commit', ref:ref};
    this.detached = true;
  }
  this._render(true);
  return this;
};

/* ---- public: merge srcBranch into dstBranch ---- */
CommitGraph.prototype.merge = function(srcBranch, dstBranch){
  var src=this.branches[srcBranch], dst=this.branches[dstBranch];
  if(!src||!dst) return this;
  var mergeId = (dst.head||'') + '+' + (src.head||'');
  // create merge commit on dst lane with two parents
  var c=this._createCommit('M'+(this.order.length), dstBranch, [dst.head, src.head], {});
  c.isMerge=true; c._new=true; c.label='⛙';
  this._render(true);
  return this;
};

/* ---- public: commit while detached -> orphan + astronaut ---- */
CommitGraph.prototype.commitDetached = function(id){
  var parent = this.head.ref; // a commit id
  // orphan lane: put on a fresh lane just below
  var lane=this.laneCount++;
  var c={ id:id, branch:null, lane:lane, color:BRANCH_COLORS.main,
          parents:parent?[parent]:[], ghost:true, index: (this.commits[parent]?this.commits[parent].index+1:0),
          orphan:true, _new:true };
  this.commits[id]=c; this.order.push(id);
  // head now points to this new commit (still detached)
  this.head={type:'commit', ref:id};
  this.detached=true;
  this._render(true);
  // astronaut floats away from this node
  var self=this;
  setTimeout(function(){
    var xy=self.getNodeXY(id);
    if(xy && self._api && self._api.astronaut){
      self._api.astronaut({svgRoot:self.svg, x:xy.x, y:xy.y});
    }
  }, 120);
  return this;
};

/* ---- public: mark / unmark ghost ---- */
CommitGraph.prototype.setGhost = function(id, on){
  var c=this.commits[id]; if(!c) return this;
  c.ghost = (on!==false);
  this._render(true);
  return this;
};

/* ---- public: rescue an orphan by giving it a branch ---- */
CommitGraph.prototype.rescue = function(id, branchName, color){
  var c=this.commits[id]; if(!c) return this;
  color = color || BRANCH_COLORS[branchName] || BRANCH_COLORS.amber;
  c.ghost=false; c.orphan=false; c.branch=branchName; c.color=color;
  // create a branch record pointing at this commit, reusing its lane
  this.branches[branchName]={name:branchName,color:color,lane:c.lane,head:id};
  // if head is this commit, attach head to the new branch
  if(this.head.type==='commit' && this.head.ref===id){
    this.head={type:'branch', ref:branchName};
    this.detached=false;
  }
  this._render(true);
  return this;
};

/* ---- public: highlight ---- */
CommitGraph.prototype.highlight = function(id, on){
  var c=this.commits[id]; if(!c) return this;
  c.hl=(on!==false);
  this._render(true);
  return this;
};

/* ---- public: node coordinates in PAGE space ---- */
CommitGraph.prototype.getNodeXY = function(id){
  var c=this.commits[id]; if(!c) return null;
  // svg user coords
  var ux=this._colX(c.index), uy=this._laneY(c.lane);
  // map to page via current CTM
  var pt=this.svg.createSVGPoint(); pt.x=ux; pt.y=uy;
  var ctm=this.svg.getScreenCTM();
  if(!ctm) return {x:ux,y:uy};
  var sp=pt.matrixTransform(ctm);
  return {x:sp.x, y:sp.y};
};

/* ---- internal render ---- */
CommitGraph.prototype._render = function(animate){
  var self=this;
  // compute viewBox bounds
  var maxIdx=0, maxLane=0;
  this.order.forEach(function(cid){var c=self.commits[cid];
    if(c.index>maxIdx)maxIdx=c.index; if(c.lane>maxLane)maxLane=c.lane;});
  Object.keys(this.branches).forEach(function(bn){var b=self.branches[bn];if(b.lane>maxLane)maxLane=b.lane;});
  var W=this._colX(maxIdx)+160; // room for pills
  var H=this._laneY(maxLane)+90;
  this.svg.setAttribute('viewBox','0 0 '+Math.max(W,300)+' '+Math.max(H,200));

  // detached visuals
  if(this.detached){ this.svg.classList.add('detached'); this.banner.classList.add('show'); }
  else { this.svg.classList.remove('detached'); this.banner.classList.remove('show'); }

  // ---- EDGES ----
  this.gEdges.innerHTML='';
  this.order.forEach(function(cid){
    var c=self.commits[cid];
    c.parents.forEach(function(pid){
      var p=self.commits[pid]; if(!p) return;
      var x1=self._colX(p.index), y1=self._laneY(p.lane);
      var x2=self._colX(c.index), y2=self._laneY(c.lane);
      var path;
      if(p.lane===c.lane){
        path='M'+x1+','+y1+' L'+x2+','+y2;
      } else {
        // curved branch / merge connector
        var mx=(x1+x2)/2;
        path='M'+x1+','+y1+' C'+mx+','+y1+' '+mx+','+y2+' '+x2+','+y2;
      }
      var e=svgEl('path',{'class':'cg-edge'+(c.isMerge?' merge':''),'d':path});
      if(c.ghost||p.ghost) e.style.opacity='.4';
      self.gEdges.appendChild(e);
    });
  });

  // ---- NODES ----
  this.gNodes.innerHTML='';
  this.order.forEach(function(cid){
    var c=self.commits[cid];
    var x=self._colX(c.index), y=self._laneY(c.lane);
    var g=svgEl('g',{'class':'cg-node'});
    g.setAttribute('transform','translate('+x+','+y+')');
    if(c.ghost) g.classList.add('ghost');
    if(c.hl) g.classList.add('hl');
    var fill = c.ghost ? '#4B5563' : c.color;
    g.classList.add(needsDarkLabel(fill)?'dark-label':'light-label');
    var circ=svgEl('circle',{'class':'glow','r':17,'cx':0,'cy':0,'fill':fill});
    g.appendChild(circ);
    var label = c.label || cid;
    var t=svgEl('text',{'class':'label'}); t.textContent=label.length>3?label.substr(0,3):label;
    g.appendChild(t);
    if(c._new && animate){ g.classList.add('appear'); c._new=false; }
    else { c._new=false; }
    c._gx=x; c._gy=y;
    self.gNodes.appendChild(g);
  });

  // ---- BRANCH PILLS ----
  this.gLabels.innerHTML='';
  Object.keys(this.branches).forEach(function(bn){
    var b=self.branches[bn];
    var hc=self.commits[b.head];
    if(!hc) {
      // empty branch sitting on its base
      hc=self.commits[b.base];
    }
    if(!hc) return;
    var x=self._colX(hc.index)+30, y=self._laneY(hc.lane)-30;
    var g=svgEl('g',{'class':'cg-pill'});
    var w=bn.length*8+18;
    var rect=svgEl('rect',{'x':x,'y':y-12,'width':w,'height':22,'rx':7,
      'fill':'rgba(13,17,23,.85)','stroke':b.color,'stroke-width':1.6});
    var txt=svgEl('text',{'x':x+w/2,'y':y,'fill':b.color}); txt.textContent=bn;
    g.appendChild(rect); g.appendChild(txt);
    self.gLabels.appendChild(g);
  });

  // ---- HEAD FLAG ----
  this.gHead.innerHTML='';
  var headCommit=null;
  if(this.head.type==='branch'){
    var b=this.branches[this.head.ref];
    if(b) headCommit=this.commits[b.head]||this.commits[b.base];
  } else if(this.head.type==='commit'){
    headCommit=this.commits[this.head.ref];
  }
  if(headCommit){
    var hx=this._colX(headCommit.index), hy=this._laneY(headCommit.lane);
    var fg=svgEl('g',{'class':'cg-head'+(this.detached?' detached':'')});
    // stem from node up to flag
    var flagY=hy-58;
    var stem=svgEl('line',{'class':'stem','x1':hx,'y1':hy-17,'x2':hx,'y2':flagY+18});
    fg.appendChild(stem);
    var fw=46;
    var rect=svgEl('rect',{'x':hx-fw/2,'y':flagY,'width':fw,'height':20,'rx':4});
    var txt=svgEl('text',{'x':hx,'y':flagY+10}); txt.textContent='HEAD';
    fg.appendChild(rect); fg.appendChild(txt);
    this.gHead.appendChild(fg);
  }
};

/* ============================================================
   AI COMMAND CARD

function buildAICard(o){

/* ============================================================
   ASTRONAUT
   ============================================================ */
function launchAstronaut(o){
  o=o||{};
  var a=el('div','astronaut','👨‍🚀');
  var x=o.x!=null?o.x:window.innerWidth/2;
  var y=o.y!=null?o.y:window.innerHeight/2;
  a.style.left=x+'px'; a.style.top=y+'px';
  // random-ish drift up & away
  a.style.setProperty('--ax', (180+Math.random()*160)+'px');
  a.style.setProperty('--ay', (260+Math.random()*120)+'px');
  document.body.appendChild(a);
  // force reflow then animate
  void a.offsetWidth;
  a.classList.add('go');
  setTimeout(function(){ if(a.parentNode) a.parentNode.removeChild(a); }, 3000);
}

/* ============================================================
   STEP CONTROLLER  (per-screen)
   ============================================================ */
function StepController(){
  this.steps=[];        // array of {fn}
  this.resetCbs=[];
}
StepController.prototype.add=function(fn){ this.steps.push(fn); };
StepController.prototype.count=function(){ return this.steps.length; };
/* play steps up to targetStep (1-indexed count of executed steps).
   animated=false for replay. */
StepController.prototype.runTo=function(target, animated){
  for(var i=0;i<target && i<this.steps.length;i++){
    try{ this.steps[i](animated); }catch(err){ console.error('step error',err); }
  }
};

/* ============================================================
   DECK ENGINE
   ============================================================ */
var Deck = {
  screens:[],     // resolved & sorted screen defs
  idx:0,          // current screen index
  step:0,         // current step within screen (0 = initial)
  els:[],         // screen root divs
  ctrl:null,      // current StepController
  api:null,

  boot:function(){
    var deck=document.getElementById('deck');
    var note=document.getElementById('empty-note');

    // sort: by chapter asc, stable within chapter (registration order preserved by stable sort)
    this.screens = SCREENS.slice();
    this.screens.forEach(function(s,i){ s.__reg=i; });
    this.screens.sort(function(a,b){
      var ca=a.chapter||0, cb=b.chapter||0;
      if(ca!==cb) return ca-cb;
      return a.__reg-b.__reg;
    });

    if(!this.screens.length){
      note.style.display='flex';
      return;
    }
    note.style.display='none';

    // create a root div per screen
    var self=this;
    this.screens.forEach(function(s,i){
      var sc=el('div','screen');
      sc.setAttribute('data-screen-idx',i);
      var inner=el('div','screen-inner');
      sc.appendChild(inner);
      sc._inner=inner;
      deck.appendChild(sc);
      self.els.push(sc);
    });

    this.buildOverview();
    this.bindEvents();

    // route from hash if present (#s<idx> or #s<idx>.<step>)
    var routed=this.parseHash();
    this.go(routed.idx||0, routed.step||0, false);
  },

  parseHash:function(){
    var m=/^#s(\d+)(?:\.(\d+))?$/.exec(location.hash||'');
    if(m) return {idx:Math.min(+m[1], this.screens.length-1), step:+(m[2]||0)};
    return {idx:0, step:0};
  },
  writeHash:function(){
    var h='#s'+this.idx+(this.step?('.'+this.step):'');
    if(location.hash!==h) history.replaceState(null,'',h);
  },

  /* build api object given current screen root + controller */
  makeApi:function(ctrl, isReplay){
    var self=this;
    return {
      isReplay:isReplay,
      step:function(fn){ ctrl.add(fn); },
      frag:function(elm){
        elm.classList.add('frag-hidden');
        ctrl.add(function(animated){
          // show
          elm.classList.remove('frag-hidden');
          elm.classList.add('frag-show');
          if(!animated){
            // jump without transition for replay
            var prev=elm.style.transition; elm.style.transition='none';
            void elm.offsetWidth; elm.style.transition=prev;
          }
        });
        return elm;
      },
      graph:function(container, opts){
        var g=new CommitGraph(container, opts);
        g._api=self.api; // give graph access to astronaut etc (set after api built)
        return g;
      },
      aiCard:function(o){ return buildAICard(o); },
      astronaut:function(o){ launchAstronaut(o); },
      next:function(){ self.next(); },
      prev:function(){ self.prev(); },
      onReset:function(fn){ ctrl.resetCbs.push(fn); }
    };
  },

  /* render screen idx fresh, then replay to step */
  renderScreen:function(idx, targetStep, animated){
    var def=this.screens[idx];
    var sc=this.els[idx];
    sc._inner.innerHTML='';        // fresh
    var ctrl=new StepController();
    this.ctrl=ctrl;

    // isReplay = true whenever the screen is being (re)built non-animated
    // (back-step, prev-screen-at-last-step, resize, hash route). Render code
    // can use it to skip one-time entrance animations.
    var api=this.makeApi(ctrl, animated===false);
    this.api=api;

    try{
      def.render(sc._inner, api);
    }catch(err){ console.error('render error in screen',idx,err); }

    // clamp target
    var max=ctrl.count();
    if(targetStep>max) targetStep=max;
    if(targetStep<0) targetStep=0;
    this.step=targetStep;

    // replay steps to target without animation (initial DOM already at step 0)
    if(targetStep>0) ctrl.runTo(targetStep, false);

    return ctrl;
  },

  go:function(idx, step, animated){
    if(idx<0) idx=0;
    if(idx>this.screens.length-1) idx=this.screens.length-1;
    // hide all, show target
    this.els.forEach(function(e){ e.classList.remove('is-active'); });
    this.idx=idx;
    var sc=this.els[idx];
    sc.classList.add('is-active');
    this.renderScreen(idx, step||0, animated===false?false:false);
    // note: entering a screen always replays via animated=false for the step playback,
    // but the screen transition itself uses CSS. Live step advances use animated=true.
    this.updateChrome();
    this.writeHash();
    this.markOverviewCurrent();
  },

  next:function(){
    // advance step within screen first
    if(this.ctrl && this.step < this.ctrl.count()){
      this.step++;
      // run only the newly-revealed step WITH animation
      try{ this.ctrl.steps[this.step-1](true); }catch(e){ console.error(e); }
      this.updateChrome();
      this.writeHash();
      return;
    }
    // else go to next screen
    if(this.idx < this.screens.length-1){
      this.go(this.idx+1, 0, true);
    }
  },

  prev:function(){
    if(this.step>0){
      // step back: re-render screen at step-1 (replay, no anim)
      this.step--;
      this.renderScreen(this.idx, this.step, false);
      this.updateChrome();
      this.writeHash();
      return;
    }
    if(this.idx>0){
      // go to previous screen at its LAST step
      var prevIdx=this.idx-1;
      // render fresh to learn step count
      this.els.forEach(function(e){ e.classList.remove('is-active'); });
      this.idx=prevIdx;
      var sc=this.els[prevIdx];
      sc.classList.add('is-active');
      var ctrl=this.renderScreen(prevIdx, 0, false);
      var last=ctrl.count();
      this.step=last;
      if(last>0) ctrl.runTo(last, false);
      this.updateChrome();
      this.writeHash();
      this.markOverviewCurrent();
    }
  },

  resetScreen:function(){
    if(this.ctrl){
      this.ctrl.resetCbs.forEach(function(fn){ try{fn();}catch(e){console.error(e);} });
    }
    this.go(this.idx, 0, true);
  },

  updateChrome:function(){
    var def=this.screens[this.idx];
    // progress = overall position across screens & steps
    var total=0, done=0, self=this;
    // approximate: count each screen as 1 + its known step count? We only know current ctrl.
    // Use screens as primary unit plus intra-screen fraction.
    var n=this.screens.length;
    var intra = this.ctrl && this.ctrl.count()>0 ? (this.step/this.ctrl.count()) : 0;
    var frac = (this.idx + intra) / n;
    document.getElementById('progress').style.width=(frac*100).toFixed(2)+'%';

    document.getElementById('foot-chap').textContent='第 '+(def.chapter||0)+' 章 · '+(def.chapterName||'');
    var ft=document.getElementById('foot-title');
    ft.textContent = def.title ? ('— '+def.title) : '';
  },

  /* ---- overview ---- */
  buildOverview:function(){
    var body=document.getElementById('ov-body');
    body.innerHTML='';
    // group by chapter
    var groups=[]; var byCh={};
    var self=this;
    this.screens.forEach(function(s,i){
      var ch=s.chapter||0;
      if(!byCh[ch]){ byCh[ch]={chapter:ch, name:s.chapterName||'', items:[]}; groups.push(byCh[ch]); }
      byCh[ch].items.push({def:s, idx:i});
    });
    groups.sort(function(a,b){return a.chapter-b.chapter;});
    groups.forEach(function(grp){
      var gEl=el('div','ov-chapter');
      var h=el('div','ov-chapter-h');
      h.appendChild(el('span','num','第 '+grp.chapter+' 章'));
      h.appendChild(el('span','nm',grp.name));
      gEl.appendChild(h);
      var list=el('div','ov-list');
      grp.items.forEach(function(it){
        var item=el('button','ov-item');
        item.setAttribute('data-goto',it.idx);
        var idxBadge=el('span','idx','#'+(it.idx+1));
        item.appendChild(idxBadge);
        item.appendChild(el('div','t',it.def.title||it.def.id||('屏 '+(it.idx+1))));
        if(it.def.subtitle) item.appendChild(el('div','s',it.def.subtitle));
        item.addEventListener('click',function(){
          self.closeOverview();
          self.go(it.idx,0,true);
        });
        list.appendChild(item);
      });
      gEl.appendChild(list);
      body.appendChild(gEl);
    });
  },
  markOverviewCurrent:function(){
    var items=document.querySelectorAll('.ov-item');
    var self=this;
    items.forEach(function(it){
      it.classList.toggle('current', +it.getAttribute('data-goto')===self.idx);
    });
  },
  openOverview:function(){ document.getElementById('overview').classList.add('open'); this.markOverviewCurrent(); },
  closeOverview:function(){ document.getElementById('overview').classList.remove('open'); },
  toggleOverview:function(){
    var ov=document.getElementById('overview');
    if(ov.classList.contains('open')) this.closeOverview(); else this.openOverview();
  },

  toggleFull:function(){
    if(!document.fullscreenElement){
      (document.documentElement.requestFullscreen||function(){}).call(document.documentElement);
    } else {
      (document.exitFullscreen||function(){}).call(document);
    }
  },

  /* ---- input ---- */
  bindEvents:function(){
    var self=this;
    document.addEventListener('keydown',function(e){
      var ov=document.getElementById('overview').classList.contains('open');
      if(e.key==='Escape'){ self.toggleOverview(); e.preventDefault(); return; }
      if(ov){ return; } // when overview open, ignore nav keys (esc handled)
      switch(e.key){
        case ' ': case 'ArrowRight': case 'PageDown':
          self.next(); e.preventDefault(); break;
        case 'ArrowLeft': case 'PageUp':
          self.prev(); e.preventDefault(); break;
        case 'f': case 'F':
          self.toggleFull(); e.preventDefault(); break;
        case 'r': case 'R':
          self.resetScreen(); e.preventDefault(); break;
      }
    });

    // click left/right halves of screen, guarding interactive elements
    document.getElementById('deck').addEventListener('click',function(e){
      if(e.target.closest('button,a,input,textarea,select,[data-interactive],.sc-btn,.aicard-toggle')) return;
      var x=e.clientX, mid=window.innerWidth/2;
      if(x<mid) self.prev(); else self.next();
    });

    // chrome buttons
    document.getElementById('btn-next').addEventListener('click',function(){self.next();});
    document.getElementById('btn-prev').addEventListener('click',function(){self.prev();});
    document.getElementById('btn-reset').addEventListener('click',function(){self.resetScreen();});
    document.getElementById('btn-full').addEventListener('click',function(){self.toggleFull();});
    document.getElementById('menu-btn').addEventListener('click',function(){self.toggleOverview();});
    document.getElementById('ov-close').addEventListener('click',function(){self.closeOverview();});

    // re-layout graphs on resize (re-render current screen at current step)
    var rt;
    window.addEventListener('resize',function(){
      clearTimeout(rt);
      rt=setTimeout(function(){ self.renderScreen(self.idx, self.step, false); }, 180);
    });
  }
};

/* ------------------------------------------------------------
   DECORATIVE BACKGROUND GENERATION
   ------------------------------------------------------------ */
function buildDeco(){
  var g=document.getElementById('deco-g');
  if(!g) return;
  var lanes=[150,330,520,680];
  var x=0, prevPts=[];
  // draw a few wandering lanes with dots, repeated to allow seamless drift
  for(var rep=0;rep<2;rep++){
    var ox=rep*620;
    lanes.forEach(function(ly,li){
      var py=ly;
      var prevX=null, prevY=null;
      for(var i=0;i<9;i++){
        var cx=ox+60+i*70;
        var cy=ly + (i%3===0? (li%2?20:-20):0);
        if(prevX!==null){
          var d='M'+prevX+','+prevY+' C'+((prevX+cx)/2)+','+prevY+' '+((prevX+cx)/2)+','+cy+' '+cx+','+cy;
          var p=document.createElementNS(SVGNS,'path');
          p.setAttribute('class','deco-line'); p.setAttribute('d',d); g.appendChild(p);
        }
        var c=document.createElementNS(SVGNS,'circle');
        c.setAttribute('class','deco-dot'); c.setAttribute('cx',cx); c.setAttribute('cy',cy); c.setAttribute('r',9);
        g.appendChild(c);
        prevX=cx; prevY=cy;
      }
    });
  }
}

/* ------------------------------------------------------------
   BOOT
   ------------------------------------------------------------ */
function start(){
  buildDeco();
  Deck.screens=[]; // reset
  Deck.boot();
}
if(document.readyState==='loading') document.addEventListener('DOMContentLoaded',start);
else start();

// expose for debugging / integration
window.__Deck = Deck;

})();
